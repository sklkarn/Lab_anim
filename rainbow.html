<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
  .canvas { position: relative; width: 500px; height: 400px; background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #444; }
  
  /* The Droplet */
  .droplet {
    fill: rgba(173, 216, 230, 0.2);
    stroke: rgba(255, 255, 255, 0.3);
    stroke-width: 2;
  }

  /* Light Rays */
  .ray { fill: none; stroke-width: 2; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 4s linear infinite; }
  
  /* Individual Colors */
  .white { stroke: #ffffff; stroke-width: 3; animation-duration: 4s; }
  .red    { stroke: #ff4d4d; animation-delay: 0.5s; }
  .orange { stroke: #ffa500; animation-delay: 0.6s; }
  .yellow { stroke: #ffff00; animation-delay: 0.7s; }
  .green  { stroke: #32cd32; animation-delay: 0.8s; }
  .blue   { stroke: #1e90ff; animation-delay: 0.9s; }
  .violet { stroke: #9370db; animation-delay: 1.0s; }

  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  .label { font-size: 14px; fill: #aaa; font-style: italic; }
</style>
</head>
<body>

  <h2>Rainbow Physics: Dispersion in a Drop</h2>
  
  <div class="canvas">
    <svg viewBox="0 0 500 400" width="500" height="400">
      <circle cx="300" cy="200" r="100" class="droplet" />
      
      <path class="ray white" d="M 0,140 L 215,140" />
      <text x="20" y="130" class="label" fill="white">Sunlight</text>

      <path class="ray red" d="M 215,140 L 395,230 L 235,285 L 50,350" />
      <path class="ray orange" d="M 215,140 L 398,220 L 245,290 L 60,365" />
      <path class="ray yellow" d="M 215,140 L 399,210 L 255,295 L 70,380" />
      <path class="ray green" d="M 215,140 L 398,200 L 265,300 L 80,395" />
      <path class="ray blue" d="M 215,140 L 395,190 L 275,305 L 90,410" />
      <path class="ray violet" d="M 215,140 L 390,180 L 285,310 L 100,425" />

      <text x="180" y="110" class="label">1. Refraction & Dispersion</text>
      <text x="380" y="160" class="label">2. Internal Reflection</text>
      <text x="260" y="340" class="label">3. Final Refraction</text>
    </svg>
  </div>

  <p style="max-width: 500px; text-align: center;">
    White light enters the drop and slows down. Because different colors have different wavelengths, they bend at different angles (<b>Dispersion</b>), reflect off the back, and exit to form a rainbow.
  </p>

</body>
</html>
