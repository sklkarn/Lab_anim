<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000005;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    width: 100vw; height: 100vh;
    cursor: crosshair;
  }

  #canvas { display: block; }

  #ui {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 10;
    color: #7af7ff;
    font-size: 11px;
    letter-spacing: 0.1em;
    line-height: 1.8;
    text-shadow: 0 0 10px #7af7ff88;
  }

  #ui h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.4em;
    color: #fff;
    text-shadow: 0 0 20px #7af7ffaa;
    margin-bottom: 4px;
  }

  #instructor {
    font-size: 10px;
    color: #7af7ffaa;
    letter-spacing: 0.15em;
    margin-bottom: 14px;
    text-shadow: 0 0 8px #7af7ff55;
  }

  .label-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  #speed-control {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 10;
    color: #7af7ff88;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-align: right;
  }

  #speed-control input[type=range] {
    -webkit-appearance: none;
    width: 140px;
    height: 2px;
    background: #7af7ff33;
    outline: none;
    display: block;
    margin: 6px 0;
  }

  #speed-control input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #7af7ff;
    box-shadow: 0 0 8px #7af7ff;
    cursor: pointer;
  }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(0,5,20,0.88);
    border: 1px solid #7af7ff55;
    color: #7af7ff;
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    display: none;
    z-index: 20;
    box-shadow: 0 0 20px #7af7ff22;
  }

  #legend {
    position: fixed;
    bottom: 24px; left: 20px;
    z-index: 10;
    color: #ffffff66;
    font-size: 10px;
    letter-spacing: 0.08em;
    line-height: 2;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="ui">
  <h1>SOLAR SYSTEM</h1>
  <div id="instructor">INSTRUCTOR: DR. S KARNA</div>
  <div id="planet-list"></div>
</div>

<div id="speed-control">
  ORBIT SPEED
  <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
  <span id="speedVal">1.0x</span>
</div>

<div id="legend">
  <div><span class="label-dot" style="background:#c2a85a"></span>ASTEROID BELT</div>
  <div><span class="label-dot" style="background:#6a8fa8"></span>KUIPER BELT</div>
  <div><span class="label-dot" style="background:#2a4a6a88"></span>OORT CLOUD</div>
</div>

<div id="tooltip"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const slider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');

let W, H, cx, cy, scale;
let speedMult = 1;
let mouse = { x: -9999, y: -9999 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  scale = Math.min(W, H) / 1100;
  generateBelts();
}
window.addEventListener('resize', resize);

slider.addEventListener('input', () => {
  speedMult = parseFloat(slider.value);
  speedVal.textContent = speedMult.toFixed(1) + 'x';
});

// Planet data (radius of orbit in "solar units", visual radius, color, period in Earth years)
const planets = [
  { name: 'MERCURY', orbit: 60,  r: 3.5,  color: '#a0907a', period: 0.241,  tilt: 0,    moons: 0,   info: 'Closest planet to the Sun. Year: 88 days.' },
  { name: 'VENUS',   orbit: 95,  r: 5.5,  color: '#e8c97d', period: 0.615,  tilt: 0,    moons: 0,   info: 'Hottest planet. Dense CO₂ atmosphere.' },
  { name: 'EARTH',   orbit: 135, r: 6,    color: '#4a9fd4', period: 1,      tilt: 23.4, moons: 1,   info: 'Our home. One Moon.' },
  { name: 'MARS',    orbit: 178, r: 4.5,  color: '#c1440e', period: 1.881,  tilt: 25.2, moons: 2,   info: 'The Red Planet. 2 moons: Phobos & Deimos.' },
  { name: 'JUPITER', orbit: 278, r: 18,   color: '#c88b3a', period: 11.86,  tilt: 3.1,  moons: 95,  info: 'Largest planet. 95 known moons.' },
  { name: 'SATURN',  orbit: 370, r: 15,   color: '#e4d191', period: 29.46,  tilt: 26.7, moons: 146, info: 'Famous ring system. 146 known moons.' },
  { name: 'URANUS',  orbit: 448, r: 10,   color: '#7de8e8', period: 84.01,  tilt: 97.8, moons: 28,  info: 'Rotates on its side. Ice giant.' },
  { name: 'NEPTUNE', orbit: 510, r: 9,    color: '#3f54ba', period: 164.8,  tilt: 28.3, moons: 16,  info: 'Strongest winds in solar system.' },
  { name: 'PLUTO',   orbit: 565, r: 3,    color: '#c4a882', period: 247.9,  tilt: 17,   moons: 5,   info: 'Dwarf planet. Eccentric orbit.' },
];

// Angle state
planets.forEach(p => p.angle = Math.random() * Math.PI * 2);

// Asteroid belt particles
let asteroids = [], kuiper = [], oort = [];

function generateBelts() {
  asteroids = [];
  kuiper = [];
  oort = [];

  const s = scale;

  // Asteroid belt: between Mars (178) and Jupiter (278) → ~210–260 units
  for (let i = 0; i < 380; i++) {
    const r = (210 + Math.random() * 52) * s;
    const a = Math.random() * Math.PI * 2;
    asteroids.push({
      r, a,
      speed: (0.0003 + Math.random() * 0.0002) * (Math.random() < 0.5 ? 1 : -1),
      size: 0.5 + Math.random() * 1.2,
      brightness: 0.3 + Math.random() * 0.6
    });
  }

  // Kuiper belt: beyond Neptune (510) → ~580–650 units
  for (let i = 0; i < 280; i++) {
    const r = (590 + Math.random() * 75) * s;
    const a = Math.random() * Math.PI * 2;
    kuiper.push({
      r, a,
      speed: (0.00008 + Math.random() * 0.00005) * (Math.random() < 0.5 ? 1 : -1),
      size: 0.6 + Math.random() * 1.4,
      brightness: 0.25 + Math.random() * 0.5
    });
  }

  // Oort cloud: ~750–950 units — sparse, outermost
  for (let i = 0; i < 600; i++) {
    const r = (760 + Math.random() * 200) * s;
    const a = Math.random() * Math.PI * 2;
    oort.push({
      r, a,
      speed: (0.00002 + Math.random() * 0.00001) * (Math.random() < 0.5 ? 1 : -1),
      size: 0.4 + Math.random() * 0.8,
      brightness: 0.08 + Math.random() * 0.2
    });
  }
}

// Stars
const stars = Array.from({ length: 500 }, () => ({
  x: Math.random(),
  y: Math.random(),
  r: 0.3 + Math.random() * 1.2,
  b: 0.3 + Math.random() * 0.7,
  twinkle: Math.random() * Math.PI * 2
}));

// Build planet legend
const list = document.getElementById('planet-list');
planets.forEach(p => {
  const div = document.createElement('div');
  div.innerHTML = `<span class="label-dot" style="background:${p.color}"></span>${p.name}`;
  list.appendChild(div);
});

let hoveredPlanet = null;

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

canvas.addEventListener('click', e => {
  // Click to focus (future enhancement)
});

// Draw Saturn's rings
function drawSaturnRings(x, y, r, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * 0.1);

  const rings = [
    { inner: r * 1.3, outer: r * 1.55, color: 'rgba(200,180,100,0.35)' },
    { inner: r * 1.6, outer: r * 1.85, color: 'rgba(220,200,130,0.28)' },
    { inner: r * 1.9, outer: r * 2.1, color: 'rgba(180,160,80,0.18)' },
  ];

  ctx.scale(1, 0.32);
  for (const ring of rings) {
    const grad = ctx.createRadialGradient(0, 0, ring.inner, 0, 0, ring.outer);
    grad.addColorStop(0, ring.color);
    grad.addColorStop(0.5, ring.color.replace('0.', '0.5').replace('0.35', '0.5'));
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(0, 0, ring.outer, 0, Math.PI * 2);
    ctx.arc(0, 0, ring.inner, 0, Math.PI * 2, true);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  ctx.restore();
}

// Draw Uranus's rings (tilted)
function drawUranusRings(x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.PI / 2);
  ctx.scale(1, 0.22);
  const inner = r * 1.5, outer = r * 2.0;
  const grad = ctx.createRadialGradient(0, 0, inner, 0, 0, outer);
  grad.addColorStop(0, 'rgba(125,232,232,0.2)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(0, 0, outer, 0, Math.PI * 2);
  ctx.arc(0, 0, inner, 0, Math.PI * 2, true);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

// Glow helper
function drawGlow(x, y, r, color, intensity = 1) {
  const grad = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 3);
  grad.addColorStop(0, color + Math.floor(intensity * 80).toString(16).padStart(2, '0'));
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r * 3, 0, Math.PI * 2);
  ctx.fill();
}

let t = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Deep space background
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H));
  bg.addColorStop(0, '#00010a');
  bg.addColorStop(1, '#000003');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    const twinkle = 0.6 + 0.4 * Math.sin(t * 0.5 + s.twinkle);
    ctx.globalAlpha = s.b * twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // --- OORT CLOUD ---
  for (const p of oort) {
    p.a += p.speed * speedMult;
    const x = cx + Math.cos(p.a) * p.r;
    const y = cy + Math.sin(p.a) * p.r;
    ctx.globalAlpha = p.brightness * 0.6;
    ctx.fillStyle = '#4a7aaa';
    ctx.beginPath();
    ctx.arc(x, y, p.size * scale, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // --- OORT LABEL ---
  const oortR = 870 * scale;
  ctx.font = `${Math.max(8, 9 * scale)}px 'Share Tech Mono'`;
  ctx.fillStyle = '#2a4a6a88';
  ctx.letterSpacing = '0.1em';
  ctx.fillText('OORT CLOUD', cx + oortR * 0.68, cy - oortR * 0.72);

  // --- KUIPER BELT ---
  for (const p of kuiper) {
    p.a += p.speed * speedMult;
    const x = cx + Math.cos(p.a) * p.r;
    const y = cy + Math.sin(p.a) * p.r;
    ctx.globalAlpha = p.brightness;
    ctx.fillStyle = `hsl(${200 + Math.random() * 20}, 40%, ${40 + Math.random() * 30}%)`;
    ctx.beginPath();
    ctx.arc(x, y, p.size * scale, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Kuiper belt orbit ring (subtle)
  ctx.beginPath();
  ctx.arc(cx, cy, 612 * scale, 0, Math.PI * 2);
  ctx.strokeStyle = '#6a8fa822';
  ctx.lineWidth = 20 * scale;
  ctx.stroke();

  // --- KUIPER LABEL ---
  const kR = 620 * scale;
  ctx.font = `${Math.max(8, 9 * scale)}px 'Share Tech Mono'`;
  ctx.fillStyle = '#6a8fa899';
  ctx.fillText('KUIPER BELT', cx + kR * 0.68, cy - kR * 0.72);

  // --- ASTEROID BELT ---
  // Belt haze
  ctx.beginPath();
  ctx.arc(cx, cy, 233 * scale, 0, Math.PI * 2);
  ctx.strokeStyle = '#c2a85a18';
  ctx.lineWidth = 28 * scale;
  ctx.stroke();

  for (const p of asteroids) {
    p.a += p.speed * speedMult;
    const x = cx + Math.cos(p.a) * p.r;
    const y = cy + Math.sin(p.a) * p.r;
    ctx.globalAlpha = p.brightness * 0.85;
    ctx.fillStyle = `hsl(${35 + Math.random() * 20}, 30%, ${40 + Math.random() * 30}%)`;
    ctx.beginPath();
    ctx.arc(x, y, p.size * scale, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Asteroid belt label
  const abR = 248 * scale;
  ctx.font = `${Math.max(7, 8 * scale)}px 'Share Tech Mono'`;
  ctx.fillStyle = '#c2a85a88';
  ctx.fillText('ASTEROID BELT', cx + abR * 0.62, cy - abR * 0.77);

  // --- ORBIT RINGS ---
  for (const p of planets) {
    ctx.beginPath();
    ctx.arc(cx, cy, p.orbit * scale, 0, Math.PI * 2);
    ctx.strokeStyle = p.name === 'PLUTO' ? '#ffffff12' : '#ffffff0d';
    ctx.lineWidth = p.name === 'PLUTO' ? 0.5 : 0.7;
    ctx.setLineDash(p.name === 'PLUTO' ? [4, 8] : []);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // --- SUN ---
  const sunR = 28 * scale;
  // Corona layers
  for (let i = 4; i > 0; i--) {
    const grad = ctx.createRadialGradient(cx, cy, sunR, cx, cy, sunR * (1 + i * 1.2));
    grad.addColorStop(0, `rgba(255,${140 + i * 20},0,${0.07 / i})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, sunR * (1 + i * 1.2), 0, Math.PI * 2);
    ctx.fill();
  }
  // Sun body
  const sunGrad = ctx.createRadialGradient(cx - sunR * 0.3, cy - sunR * 0.3, 0, cx, cy, sunR);
  sunGrad.addColorStop(0, '#fff9d0');
  sunGrad.addColorStop(0.3, '#ffdd44');
  sunGrad.addColorStop(0.7, '#ff9900');
  sunGrad.addColorStop(1, '#ff5500');
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, sunR, 0, Math.PI * 2);
  ctx.fill();

  // Sun shimmer
  ctx.globalAlpha = 0.15 + 0.08 * Math.sin(t * 2);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - sunR * 0.25, cy - sunR * 0.3, sunR * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // --- PLANETS ---
  hoveredPlanet = null;
  let tooltipContent = null;

  for (const p of planets) {
    // Update angle
    const baseSpeed = (2 * Math.PI / (p.period * 365));
    p.angle += baseSpeed * 0.4 * speedMult;

    const r = p.orbit * scale;
    const px = cx + Math.cos(p.angle) * r;
    const py = cy + Math.sin(p.angle) * r;
    const pr = p.r * scale;

    // Hover detection
    const dx = mouse.x - px, dy = mouse.y - py;
    const hovered = Math.sqrt(dx * dx + dy * dy) < Math.max(pr + 8, 12);
    if (hovered) {
      hoveredPlanet = p;
      tooltipContent = `<strong>${p.name}</strong><br>${p.info}`;
    }

    // Planet glow
    drawGlow(px, py, pr, p.color, hovered ? 1.4 : 0.7);

    // Saturn rings (behind planet)
    if (p.name === 'SATURN') drawSaturnRings(px, py, pr, p.angle);
    if (p.name === 'URANUS') drawUranusRings(px, py, pr);

    // Planet body
    const planetGrad = ctx.createRadialGradient(
      px - pr * 0.3, py - pr * 0.3, pr * 0.05,
      px, py, pr
    );

    if (p.name === 'EARTH') {
      planetGrad.addColorStop(0, '#7de4ff');
      planetGrad.addColorStop(0.4, '#4a9fd4');
      planetGrad.addColorStop(0.75, '#2a6e3a');
      planetGrad.addColorStop(1, '#1a3d22');
    } else if (p.name === 'JUPITER') {
      planetGrad.addColorStop(0, '#e8c070');
      planetGrad.addColorStop(0.3, '#c88b3a');
      planetGrad.addColorStop(0.6, '#a06020');
      planetGrad.addColorStop(0.85, '#c88b3a');
      planetGrad.addColorStop(1, '#8a5010');
    } else {
      const c = p.color;
      planetGrad.addColorStop(0, c + 'ff');
      planetGrad.addColorStop(0.6, c + 'dd');
      planetGrad.addColorStop(1, '#000');
    }

    ctx.fillStyle = planetGrad;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();

    // Jupiter bands
    if (p.name === 'JUPITER') {
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#7a4010';
      ctx.beginPath();
      ctx.ellipse(px, py + pr * 0.2, pr, pr * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px, py - pr * 0.25, pr, pr * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Hover ring
    if (hovered) {
      ctx.strokeStyle = '#ffffff55';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(px, py, pr + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Planet name label
    ctx.font = `${Math.max(7, Math.min(10, 9 * scale))}px 'Share Tech Mono'`;
    ctx.fillStyle = hovered ? '#ffffff' : '#ffffff77';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, px, py - pr - 5 * scale);
    ctx.textAlign = 'left';

    // Earth moon
    if (p.name === 'EARTH') {
      const moonAngle = t * 1.5 * speedMult;
      const moonDist = pr * 2.4;
      const mx = px + Math.cos(moonAngle) * moonDist;
      const my = py + Math.sin(moonAngle) * moonDist;
      ctx.fillStyle = '#cccccc';
      ctx.beginPath();
      ctx.arc(mx, my, pr * 0.27, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Tooltip
  if (hoveredPlanet && tooltipContent) {
    tooltip.style.display = 'block';
    tooltip.innerHTML = tooltipContent;
    tooltip.style.left = (mouse.x + 16) + 'px';
    tooltip.style.top = (mouse.y - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }

  t += 0.016;
  requestAnimationFrame(draw);
}

resize();
draw();
</script>
</body>
</html>
