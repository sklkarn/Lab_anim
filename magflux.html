<!DOCTYPE html>
<html>
<head>
<style>
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    background: #0f0f0f; 
    color: #e0e0e0; 
    margin: 0;
    padding: 20px;
  }
  canvas { 
    background: #1a1a1a; 
    border: 1px solid #333; 
    margin-top: 20px; 
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .container { 
    position: relative; 
    width: 600px; 
    height: 150px; 
    background: #1a1a1a; 
    border: 1px solid #333; 
    overflow: hidden; 
    margin-top: 20px;
    border-radius: 8px;
  }
  .field { 
    position: absolute; 
    left: 200px; 
    width: 200px; 
    height: 100%; 
    background: rgba(0, 162, 255, 0.05); 
    border-left: 2px dashed #00a2ff; 
    border-right: 2px dashed #00a2ff; 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: space-around; 
    align-content: space-around; 
  }
  .field::after { 
    content: '× × × × × × × × ×'; 
    color: #00a2ff; 
    width: 100%; 
    text-align: center; 
    font-size: 20px; 
    letter-spacing: 15px; 
    opacity: 0.4; 
  }
  #coil { 
    position: absolute; 
    top: 45px; 
    left: -60px; 
    width: 60px; 
    height: 60px; 
    border: 3px solid #00ffcc; 
    box-sizing: border-box; 
    box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
  }
  .controls {
    margin-top: 20px;
  }
  button {
    padding: 10px 25px;
    font-size: 16px;
    background: #333;
    color: white;
    border: 1px solid #555;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    background: #444;
    border-color: #00ffcc;
  }
  button:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

  <h2>Magnetic Flux ($\Phi$) vs Time</h2>
  
  <div class="container">
    <div class="field"></div>
    <div id="coil"></div>
  </div>

  <canvas id="fluxGraph" width="600" height="200"></canvas>

  <div class="controls">
    <button id="pauseBtn">Pause</button>
  </div>

<script>
  const coil = document.getElementById('coil');
  const canvas = document.getElementById('fluxGraph');
  const pauseBtn = document.getElementById('pauseBtn');
  const ctx = canvas.getContext('2d');
  
  let x = -60; 
  const speed = 2;
  const fieldStart = 200;
  const fieldEnd = 400;
  const coilWidth = 60;
  let points = [];
  let isPaused = false;

  pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
    if (!isPaused) animate();
  });

  function animate() {
    if (isPaused) return;

    x += speed;
    if (x > 600) { 
        x = -60; 
        points = []; 
    }

    coil.style.left = x + 'px';

    let overlapStart = Math.max(x, fieldStart);
    let overlapEnd = Math.min(x + coilWidth, fieldEnd);
    let overlapWidth = Math.max(0, overlapEnd - overlapStart);
    
    points.push({tx: x, ty: overlapWidth});

    drawGraph();
    requestAnimationFrame(animate);
  }

  function drawGraph() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Grid/Axes
    ctx.beginPath();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for(let i=50; i<600; i+=50) {
        ctx.moveTo(i, 20); ctx.lineTo(i, 180);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.moveTo(50, 20); ctx.lineTo(50, 180);
    ctx.lineTo(550, 180);
    ctx.stroke();

    // Plot Line
    ctx.beginPath();
    ctx.strokeStyle = '#00ffcc';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00ffcc';
    ctx.lineWidth = 3;
    points.forEach((p, i) => {
      let gx = 50 + (p.tx + 60) * (500/660);
      let gy = 180 - (p.ty * 2); 
      if(i === 0) ctx.moveTo(gx, gy);
      else ctx.lineTo(gx, gy);
    });
    ctx.stroke();
    
    // Reset shadow for text
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#888';
    ctx.font = '14px sans-serif';
    ctx.fillText("Time (t)", 530, 195);
    ctx.save();
    ctx.translate(35, 100);
    ctx.rotate(-Math.PI/2);
    ctx.fillText("Flux (Φ)", 0, 0);
    ctx.restore();
  }

  animate();
</script>
</body>
</html>
