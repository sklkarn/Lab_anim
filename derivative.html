<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∂ Derivative Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #10101a;
    --border: #1e1e35;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: rgba(124,58,237,0.4);
    --glow2: rgba(6,182,212,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(124,58,237,0.12); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(6,182,212,0.08); bottom: -50px; right: -50px; animation-delay: 3s; }
  .orb3 { width: 200px; height: 200px; background: rgba(245,158,11,0.06); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 1.5s; }

  @keyframes pulse {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    padding: 3rem 0 2.5rem;
    animation: fadeDown 0.8s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-symbol {
    font-family: 'Cinzel', serif;
    font-size: 4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    display: block;
    filter: drop-shadow(0 0 20px var(--glow));
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%,100% { filter: drop-shadow(0 0 20px var(--glow)); }
    50% { filter: drop-shadow(0 0 40px var(--glow)) drop-shadow(0 0 60px var(--glow2)); }
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-top: 0.75rem;
    opacity: 0.6;
  }

  .tabs {
    display: flex;
    gap: 0.3rem;
    margin: 2rem 0 1.5rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.4rem;
    animation: fadeUp 0.8s ease 0.2s both;
    flex-wrap: wrap;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tab {
    flex: 1;
    min-width: 100px;
    padding: 0.6rem 0.5rem;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    text-transform: uppercase;
  }

  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    color: white;
    box-shadow: 0 0 20px var(--glow);
  }

  .machine {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.8s ease 0.4s both;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .machine-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: linear-gradient(90deg, rgba(124,58,237,0.1), transparent);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-red { background: #ef4444; }
  .dot-yellow { background: #f59e0b; }
  .dot-green { background: #10b981; }

  .machine-title {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-left: 0.5rem;
  }

  .machine-body { padding: 1.5rem; }

  .input-section { margin-bottom: 1.5rem; }

  .input-label {
    font-size: 0.65rem;
    color: var(--accent2);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: block;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    gap: 0.75rem;
    align-items: stretch;
  }

  .expr-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
    letter-spacing: 0.05em;
  }

  .expr-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.2), 0 0 20px rgba(124,58,237,0.1);
  }

  .expr-input::placeholder { color: var(--muted); opacity: 0.5; }

  .diff-btn {
    padding: 0.9rem 1.5rem;
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px var(--glow);
    white-space: nowrap;
  }

  .diff-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px var(--glow);
  }

  .diff-btn:active { transform: translateY(0); }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.75rem;
  }

  .qbtn {
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 6px;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .qbtn:hover {
    background: rgba(124,58,237,0.25);
    border-color: var(--accent);
    color: white;
    transform: translateY(-1px);
  }

  .rules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .rule-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem;
    transition: all 0.3s;
    cursor: pointer;
  }

  .rule-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px var(--glow);
  }

  .rule-name {
    font-size: 0.6rem;
    color: var(--accent3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .rule-formula {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.6;
  }

  .rule-result {
    font-size: 0.75rem;
    color: var(--accent2);
    margin-top: 0.3rem;
  }

  .output-section {
    margin-top: 1rem;
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
  }

  .output-label {
    font-size: 0.65rem;
    color: var(--accent3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .output-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .output-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    min-height: 80px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
  }

  .output-box.has-result {
    border-color: rgba(124,58,237,0.5);
    box-shadow: 0 0 20px rgba(124,58,237,0.1);
  }

  .output-expr {
    font-size: 1.1rem;
    color: var(--accent2);
    letter-spacing: 0.05em;
    line-height: 1.8;
    word-break: break-all;
  }

  .output-steps {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .step {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
    margin-bottom: 0.6rem;
    font-size: 0.75rem;
    color: var(--muted);
    animation: stepIn 0.3s ease both;
  }

  @keyframes stepIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .step-num {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-text { line-height: 1.5; }
  .step-text span { color: var(--accent2); }

  .error-msg {
    color: #ef4444;
    font-size: 0.8rem;
    padding: 0.75rem 0;
  }

  .placeholder {
    color: var(--muted);
    font-size: 0.8rem;
    opacity: 0.4;
    text-align: center;
    padding: 1rem;
  }

  .examples-section {
    margin-top: 1.5rem;
    animation: fadeUp 0.8s ease 0.6s both;
  }

  .section-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .examples-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.6rem;
  }

  .example-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .example-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .example-card:hover::before { opacity: 0.08; }
  .example-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .ex-type {
    font-size: 0.55rem;
    color: var(--accent3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    position: relative;
  }

  .ex-expr {
    font-size: 0.85rem;
    color: var(--text);
    position: relative;
  }

  .var-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .var-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .var-btns { display: flex; gap: 0.4rem; }

  .var-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .var-btn.active, .var-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0;
    pointer-events: none;
  }

  .output-box.computing .scan-line {
    animation: scan 0.6s ease;
  }

  @keyframes scan {
    0% { opacity: 1; top: 0; }
    100% { opacity: 0; top: 100%; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  @media (max-width: 600px) {
    .rules-grid { grid-template-columns: 1fr; }
    .logo-symbol { font-size: 3rem; }
    .title { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">
  <header>
    <span class="logo-symbol">∂</span>
    <div class="title">Derivative Machine</div>
    <div class="subtitle">Algebraic · Trigonometric · Exponential · Logarithmic · Inverse</div>
    <div style="margin-top:1.2rem;font-size:0.65rem;letter-spacing:0.25em;color:var(--muted);opacity:0.7;text-transform:uppercase">Claude by Dr. S Karna</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('algebraic')">Algebraic</button>
    <button class="tab" onclick="switchTab('trigonometric')">Trigonometric</button>
    <button class="tab" onclick="switchTab('exponential')">Exponential</button>
    <button class="tab" onclick="switchTab('logarithmic')">Logarithmic</button>
    <button class="tab" onclick="switchTab('inverse')">Inverse Trig</button>
  </div>

  <div class="machine">
    <div class="machine-header">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="machine-title" id="panelTitle">Algebraic Functions — d/dx</span>
    </div>

    <div class="machine-body">

      <div class="var-row">
        <span class="var-label">Variable:</span>
        <div class="var-btns">
          <button class="var-btn active" onclick="setVar('x')">x</button>
          <button class="var-btn" onclick="setVar('t')">t</button>
          <button class="var-btn" onclick="setVar('u')">u</button>
          <button class="var-btn" onclick="setVar('y')">y</button>
        </div>
      </div>

      <div class="input-section">
        <label class="input-label">f(<span id="varLabel">x</span>) =</label>
        <div class="input-wrapper">
          <input type="text" class="expr-input" id="exprInput"
            placeholder="e.g.  x^3 + 2*x^2 - 5"
            onkeydown="if(event.key==='Enter') differentiate()">
          <button class="diff-btn" onclick="differentiate()">d/d<span id="varBtn">x</span> →</button>
        </div>
        <div class="quick-btns" id="quickBtns"></div>
      </div>

      <div class="output-section">
        <div class="output-label">Result</div>
        <div class="output-box" id="outputBox">
          <div class="scan-line" id="scanLine"></div>
          <div class="placeholder" id="placeholder">Enter an expression above and press d/dx →</div>
          <div id="outputExpr" class="output-expr" style="display:none"></div>
          <div id="outputSteps" class="output-steps" style="display:none"></div>
          <div id="errorMsg" class="error-msg" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="examples-section">
    <div class="section-label">Reference Rules</div>
    <div class="rules-grid" id="rulesGrid"></div>
  </div>

  <div class="examples-section" style="animation-delay:0.7s">
    <div class="section-label">Quick Examples</div>
    <div class="examples-grid" id="examplesGrid"></div>
  </div>

</div>

<script>
let currentVar = 'x';
let currentTab = 'algebraic';

const categories = {
  algebraic: {
    title: 'Algebraic Functions — d/dx',
    quickBtns: ['x^n', 'x^2', 'x^3', 'sqrt(x)', '1/x', 'x^(1/2)', '(x+1)^2', 'x^(-1)'],
    rules: [
      { name: 'Power Rule', formula: 'd/dx [xⁿ]', result: '= n·xⁿ⁻¹' },
      { name: 'Constant Rule', formula: 'd/dx [c]', result: '= 0' },
      { name: 'Sum Rule', formula: 'd/dx [f + g]', result: "= f' + g'" },
      { name: 'Product Rule', formula: 'd/dx [f·g]', result: "= f'g + fg'" },
      { name: 'Quotient Rule', formula: 'd/dx [f/g]', result: "= (gf' − fg')/g²" },
      { name: 'Chain Rule', formula: 'd/dx [f(g(x))]', result: "= f'(g)·g'" },
    ],
    examples: [
      { type: 'Polynomial', expr: 'x^3 - 4*x^2 + 7*x - 2' },
      { type: 'Power', expr: 'x^5' },
      { type: 'Rational', expr: '1/(x^2 + 1)' },
      { type: 'Radical', expr: 'sqrt(x^3 + 1)' },
      { type: 'Product', expr: 'x^2 * (x + 3)' },
      { type: 'Composite', expr: '(2*x + 1)^4' },
    ]
  },
  trigonometric: {
    title: 'Trigonometric Functions — d/dx',
    quickBtns: ['sin(x)', 'cos(x)', 'tan(x)', 'cot(x)', 'sec(x)', 'csc(x)', 'sin(x^2)', 'cos(2*x)'],
    rules: [
      { name: 'Sine', formula: 'd/dx [sin x]', result: '= cos x' },
      { name: 'Cosine', formula: 'd/dx [cos x]', result: '= −sin x' },
      { name: 'Tangent', formula: 'd/dx [tan x]', result: '= sec²x' },
      { name: 'Cotangent', formula: 'd/dx [cot x]', result: '= −csc²x' },
      { name: 'Secant', formula: 'd/dx [sec x]', result: '= sec x · tan x' },
      { name: 'Cosecant', formula: 'd/dx [csc x]', result: '= −csc x · cot x' },
    ],
    examples: [
      { type: 'Basic', expr: 'sin(x)' },
      { type: 'Basic', expr: 'cos(x)' },
      { type: 'Basic', expr: 'tan(x)' },
      { type: 'Chain', expr: 'sin(x^2)' },
      { type: 'Chain', expr: 'cos(3*x + 1)' },
      { type: 'Product', expr: 'x * sin(x)' },
    ]
  },
  exponential: {
    title: 'Exponential Functions — d/dx',
    quickBtns: ['exp(x)', 'exp(2*x)', 'exp(x^2)', '2^x', 'exp(-x)', 'x*exp(x)'],
    rules: [
      { name: 'Natural Exp', formula: 'd/dx [eˣ]', result: '= eˣ' },
      { name: 'Exp Chain', formula: 'd/dx [eᶠ⁽ˣ⁾]', result: "= f'(x)·eᶠ⁽ˣ⁾" },
      { name: 'General Exp', formula: 'd/dx [aˣ]', result: '= aˣ · ln(a)' },
      { name: 'General Chain', formula: 'd/dx [aᶠ⁽ˣ⁾]', result: "= aᶠ · ln(a) · f'" },
    ],
    examples: [
      { type: 'Natural', expr: 'exp(x)' },
      { type: 'Chain', expr: 'exp(2*x + 1)' },
      { type: 'Chain', expr: 'exp(x^2)' },
      { type: 'General', expr: '2^x' },
      { type: 'Product', expr: 'x^2 * exp(x)' },
      { type: 'Composite', expr: 'exp(sin(x))' },
    ]
  },
  logarithmic: {
    title: 'Logarithmic Functions — d/dx',
    quickBtns: ['log(x)', 'log(x^2+1)', 'log(sin(x))', 'x*log(x)', 'log2(x)', 'log10(x)'],
    rules: [
      { name: 'Natural Log', formula: 'd/dx [ln x]', result: '= 1/x' },
      { name: 'Log Chain', formula: 'd/dx [ln f(x)]', result: "= f'(x)/f(x)" },
      { name: 'Log base a', formula: 'd/dx [logₐ x]', result: '= 1/(x·ln a)' },
      { name: 'Log Product', formula: 'd/dx [x·ln x]', result: '= ln x + 1' },
    ],
    examples: [
      { type: 'Natural', expr: 'log(x)' },
      { type: 'Chain', expr: 'log(x^2 + 1)' },
      { type: 'Chain', expr: 'log(sin(x))' },
      { type: 'Product', expr: 'x * log(x)' },
      { type: 'Log base 2', expr: 'log2(x)' },
      { type: 'Log base 10', expr: 'log10(x)' },
    ]
  },
  inverse: {
    title: 'Inverse Trig Functions — d/dx',
    quickBtns: ['asin(x)', 'acos(x)', 'atan(x)', 'asin(x^2)', 'atan(2*x)', 'x*atan(x)'],
    rules: [
      { name: 'Arcsin', formula: 'd/dx [arcsin x]', result: '= 1/√(1−x²)' },
      { name: 'Arccos', formula: 'd/dx [arccos x]', result: '= −1/√(1−x²)' },
      { name: 'Arctan', formula: 'd/dx [arctan x]', result: '= 1/(1+x²)' },
      { name: 'Arccot', formula: 'd/dx [arccot x]', result: '= −1/(1+x²)' },
    ],
    examples: [
      { type: 'Arcsin', expr: 'asin(x)' },
      { type: 'Arccos', expr: 'acos(x)' },
      { type: 'Arctan', expr: 'atan(x)' },
      { type: 'Chain', expr: 'asin(x^2)' },
      { type: 'Chain', expr: 'atan(2*x + 1)' },
      { type: 'Product', expr: 'x * atan(x)' },
    ]
  }
};

function setVar(v) {
  currentVar = v;
  document.querySelectorAll('.var-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === v);
  });
  document.getElementById('varLabel').textContent = v;
  document.getElementById('varBtn').textContent = v;
  const input = document.getElementById('exprInput');
  if (input.value) {
    input.value = input.value.replace(/\b[xtuy]\b/g, v);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', Object.keys(categories)[i] === tab);
  });
  const cat = categories[tab];
  document.getElementById('panelTitle').textContent = cat.title.replace('x', currentVar);
  renderQuickBtns(cat.quickBtns);
  renderRules(cat.rules);
  renderExamples(cat.examples);
  clearOutput();
}

function renderQuickBtns(btns) {
  const container = document.getElementById('quickBtns');
  container.innerHTML = btns.map(b =>
    `<button class="qbtn" onclick="insertExpr('${b.replace(/'/g, "\\'")}')">${b}</button>`
  ).join('');
}

function renderRules(rules) {
  document.getElementById('rulesGrid').innerHTML = rules.map(r => `
    <div class="rule-card">
      <div class="rule-name">${r.name}</div>
      <div class="rule-formula">${r.formula}</div>
      <div class="rule-result">${r.result}</div>
    </div>
  `).join('');
}

function renderExamples(examples) {
  document.getElementById('examplesGrid').innerHTML = examples.map(e => `
    <div class="example-card" onclick="loadExample('${e.expr.replace(/'/g, "\\'")}')">
      <div class="ex-type">${e.type}</div>
      <div class="ex-expr">${e.expr}</div>
    </div>
  `).join('');
}

function insertExpr(expr) {
  const input = document.getElementById('exprInput');
  input.value = expr.replace(/x/g, currentVar);
  input.focus();
}

function loadExample(expr) {
  document.getElementById('exprInput').value = expr.replace(/x/g, currentVar);
  differentiate();
}

function clearOutput() {
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('outputExpr').style.display = 'none';
  document.getElementById('outputSteps').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('outputBox').classList.remove('has-result');
}

function preprocessExpr(expr, v) {
  let e = expr.trim();
  e = e.replace(/\blog2\(([^()]*(?:\([^()]*\)[^()]*)*)\)/g, (_, u) => `(log(${u}) / log(2))`);
  e = e.replace(/\blog10\(([^()]*(?:\([^()]*\)[^()]*)*)\)/g, (_, u) => `(log(${u}) / log(10))`);
  return e;
}

function prettify(result) {
  let r = result;
  r = r.replace(/1\.4426950408889634/g, '1 / ln(2)');
  r = r.replace(/0\.6931471805599453/g, 'ln(2)');
  r = r.replace(/1\.0986122886681\d*/g, 'ln(3)');
  r = r.replace(/2\.302585092994046/g, 'ln(10)');
  r = r.replace(/0\.43429448190325176/g, '1 / ln(10)');
  r = r.replace(/\blog\(/g, 'ln(');
  r = r.replace(/--/g, '');
  r = r.replace(/\s*\*\s*/g, ' * ');
  r = r.replace(/\s*\+\s*/g, ' + ');
  r = r.replace(/\s*-\s*/g, ' - ');
  r = r.replace(/\s*\/\s*/g, ' / ');
  return r;
}

function prettifyExpr(expr) {
  return expr.replace(/\blog\(/g, 'ln(');
}

function differentiate() {
  const rawInput = document.getElementById('exprInput').value.trim();
  if (!rawInput) return;

  const outputBox = document.getElementById('outputBox');
  outputBox.classList.add('computing');
  setTimeout(() => outputBox.classList.remove('computing'), 700);

  const v = currentVar;

  try {
    const processedExpr = preprocessExpr(rawInput, v);
    const derivNode = math.derivative(processedExpr, v);
    const rawResult = derivNode.toString();
    const result = prettify(rawResult);
    const displayExpr = prettifyExpr(rawInput);
    showResult(displayExpr, result, v, rawInput);
  } catch(err) {
    showError("Could not parse expression. Check syntax — use * for multiply, ^ for power, e.g. x^3 + 2*x");
  }
}

function showResult(expr, result, v, originalInput) {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';

  const outputExpr = document.getElementById('outputExpr');
  outputExpr.style.display = 'block';
  outputExpr.innerHTML = `
    <div style="margin-bottom:0.5rem">
      <span style="color:var(--muted);font-size:0.72rem;letter-spacing:0.1em">INPUT &nbsp;f(${v}) =</span>
      <span style="color:var(--text);margin-left:0.5rem">${expr}</span>
    </div>
    <div style="padding:0.75rem;background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.2);border-radius:8px;">
      <span style="color:var(--muted);font-size:0.72rem;letter-spacing:0.1em">RESULT f'(${v}) =</span>
      <span style="color:var(--accent2);margin-left:0.5rem;font-size:1.05rem">${result}</span>
    </div>
  `;

  const steps = generateSteps(originalInput, result, v);
  const stepsEl = document.getElementById('outputSteps');
  stepsEl.style.display = 'block';
  stepsEl.innerHTML = `<div style="font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.6rem">Solution Steps</div>` +
    steps.map((s, i) => `
    <div class="step" style="animation-delay:${i * 0.08}s">
      <div class="step-num">${i+1}</div>
      <div class="step-text">${s}</div>
    </div>
  `).join('');

  document.getElementById('outputBox').classList.add('has-result');
}

function showError(msg) {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('outputExpr').style.display = 'none';
  document.getElementById('outputSteps').style.display = 'none';
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'block';
  errEl.textContent = '⚠ ' + msg;
  document.getElementById('outputBox').classList.remove('has-result');
}

function generateSteps(expr, result, v) {
  const steps = [];
  const e = expr.toLowerCase();

  steps.push(`Given <span>f(${v}) = ${prettifyExpr(expr)}</span>`);

  const hasChain = /\w+\s*\([^)]*[+\-*/^][^)]*\)/.test(e) || /\^\s*\(/.test(e);
  const hasMul  = /[^e]\s*\*\s*/.test(e) || /\w\s+\w/.test(e);
  const hasDiv  = /\/(?!log|exp|\d)/.test(e) || e.includes('/(');
  const hasSqrt = /sqrt/.test(e);

  if (/\basin|acos|atan/.test(e)) {
    if (/asin/.test(e)) steps.push(`Recall: d/d${v}[arcsin(u)] = <span>u' / √(1 − u²)</span>`);
    if (/acos/.test(e)) steps.push(`Recall: d/d${v}[arccos(u)] = <span>−u' / √(1 − u²)</span>`);
    if (/atan/.test(e)) steps.push(`Recall: d/d${v}[arctan(u)] = <span>u' / (1 + u²)</span>`);
  } else if (/(?<![a-z])sin|(?<![a-z])cos|(?<![a-z])tan|sec|csc|cot/.test(e)) {
    if (/(?<![a-z])sin/.test(e)) steps.push(`Recall: d/d${v}[sin(u)] = <span>cos(u) · u'</span>`);
    if (/(?<![a-z])cos/.test(e)) steps.push(`Recall: d/d${v}[cos(u)] = <span>−sin(u) · u'</span>`);
    if (/(?<![a-z])tan/.test(e)) steps.push(`Recall: d/d${v}[tan(u)] = <span>sec²(u) · u'</span>`);
    if (/cot/.test(e)) steps.push(`Recall: d/d${v}[cot(u)] = <span>−csc²(u) · u'</span>`);
    if (/sec/.test(e) && !/csc/.test(e)) steps.push(`Recall: d/d${v}[sec(u)] = <span>sec(u)·tan(u) · u'</span>`);
    if (/csc/.test(e)) steps.push(`Recall: d/d${v}[csc(u)] = <span>−csc(u)·cot(u) · u'</span>`);
  } else if (/log2|log10/.test(e)) {
    const base = /log2/.test(e) ? '2' : '10';
    steps.push(`Rewrite log${base}(u) = <span>ln(u) / ln(${base})</span> using change-of-base`);
    steps.push(`Recall: d/d${v}[log${base}(u)] = <span>u' / (u · ln(${base}))</span>`);
  } else if (/log/.test(e)) {
    steps.push(`Recall: d/d${v}[ln(u)] = <span>u' / u</span>`);
  } else if (/exp/.test(e)) {
    steps.push(`Recall: d/d${v}[eᵘ] = <span>eᵘ · u'</span>`);
  } else if (/\d+\s*\^/.test(e) && !/v\s*\^/.test(e.replace(v,''))) {
    const baseMatch = e.match(/(\d+)\s*\^\s*[a-z]/);
    const base = baseMatch ? baseMatch[1] : 'a';
    steps.push(`Recall: d/d${v}[${base}^${v}] = <span>${base}^${v} · ln(${base})</span>`);
  } else if (/\^/.test(e)) {
    steps.push(`Apply <span>power rule:</span> d/d${v}[uⁿ] = n · uⁿ⁻¹ · u'`);
  }

  if (hasSqrt) steps.push(`Rewrite <span>√u = u^(1/2)</span>, then use power + chain rule`);
  if (hasChain) steps.push(`Apply <span>chain rule</span> for composite function: (f∘g)' = f'(g(${v})) · g'(${v})`);
  if (hasMul && !hasDiv) steps.push(`Apply <span>product rule:</span> (f · g)' = f' · g + f · g'`);
  if (hasDiv) steps.push(`Apply <span>quotient rule:</span> (f / g)' = (g·f' − f·g') / g²`);

  const termCount = (expr.match(/[+\-]/g) || []).length;
  if (termCount > 0) steps.push(`Differentiate each term <span>separately</span> using sum/difference rule`);

  steps.push(`Final answer: f'(${v}) = <span>${result}</span>`);

  return steps;
}

// Initialize
switchTab('algebraic');
</script>
