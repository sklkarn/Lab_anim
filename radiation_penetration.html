
<style>
  @keyframes moveAlpha {
    0%   { transform: translateX(0);    opacity: 1; }
    38%  { transform: translateX(136px); opacity: 1; }
    42%  { transform: translateX(140px); opacity: 0; }
    100% { transform: translateX(140px); opacity: 0; }
  }
  @keyframes moveBeta {
    0%   { transform: translateX(0);    opacity: 1; }
    60%  { transform: translateX(262px); opacity: 1; }
    64%  { transform: translateX(266px); opacity: 0; }
    100% { transform: translateX(266px); opacity: 0; }
  }
  @keyframes moveGamma {
    0%   { transform: translateX(0);   opacity: 1; }
    100% { transform: translateX(434px); opacity: 0.35; }
  }
  @keyframes dashFlow {
    to { stroke-dashoffset: -16; }
  }
  @keyframes glowPulse {
    0%,100% { opacity: 0.65; }
    50%      { opacity: 1; }
  }
  @keyframes sourcePulse {
    0%,100% { r: 28; opacity: 0.15; }
    50%      { r: 36; opacity: 0.07; }
  }
  .p-alpha  { animation: moveAlpha 4s ease-in-out infinite; }
  .p-beta   { animation: moveBeta  4s ease-in-out infinite; }
  .p-gamma  { animation: moveGamma 4s linear infinite; }
  .gamma-dash { animation: dashFlow 0.35s linear infinite; }
  .glow-alpha { animation: glowPulse 1.2s ease-in-out infinite; }
  .glow-beta  { animation: glowPulse 1.5s ease-in-out infinite 0.3s; }
  .glow-gamma { animation: glowPulse 1s ease-in-out infinite 0.1s; }
  .src-ring   { animation: sourcePulse 2s ease-in-out infinite; }
  .paused * { animation-play-state: paused !important; }
  .ctrl-btn {
    font-size: 12px; padding: 5px 13px; cursor: pointer;
    border-radius: 6px; border: 1px solid #3a4a5a;
    background: #1a2535; color: #a0c0e0;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: #243348; }
  .info-dark {
    margin-top: 10px; padding: 10px 14px; border-radius: 8px;
    background: #0e1720; border: 1px solid #1e3040;
    font-size: 13px; color: #7090a8; min-height: 40px;
    font-family: var(--font-sans);
  }
  .info-dark strong { color: #c0d8f0; font-weight: 500; }
</style>

<script>
let paused = false;
function toggle() {
  paused = !paused;
  document.getElementById('sv').classList.toggle('paused', paused);
}
const d = {
  alpha: '<strong>Alpha (α) — stopped inside cardboard.</strong> Heaviest particle (2 protons + 2 neutrons). Travels only a short distance and is absorbed deep within the cardboard plate. Highly ionizing but very low penetrating power.',
  beta:  '<strong>Beta (β) — stopped inside aluminum.</strong> Fast electrons from the nucleus. Pass through cardboard but absorbed well inside the aluminum plate. More penetrating than alpha but blocked by a few mm of metal.',
  gamma: '<strong>Gamma (γ) — attenuated by thick lead.</strong> Pure electromagnetic radiation. Passes through all three shields and only weakens significantly through thick dense lead. Most penetrating of all three types.'
};
function info(t) { document.getElementById('ibox').innerHTML = d[t]; }
</script>
