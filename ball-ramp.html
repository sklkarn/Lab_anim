<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Ramp Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --text: #e0f0ff;
    --muted: #4a6080;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(0,80,160,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.08) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,212,255,0.5);
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .layout {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1000px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .canvas-wrap {
    flex: 1;
    min-width: 300px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 40px rgba(0,212,255,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  canvas {
    display: block;
    width: 100%;
  }

  .controls {
    width: 240px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }

  .panel-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .timer-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
    text-align: center;
    letter-spacing: 0.05em;
    margin: 8px 0;
  }

  .timer-ms {
    font-size: 1rem;
    color: rgba(0,255,136,0.5);
  }

  /* Angle slider */
  .angle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .angle-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    color: var(--accent);
    font-weight: 700;
  }

  input[type=range] {
    width: 100%;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 50%), var(--border) var(--pct, 50%));
    outline: none;
    cursor: pointer;
    margin: 10px 0;
  }

  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.6);
    cursor: pointer;
  }

  .angle-marks {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    color: var(--muted);
    margin-top: -4px;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    padding: 11px 8px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  #btnStart {
    background: rgba(0,255,136,0.1);
    border-color: var(--green);
    color: var(--green);
  }
  #btnStart:hover { background: rgba(0,255,136,0.2); box-shadow: 0 0 15px rgba(0,255,136,0.3); }

  #btnStop {
    background: rgba(255,107,53,0.1);
    border-color: var(--accent2);
    color: var(--accent2);
  }
  #btnStop:hover { background: rgba(255,107,53,0.2); box-shadow: 0 0 15px rgba(255,107,53,0.3); }

  #btnReset {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  #btnReset:hover { background: rgba(0,212,255,0.2); box-shadow: 0 0 15px rgba(0,212,255,0.3); }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }

  .stat-label {
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    color: var(--accent2);
    font-weight: 700;
  }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    transition: all 0.3s;
  }
  .status-dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1s infinite; }
  .status-dot.stopped { background: var(--accent2); }
  .status-dot.finished { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-text { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
</style>
</head>
<body>

<h1>RAMP PHYSICS SIM</h1>
<p class="subtitle">Inclined Plane · Ball Dynamics · Kinematics</p>

<div class="layout">
  <div class="canvas-wrap">
    <canvas id="sim" width="640" height="420"></canvas>
  </div>

  <div class="controls">
    <!-- Timer -->
    <div class="panel">
      <div class="panel-label">⏱ Elapsed Time</div>
      <div class="timer-display" id="timerDisplay">00:<span id="tSec">00</span>.<span id="tMs" class="timer-ms">000</span></div>
      <div style="margin-top:8px; display:flex; align-items:center;">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">READY</span>
      </div>
    </div>

    <!-- Angle -->
    <div class="panel">
      <div class="panel-label">∠ Ramp Angle</div>
      <div class="angle-row">
        <span style="font-size:0.65rem;color:var(--muted)">ANGLE</span>
        <span class="angle-val"><span id="angleVal">30</span>°</span>
      </div>
      <input type="range" id="angleSlider" min="5" max="85" value="30" step="1">
      <div class="angle-marks">
        <span>5°</span><span>20°</span><span>45°</span><span>65°</span><span>85°</span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="panel">
      <div class="panel-label">⚡ Controls</div>
      <div class="btn-row">
        <button id="btnStart">START</button>
        <button id="btnStop">PAUSE</button>
      </div>
      <div class="btn-row" style="margin-top:10px;">
        <button id="btnReset">RESET</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="panel">
      <div class="panel-label">📊 Live Stats</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Velocity</div>
          <div class="stat-val" id="statVel">0.00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Accel.</div>
          <div class="stat-val" id="statAcc">0.00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Distance</div>
          <div class="stat-val" id="statDist">0.00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Height</div>
          <div class="stat-val" id="statH">0.00</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

const W = 640, H = 420;
const g = 9.81; // m/s²
const RAMP_LENGTH = 520; // pixels ~ metaphor for physical length
const PHYS_LENGTH = 5.0; // meters (ramp physical length)
const PX_PER_M = RAMP_LENGTH / PHYS_LENGTH;
const BALL_R = 14;

let angle = 30;
let running = false;
let startTime = null;
let pausedMs = 0;
let pauseStart = null;
let animId = null;

// Physics state
let s = 0;       // position along ramp (m)
let v = 0;       // velocity (m/s)
let acc = 0;     // acceleration (m/s²)
let lastT = null;
let finished = false;

// Ramp geometry computed each draw
let rampStart, rampEnd;

function computeRampGeometry() {
  const rad = angle * Math.PI / 180;
  const pad = 40;
  // Anchor bottom at bottom-left area, top goes up-right
  const bx = pad + 30;
  const by = H - 50;
  const tx = bx + RAMP_LENGTH * Math.cos(rad);
  const ty = by - RAMP_LENGTH * Math.sin(rad);
  rampStart = {x: bx, y: by};   // bottom of ramp
  rampEnd   = {x: tx, y: ty};    // top of ramp (start position of ball)
}

function ballPos() {
  // Ball starts at rampEnd (top), moves toward rampStart (bottom)
  const rad = angle * Math.PI / 180;
  const pxAlong = s * PX_PER_M;
  // Direction: from rampEnd toward rampStart
  const dx = rampStart.x - rampEnd.x;
  const dy = rampStart.y - rampEnd.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  return {
    x: rampEnd.x + (dx/len) * pxAlong,
    y: rampEnd.y + (dy/len) * pxAlong
  };
}

function draw(ts) {
  // Physics update
  if (running && !finished) {
    if (lastT === null) lastT = ts;
    const dt = Math.min((ts - lastT) / 1000, 0.05);
    lastT = ts;

    const rad = angle * Math.PI / 180;
    acc = g * Math.sin(rad);
    v += acc * dt;
    s += v * dt;

    if (s * PX_PER_M >= RAMP_LENGTH) {
      s = RAMP_LENGTH / PX_PER_M;
      v = 0;
      finished = true;
      running = false;
      pausedMs += ts - (pauseStart || startTime);
      setStatus('finished');
    }

    // Update stats
    document.getElementById('statVel').textContent = v.toFixed(2);
    document.getElementById('statAcc').textContent = acc.toFixed(2);
    document.getElementById('statDist').textContent = s.toFixed(2);
    document.getElementById('statH').textContent = (s * Math.sin(rad)).toFixed(2);
  }

  // Timer
  if (running) {
    const elapsed = performance.now() - startTime - pausedMs;
    updateTimer(elapsed);
  }

  ctx.clearRect(0, 0, W, H);
  computeRampGeometry();

  // Background grid
  ctx.strokeStyle = 'rgba(30,58,95,0.3)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Ground line
  ctx.strokeStyle = 'rgba(0,212,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, rampStart.y);
  ctx.lineTo(W, rampStart.y);
  ctx.stroke();

  // Ramp shadow
  ctx.shadowColor = 'rgba(0,212,255,0.3)';
  ctx.shadowBlur = 12;

  // Ramp surface
  const grad = ctx.createLinearGradient(rampEnd.x, rampEnd.y, rampStart.x, rampStart.y);
  grad.addColorStop(0, 'rgba(0,212,255,0.8)');
  grad.addColorStop(1, 'rgba(0,80,160,0.8)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(rampEnd.x, rampEnd.y);
  ctx.lineTo(rampStart.x, rampStart.y);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Ramp thickness fill
  const rad2 = angle * Math.PI / 180;
  const nx = -Math.sin(rad2) * 6, ny = Math.cos(rad2) * 6;
  ctx.fillStyle = 'rgba(0,40,80,0.7)';
  ctx.beginPath();
  ctx.moveTo(rampEnd.x, rampEnd.y);
  ctx.lineTo(rampStart.x, rampStart.y);
  ctx.lineTo(rampStart.x + nx, rampStart.y + ny);
  ctx.lineTo(rampEnd.x + nx, rampEnd.y + ny);
  ctx.closePath();
  ctx.fill();

  // Angle arc
  const arcR = 55;
  ctx.strokeStyle = 'rgba(255,107,53,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(rampStart.x, rampStart.y, arcR, -Math.PI, -Math.PI + rad2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,107,53,0.8)';
  ctx.font = '700 12px Orbitron, monospace';
  ctx.fillText(`${angle}°`, rampStart.x + arcR * 0.35 * Math.cos(rad2/2 - Math.PI * 0.9), rampStart.y - 10);

  // Height indicator
  const bp = ballPos();
  const bh = rampStart.y - bp.y;
  if (bh > 5) {
    ctx.strokeStyle = 'rgba(0,255,136,0.3)';
    ctx.setLineDash([4,4]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bp.x, bp.y);
    ctx.lineTo(bp.x, rampStart.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Ball trail
  if (s > 0.05) {
    const trailLen = Math.min(s * PX_PER_M, 80);
    const dx2 = rampStart.x - rampEnd.x, dy2 = rampStart.y - rampEnd.y;
    const ln = Math.sqrt(dx2*dx2+dy2*dy2);
    const tx0 = bp.x - (dx2/ln) * trailLen;
    const ty0 = bp.y - (dy2/ln) * trailLen;
    const trailGrad = ctx.createLinearGradient(tx0, ty0, bp.x, bp.y);
    trailGrad.addColorStop(0, 'rgba(255,107,53,0)');
    trailGrad.addColorStop(1, 'rgba(255,107,53,0.35)');
    ctx.strokeStyle = trailGrad;
    ctx.lineWidth = BALL_R * 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(tx0, ty0);
    ctx.lineTo(bp.x, bp.y);
    ctx.stroke();
    ctx.lineCap = 'butt';
  }

  // Ball
  const ballGrad = ctx.createRadialGradient(bp.x-4, bp.y-4, 2, bp.x, bp.y, BALL_R);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.3, '#ff8c55');
  ballGrad.addColorStop(1, '#cc3300');
  ctx.shadowColor = 'rgba(255,100,50,0.5)';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(bp.x, bp.y, BALL_R, 0, Math.PI*2);
  ctx.fillStyle = ballGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,150,80,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Ball spin marks
  if (v > 0.1) {
    const spinAngle = (s * PX_PER_M * 0.08) % (Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const a = spinAngle + i * Math.PI * 2/3;
      ctx.beginPath();
      ctx.moveTo(bp.x + Math.cos(a) * 4, bp.y + Math.sin(a) * 4);
      ctx.lineTo(bp.x + Math.cos(a) * BALL_R * 0.8, bp.y + Math.sin(a) * BALL_R * 0.8);
      ctx.stroke();
    }
  }

  // Finish line flash
  if (finished) {
    ctx.fillStyle = `rgba(0,212,255,${0.15 + 0.1 * Math.sin(ts * 0.006)})`;
    ctx.beginPath();
    ctx.arc(rampStart.x, rampStart.y, 30, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,212,255,0.9)';
    ctx.font = '700 11px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DONE', rampStart.x, rampStart.y + 45);
    ctx.textAlign = 'left';
  }

  animId = requestAnimationFrame(draw);
}

function updateTimer(ms) {
  const totalSec = Math.floor(ms / 1000);
  const mins = Math.floor(totalSec / 60).toString().padStart(2,'0');
  const secs = (totalSec % 60).toString().padStart(2,'0');
  const millis = Math.floor(ms % 1000).toString().padStart(3,'0');
  document.getElementById('timerDisplay').innerHTML =
    `${mins}:<span id="tSec">${secs}</span>.<span class="timer-ms">${millis}</span>`;
}

function setStatus(st) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + st;
  txt.textContent = st.toUpperCase();
}

// Controls
document.getElementById('btnStart').addEventListener('click', () => {
  if (finished) return;
  if (!running) {
    if (startTime === null) {
      startTime = performance.now();
    } else if (pauseStart !== null) {
      pausedMs += performance.now() - pauseStart;
      pauseStart = null;
    }
    running = true;
    lastT = null;
    setStatus('running');
  }
});

document.getElementById('btnStop').addEventListener('click', () => {
  if (running) {
    running = false;
    pauseStart = performance.now();
    setStatus('stopped');
  }
});

document.getElementById('btnReset').addEventListener('click', () => {
  running = false;
  finished = false;
  s = 0; v = 0; acc = 0;
  startTime = null; pausedMs = 0; pauseStart = null; lastT = null;
  updateTimer(0);
  document.getElementById('statVel').textContent = '0.00';
  document.getElementById('statAcc').textContent = '0.00';
  document.getElementById('statDist').textContent = '0.00';
  document.getElementById('statH').textContent = '0.00';
  setStatus('ready');
});

const slider = document.getElementById('angleSlider');
slider.addEventListener('input', () => {
  angle = parseInt(slider.value);
  document.getElementById('angleVal').textContent = angle;
  const pct = ((angle - 5) / 80 * 100) + '%';
  slider.style.setProperty('--pct', pct);
  // Reset if running or finished
  document.getElementById('btnReset').click();
});

// Init slider gradient
slider.style.setProperty('--pct', ((30 - 5) / 80 * 100) + '%');

// Start animation loop
requestAnimationFrame(draw);
</script>
</body>
</html>
