<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litmus Paper Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0d14;
    --panel: #13131f;
    --border: #2a2a3d;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --acid-color: #ff4444;
    --neutral-color: #8855ff;
    --base-color: #4488ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 30%, var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .lab-bench {
    width: 100%;
    max-width: 860px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .lab-bench::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* Beakers */
  .beakers-row {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 50px;
    flex-wrap: wrap;
  }

  .beaker-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .beaker-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .beaker-wrap.acid .beaker-label { color: var(--acid-color); }
  .beaker-wrap.neutral .beaker-label { color: var(--neutral-color); }
  .beaker-wrap.base .beaker-label { color: var(--base-color); }

  .beaker {
    width: 90px;
    height: 110px;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .beaker:hover { transform: scale(1.06); }
  .beaker:active { transform: scale(0.97) rotate(-3deg); }

  .beaker svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
    transition: filter 0.3s;
  }

  .beaker-wrap.acid .beaker svg { filter: drop-shadow(0 8px 20px rgba(255,68,68,0.3)); }
  .beaker-wrap.neutral .beaker svg { filter: drop-shadow(0 8px 20px rgba(136,85,255,0.3)); }
  .beaker-wrap.base .beaker svg { filter: drop-shadow(0 8px 20px rgba(68,136,255,0.3)); }

  .liquid {
    transition: fill 0.5s;
  }

  /* pH indicator row */
  .ph-info {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Litmus paper zone */
  .test-zone {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .paper-station {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .paper-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .paper-holder {
    width: 18px;
    height: 100px;
    background: #2a2a3d;
    border-radius: 4px 4px 2px 2px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 4px;
    position: relative;
  }

  .paper-holder::before {
    content: '';
    position: absolute;
    top: 0; left: -4px; right: -4px;
    height: 8px;
    background: #3a3a50;
    border-radius: 3px;
  }

  .litmus-strip {
    width: 12px;
    height: 80px;
    border-radius: 2px;
    position: relative;
    transition: background 0.6s ease, box-shadow 0.6s ease;
  }

  /* Red paper */
  .red-paper .litmus-strip {
    background: linear-gradient(180deg, #cc3333 0%, #ff5555 100%);
    box-shadow: 0 0 8px rgba(255,80,80,0.3);
  }
  /* Blue paper */
  .blue-paper .litmus-strip {
    background: linear-gradient(180deg, #3355cc 0%, #5577ff 100%);
    box-shadow: 0 0 8px rgba(80,120,255,0.3);
  }

  /* Color change states */
  .litmus-strip.acid-red {
    background: linear-gradient(180deg, #cc2222 0%, #ff3333 100%) !important;
    box-shadow: 0 0 16px rgba(255,50,50,0.6) !important;
  }
  .litmus-strip.blue-to-red {
    background: linear-gradient(180deg, #cc3333 0%, #ff4444 60%, #dd3344 100%) !important;
    box-shadow: 0 0 18px rgba(255,60,60,0.7) !important;
  }
  .litmus-strip.neutral-purple {
    background: linear-gradient(180deg, #6633aa 0%, #9955ee 100%) !important;
    box-shadow: 0 0 16px rgba(150,80,240,0.6) !important;
  }
  .litmus-strip.base-blue {
    background: linear-gradient(180deg, #2244bb 0%, #4466ff 100%) !important;
    box-shadow: 0 0 16px rgba(60,100,255,0.6) !important;
  }
  .litmus-strip.red-to-blue {
    background: linear-gradient(180deg, #4466dd 0%, #5588ff 60%, #4466cc 100%) !important;
    box-shadow: 0 0 18px rgba(70,120,255,0.7) !important;
  }

  .litmus-strip.dipping {
    animation: dip 0.8s ease-in-out;
  }

  @keyframes dip {
    0%   { transform: translateY(0); }
    40%  { transform: translateY(18px); }
    60%  { transform: translateY(18px); }
    100% { transform: translateY(0); }
  }

  /* Result panel */
  .result-panel {
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 36px;
    text-align: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color 0.5s, box-shadow 0.5s;
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    transition: color 0.5s;
    color: var(--muted);
  }

  .result-desc {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    line-height: 1.8;
    max-width: 400px;
    transition: color 0.5s;
  }

  .ph-scale {
    width: 100%;
    max-width: 500px;
    margin: 36px auto 0;
  }

  .ph-track {
    height: 10px;
    border-radius: 10px;
    background: linear-gradient(90deg,
      #ff2222 0%,
      #ff6622 14%,
      #ffcc00 28%,
      #aadd22 42%,
      #22cc44 50%,
      #22bbaa 64%,
      #2299ff 78%,
      #4455ff 100%
    );
    position: relative;
    margin-bottom: 8px;
  }

  .ph-marker {
    width: 16px;
    height: 16px;
    background: white;
    border: 2px solid #fff;
    border-radius: 50%;
    position: absolute;
    top: -3px;
    transform: translateX(-50%);
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
    transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    left: 50%;
  }

  .ph-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Bubbles animation */
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    animation: bubble-rise 1.2s ease-out forwards;
  }

  @keyframes bubble-rise {
    0%   { opacity: 0.7; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.3); }
  }

  .instructions {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 28px;
    opacity: 0.7;
  }

  .reset-btn {
    margin-top: 28px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }

  .paper-result-tag {
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 4px;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .paper-result-tag.visible { opacity: 1; }
</style>
</head>
<body>

<h1>Litmus Paper Test</h1>
<p class="instructor">Instructor: Dr. S Karna</p>
<p class="subtitle">Acid · Base · Neutral Detection</p>

<div class="lab-bench">
  <p class="instructions">↓ Click a beaker to dip the litmus papers ↓</p>

  <!-- Beakers -->
  <div class="beakers-row">

    <div class="beaker-wrap acid" onclick="testSolution('acid')">
      <span class="beaker-label">Acid</span>
      <div class="beaker">
        <svg viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="acidGlass" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
            </linearGradient>
          </defs>
          <!-- Beaker body -->
          <path d="M20 10 L20 75 Q20 95 35 95 L55 95 Q70 95 70 75 L70 10 Z"
                fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
          <!-- Lip -->
          <rect x="16" y="8" width="58" height="6" rx="3"
                fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
          <!-- Spout -->
          <path d="M66 10 L76 4" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
          <!-- Liquid -->
          <path class="liquid" id="acid-liquid"
                d="M22 50 Q36 44 45 48 Q54 52 68 46 L68 75 Q68 92 55 92 L35 92 Q22 92 22 75 Z"
                fill="rgba(255,80,80,0.6)"/>
          <!-- Bubbles in liquid -->
          <circle cx="35" cy="70" r="3" fill="rgba(255,120,120,0.4)"/>
          <circle cx="52" cy="65" r="2" fill="rgba(255,120,120,0.3)"/>
          <circle cx="44" cy="75" r="2.5" fill="rgba(255,120,120,0.35)"/>
          <!-- Shine -->
          <path d="M26 30 L26 70" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>
          <!-- Measurement lines -->
          <line x1="22" y1="55" x2="27" y2="55" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <line x1="22" y1="65" x2="27" y2="65" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <line x1="22" y1="75" x2="27" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        </svg>
      </div>
      <span class="ph-info">pH 1–6</span>
    </div>

    <div class="beaker-wrap neutral" onclick="testSolution('neutral')">
      <span class="beaker-label">Neutral</span>
      <div class="beaker">
        <svg viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 10 L20 75 Q20 95 35 95 L55 95 Q70 95 70 75 L70 10 Z"
                fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
          <rect x="16" y="8" width="58" height="6" rx="3"
                fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
          <path d="M66 10 L76 4" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
          <path class="liquid" id="neutral-liquid"
                d="M22 50 Q36 46 45 50 Q54 54 68 48 L68 75 Q68 92 55 92 L35 92 Q22 92 22 75 Z"
                fill="rgba(136,85,255,0.5)"/>
          <circle cx="38" cy="72" r="2" fill="rgba(160,120,255,0.4)"/>
          <circle cx="55" cy="68" r="2.5" fill="rgba(160,120,255,0.3)"/>
          <path d="M26 30 L26 70" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>
          <line x1="22" y1="55" x2="27" y2="55" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <line x1="22" y1="65" x2="27" y2="65" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <line x1="22" y1="75" x2="27" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        </svg>
      </div>
      <span class="ph-info">pH 7</span>
    </div>

    <div class="beaker-wrap base" onclick="testSolution('base')">
      <span class="beaker-label">Base</span>
      <div class="beaker">
        <svg viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 10 L20 75 Q20 95 35 95 L55 95 Q70 95 70 75 L70 10 Z"
                fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
          <rect x="16" y="8" width="58" height="6" rx="3"
                fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
          <path d="M66 10 L76 4" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
          <path class="liquid" id="base-liquid"
                d="M22 50 Q36 46 45 50 Q54 54 68 48 L68 75 Q68 92 55 92 L35 92 Q22 92 22 75 Z"
                fill="rgba(60,120,255,0.55)"/>
          <circle cx="40" cy="68" r="3" fill="rgba(100,160,255,0.4)"/>
          <circle cx="56" cy="73" r="2" fill="rgba(100,160,255,0.3)"/>
          <path d="M26 30 L26 70" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>
          <line x1="22" y1="55" x2="27" y2="55" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <line x1="22" y1="65" x2="27" y2="65" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <line x1="22" y1="75" x2="27" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        </svg>
      </div>
      <span class="ph-info">pH 8–14</span>
    </div>

  </div>

  <!-- Litmus Papers -->
  <div class="test-zone">
    <div class="paper-station">
      <span class="paper-label">Red Paper</span>
      <div class="paper-holder red-paper">
        <div class="litmus-strip" id="red-strip"></div>
      </div>
      <span class="paper-result-tag" id="red-tag"></span>
    </div>

    <div class="result-panel" id="result-panel" style="flex:1; min-width:200px;">
      <div class="result-title" id="result-title">—</div>
      <div class="result-desc" id="result-desc">Click a beaker above to begin the test</div>
    </div>

    <div class="paper-station">
      <span class="paper-label">Blue Paper</span>
      <div class="paper-holder blue-paper">
        <div class="litmus-strip" id="blue-strip"></div>
      </div>
      <span class="paper-result-tag" id="blue-tag"></span>
    </div>
  </div>

  <!-- pH Scale -->
  <div class="ph-scale">
    <div class="ph-track">
      <div class="ph-marker" id="ph-marker"></div>
    </div>
    <div class="ph-labels">
      <span>1 ACID</span>
      <span>4</span>
      <span>7 NEUTRAL</span>
      <span>10</span>
      <span>14 BASE</span>
    </div>
  </div>

  <div style="text-align:center">
    <button class="reset-btn" onclick="resetTest()">↺ Reset</button>
  </div>
</div>

<script>
  const solutions = {
    acid: {
      title: 'ACIDIC',
      desc: 'Red paper stays red.\nBlue paper turns red.\nIndicates H⁺ ions dominant.',
      phMarker: '15%',
      panelBorder: 'rgba(255,68,68,0.5)',
      panelGlow: '0 0 30px rgba(255,68,68,0.15)',
      titleColor: '#ff5555',
      redStrip:  'acid-red',
      blueStrip: 'blue-to-red',
      redTag:  { text: 'NO CHANGE', bg: 'rgba(255,80,80,0.15)', color: '#ff8888' },
      blueTag: { text: 'TURNS RED', bg: 'rgba(255,80,80,0.2)', color: '#ff6666' },
    },
    neutral: {
      title: 'NEUTRAL',
      desc: 'Red paper stays red.\nBlue paper stays blue.\nH⁺ and OH⁻ are balanced.',
      phMarker: '50%',
      panelBorder: 'rgba(136,85,255,0.5)',
      panelGlow: '0 0 30px rgba(136,85,255,0.15)',
      titleColor: '#aa77ff',
      redStrip:  'neutral-purple',
      blueStrip: 'neutral-purple',
      redTag:  { text: 'TURNS PURPLE', bg: 'rgba(136,85,255,0.15)', color: '#bb99ff' },
      blueTag: { text: 'TURNS PURPLE', bg: 'rgba(136,85,255,0.15)', color: '#bb99ff' },
    },
    base: {
      title: 'ALKALINE',
      desc: 'Blue paper stays blue.\nRed paper turns blue.\nIndicates OH⁻ ions dominant.',
      phMarker: '85%',
      panelBorder: 'rgba(68,136,255,0.5)',
      panelGlow: '0 0 30px rgba(68,136,255,0.15)',
      titleColor: '#5599ff',
      redStrip:  'red-to-blue',
      blueStrip: 'base-blue',
      redTag:  { text: 'TURNS BLUE', bg: 'rgba(68,136,255,0.2)', color: '#6699ff' },
      blueTag: { text: 'NO CHANGE', bg: 'rgba(68,136,255,0.15)', color: '#88aaff' },
    }
  };

  let animating = false;

  function testSolution(type) {
    if (animating) return;
    animating = true;

    const sol = solutions[type];
    const redStrip = document.getElementById('red-strip');
    const blueStrip = document.getElementById('blue-strip');

    // Reset strip classes
    redStrip.className = 'litmus-strip';
    blueStrip.className = 'litmus-strip';

    // Dip animation
    setTimeout(() => {
      redStrip.classList.add('dipping');
      blueStrip.classList.add('dipping');

      // Color change mid-dip
      setTimeout(() => {
        redStrip.classList.add(sol.redStrip);
        blueStrip.classList.add(sol.blueStrip);
        spawnBubbles(type);
      }, 400);

      // Show results after dip
      setTimeout(() => {
        showResult(sol);
        animating = false;
      }, 900);
    }, 100);
  }

  function showResult(sol) {
    const panel = document.getElementById('result-panel');
    const title = document.getElementById('result-title');
    const desc  = document.getElementById('result-desc');
    const marker = document.getElementById('ph-marker');
    const redTag = document.getElementById('red-tag');
    const blueTag = document.getElementById('blue-tag');

    panel.style.borderColor = sol.panelBorder;
    panel.style.boxShadow   = sol.panelGlow;
    title.style.color = sol.titleColor;
    title.textContent = sol.title;
    desc.textContent  = sol.desc;
    marker.style.left = sol.phMarker;

    // Tags
    redTag.textContent = sol.redTag.text;
    redTag.style.background = sol.redTag.bg;
    redTag.style.color = sol.redTag.color;
    redTag.style.border = `1px solid ${sol.redTag.color}44`;
    redTag.classList.add('visible');

    blueTag.textContent = sol.blueTag.text;
    blueTag.style.background = sol.blueTag.bg;
    blueTag.style.color = sol.blueTag.color;
    blueTag.style.border = `1px solid ${sol.blueTag.color}44`;
    blueTag.classList.add('visible');
  }

  function spawnBubbles(type) {
    const colors = {
      acid: 'rgba(255,100,100,0.7)',
      neutral: 'rgba(160,100,255,0.7)',
      base: 'rgba(80,140,255,0.7)'
    };

    const bench = document.querySelector('.lab-bench');
    const rect = document.querySelector(`.beaker-wrap.${type}`).getBoundingClientRect();
    const benchRect = bench.getBoundingClientRect();

    for (let i = 0; i < 6; i++) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const size = 4 + Math.random() * 8;
      bubble.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        background: ${colors[type]};
        left: ${rect.left - benchRect.left + Math.random() * 80}px;
        top: ${rect.top - benchRect.top + 60 + Math.random() * 20}px;
        animation-delay: ${Math.random() * 0.4}s;
      `;
      bench.appendChild(bubble);
      setTimeout(() => bubble.remove(), 1600);
    }
  }

  function resetTest() {
    document.getElementById('red-strip').className = 'litmus-strip';
    document.getElementById('blue-strip').className = 'litmus-strip';
    document.getElementById('result-title').textContent = '—';
    document.getElementById('result-title').style.color = 'var(--muted)';
    document.getElementById('result-desc').textContent = 'Click a beaker above to begin the test';
    document.getElementById('result-panel').style.borderColor = 'var(--border)';
    document.getElementById('result-panel').style.boxShadow = 'none';
    document.getElementById('ph-marker').style.left = '50%';
    document.getElementById('red-tag').classList.remove('visible');
    document.getElementById('blue-tag').classList.remove('visible');
    animating = false;
  }
</script>
</body>
</html>
