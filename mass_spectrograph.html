<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mass Spectrograph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04080f;
    color: #a0c8e8;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    min-height: 100vh;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    color: #00d4ff;
    text-align: center;
    padding: 18px 0 4px;
    letter-spacing: 0.15em;
    text-shadow: 0 0 14px rgba(0,212,255,0.5);
  }

  .subtitle {
    text-align: center;
    font-size: 0.6rem;
    color: #3a5a7a;
    letter-spacing: 0.18em;
    padding-bottom: 14px;
  }

  .page {
    display: flex;
    gap: 12px;
    padding: 0 14px 14px;
    max-width: 1080px;
    margin: 0 auto;
  }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel {
    background: #0a1520;
    border: 1px solid #1a3a5c;
    border-radius: 8px;
    padding: 12px;
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.52rem;
    color: #00d4ff;
    letter-spacing: 0.18em;
    border-bottom: 1px solid #1a3a5c;
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  .field-row { margin-bottom: 10px; }
  .field-row:last-child { margin-bottom: 0; }

  .field-row label {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: #5a8ab0;
    margin-bottom: 3px;
  }

  .field-row label span { color: #00d4ff; }

  input[type="range"] {
    width: 100%;
    accent-color: #00d4ff;
    cursor: pointer;
  }

  .iso-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 0.63rem;
    margin-bottom: 4px;
    transition: border-color 0.15s, background 0.15s;
  }

  .iso-row:hover  { border-color: #1a3a5c; }
  .iso-row.active { border-color: #00d4ff; background: rgba(0,212,255,0.06); }

  .iso-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .iso-label { flex: 1; }
  .iso-mass  { font-size: 0.56rem; color: #3a5a7a; }

  .btn-fire {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #00d4ff;
    color: #00d4ff;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    margin-bottom: 8px;
  }

  .btn-fire:hover:not(:disabled) { background: #00d4ff; color: #04080f; }
  .btn-fire:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-reset {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid #3a5a7a;
    color: #3a5a7a;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-reset:hover { border-color: #ff6b35; color: #ff6b35; }

  .physics-box {
    font-size: 0.56rem;
    line-height: 1.75;
    color: #3a5a7a;
    border-top: 1px solid #1a3a5c;
    padding-top: 10px;
    margin-top: 10px;
  }

  .physics-box strong { color: #00d4ff; }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
  }

  .canvas-wrap {
    background: #0a1520;
    border: 1px solid #1a3a5c;
    border-radius: 8px;
    padding: 10px;
  }

  canvas {
    display: block;
    background: #020810;
    border: 1px solid #1a3a5c;
    border-radius: 4px;
  }

  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .card {
    background: #0a1520;
    border: 1px solid #1a3a5c;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.58rem;
    min-width: 130px;
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.54rem;
    margin-bottom: 5px;
  }

  .card-row {
    display: flex;
    justify-content: space-between;
    color: #3a5a7a;
    margin-bottom: 2px;
  }

  .card-row span:last-child { color: #a0c8e8; }

  @media (max-width: 640px) {
    .page { flex-direction: column; }
    .sidebar { width: 100%; }
  }
</style>
</head>
<body>

<h1>MASS SPECTROGRAPH</h1>
<p class="subtitle">ION GUN (BOTTOM-LEFT) · BEAM UPWARD · B INTO PAGE · DEFLECT RIGHT</p>

<div class="page">

  <div class="sidebar">

    <div class="panel">
      <div class="panel-title">Field Parameters</div>
      <div class="field-row">
        <label>Magnetic Field B <span id="lblB">0.80 T</span></label>
        <input type="range" id="slB" min="0.2" max="2.0" step="0.05" value="0.8">
      </div>
      <div class="field-row">
        <label>Voltage V <span id="lblV">5.0 kV</span></label>
        <input type="range" id="slV" min="1" max="20" step="0.5" value="5">
      </div>
      <div class="field-row">
        <label>Charge q <span id="lblQ">+1e</span></label>
        <input type="range" id="slQ" min="1" max="3" step="1" value="1">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Animation Speed</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:0.58rem;color:#3a5a7a">
        <span>Slow</span>
        <input type="range" id="slSpeed" min="1" max="8" step="1" value="3">
        <span>Fast</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Isotopes</div>
      <div id="isoList"></div>
    </div>

    <div class="panel">
      <button class="btn-fire" id="btnFire">&#9889; FIRE IONS</button>
      <button class="btn-reset" id="btnReset">&#8635; Reset</button>
      <div class="physics-box">
        <strong>Physics</strong><br>
        v = &#8730;(2qV / m)<br>
        r = mv / (qB)<br>
        r = (1/B)&#8730;(2mV/q)<br><br>
        B out of page &#8857;<br>
        v upward &#8593;<br>
        F = qv&#215;B &#8594; rightward<br><br>
        Heavier &#8594; larger r<br>
        &#8594; lands farther right
      </div>
    </div>

  </div>

  <div class="main">
    <div class="canvas-wrap">
      <canvas id="cv"></canvas>
    </div>
    <div class="cards" id="cards"></div>
  </div>

</div>

<script>
"use strict";

/* ─── Physical constants ─── */
var AMU     = 1.6605e-27;
var ECHARGE = 1.6022e-19;

/* ─── Isotope data ─── */
var ISOTOPES = [
  { sym:"H-1",   name:"Hydrogen",   mass:1,   col:"#00d4ff" },
  { sym:"H-2",   name:"Deuterium",  mass:2,   col:"#4db8ff" },
  { sym:"C-12",  name:"Carbon",     mass:12,  col:"#39ff14" },
  { sym:"C-13",  name:"Carbon-13",  mass:13,  col:"#00cc00" },
  { sym:"O-16",  name:"Oxygen",     mass:16,  col:"#ff6b35" },
  { sym:"O-18",  name:"Oxygen-18",  mass:18,  col:"#ff3300" },
  { sym:"U-235", name:"Uranium",    mass:235, col:"#ff44cc" },
  { sym:"U-238", name:"Uranium-238",mass:238, col:"#cc00aa" }
];

/* ─── DOM refs ─── */
var cv       = document.getElementById("cv");
var ctx      = cv.getContext("2d");
var slB      = document.getElementById("slB");
var slV      = document.getElementById("slV");
var slQ      = document.getElementById("slQ");
var slSpeed  = document.getElementById("slSpeed");
var lblB     = document.getElementById("lblB");
var lblV     = document.getElementById("lblV");
var lblQ     = document.getElementById("lblQ");
var btnFire  = document.getElementById("btnFire");
var btnReset = document.getElementById("btnReset");
var isoList  = document.getElementById("isoList");
var cardsEl  = document.getElementById("cards");

/* ─── App state ─── */
var selected = [true, true, true, true, false, false, false, false];
var beams    = [];
var animId   = null;
var pulseT   = 0;
var lastTS   = null;

/* ─── Layout values (set in resize()) ─── */
var CW, CH;          /* canvas pixel size */
var GUN_X;           /* x-axis of vertical beam */
var GUN_BOTTOM;      /* bottom of gun body */
var NOZZLE_Y;        /* tip of gun barrel (particle birth point) */
var SLIT_Y;          /* y of slit and detector plate */
var FIELD_TOP;       /* top of the B-field region */

/* ─────────────────────────────────────────
   Slider labels
───────────────────────────────────────── */
slB.oninput = function() { lblB.textContent = parseFloat(slB.value).toFixed(2) + " T"; };
slV.oninput = function() { lblV.textContent = parseFloat(slV.value).toFixed(1) + " kV"; };
slQ.oninput = function() { lblQ.textContent = "+" + slQ.value + "e"; };

/* ─────────────────────────────────────────
   Build isotope toggle list
───────────────────────────────────────── */
function buildIsoList() {
  isoList.innerHTML = "";
  for (var i = 0; i < ISOTOPES.length; i++) {
    (function(idx) {
      var iso = ISOTOPES[idx];
      var row = document.createElement("div");
      row.className = "iso-row" + (selected[idx] ? " active" : "");

      var dot = document.createElement("div");
      dot.className = "iso-dot";
      dot.style.background = iso.col;

      var lbl = document.createElement("span");
      lbl.className = "iso-label";
      lbl.textContent = iso.sym;

      var mass = document.createElement("span");
      mass.className = "iso-mass";
      mass.textContent = iso.mass + " u";

      row.appendChild(dot);
      row.appendChild(lbl);
      row.appendChild(mass);

      row.onclick = function() {
        if (animId) return;
        selected[idx] = !selected[idx];
        row.className = "iso-row" + (selected[idx] ? " active" : "");
      };

      isoList.appendChild(row);
    })(i);
  }
}

/* ─────────────────────────────────────────
   Physics: radius in metres
───────────────────────────────────────── */
function calcRadius(massAMU, B, V_kV, qNum) {
  var m  = massAMU * AMU;
  var V  = V_kV * 1000;
  var q  = qNum * ECHARGE;
  var v  = Math.sqrt(2 * q * V / m);
  return (m * v) / (q * B);
}

/* ─────────────────────────────────────────
   Canvas resize — call once on load and on window resize
───────────────────────────────────────── */
function resize() {
  var wrap = document.getElementById("cv").parentElement;
  CW = (wrap.clientWidth || wrap.offsetWidth || 620) - 22;
  if (CW < 320) CW = 320;
  CH = Math.round(CW * 0.60);
  if (CH < 360) CH = 360;

  cv.width  = CW;
  cv.height = CH;
  cv.style.width  = CW + "px";
  cv.style.height = CH + "px";

  GUN_X       = Math.round(CW * 0.10);
  GUN_BOTTOM  = CH - 18;           /* bottom of gun body — near canvas bottom */
  NOZZLE_Y    = GUN_BOTTOM - 68;   /* nozzle tip — particle born here */
  SLIT_Y      = Math.round(CH * 0.38);  /* slit is HIGH UP on canvas (small Y) */
  FIELD_TOP   = 28;                /* top of B-field region */
}

/* ─────────────────────────────────────────
   Draw rounded rect (no ctx.roundRect needed)
───────────────────────────────────────── */
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ─────────────────────────────────────────
   Draw the static apparatus scene
───────────────────────────────────────── */
function drawScene() {
  var B    = parseFloat(slB.value);
  var V_kV = parseFloat(slV.value);

  /* background */
  ctx.fillStyle = "#020810";
  ctx.fillRect(0, 0, CW, CH);

  /* ── B-field region ── */
  ctx.fillStyle = "rgba(0,18,50,0.5)";
  ctx.fillRect(GUN_X + 4, FIELD_TOP, CW - GUN_X - 14, SLIT_Y - FIELD_TOP);

  /* grid */
  ctx.strokeStyle = "rgba(26,58,92,0.38)";
  ctx.lineWidth = 0.5;
  var gx, gy;
  for (gx = GUN_X + 44; gx < CW - 12; gx += 46) {
    ctx.beginPath(); ctx.moveTo(gx, FIELD_TOP); ctx.lineTo(gx, SLIT_Y); ctx.stroke();
  }
  for (gy = FIELD_TOP + 16; gy < SLIT_Y - 6; gy += 40) {
    ctx.beginPath(); ctx.moveTo(GUN_X + 4, gy); ctx.lineTo(CW - 14, gy); ctx.stroke();
  }

  /* B-field dot symbols (out-of-page) */
  ctx.strokeStyle = "rgba(40,90,180,0.48)";
  ctx.fillStyle   = "rgba(40,90,180,0.40)";
  ctx.lineWidth = 1;
  for (gx = GUN_X + 52; gx < CW - 24; gx += 56) {
    for (gy = FIELD_TOP + 24; gy < SLIT_Y - 18; gy += 52) {
      ctx.beginPath(); ctx.arc(gx, gy, 7, 0, 6.283); ctx.stroke();
      ctx.beginPath(); ctx.arc(gx, gy, 2, 0, 6.283); ctx.fill();
    }
  }

  /* B-field label */
  ctx.fillStyle = "rgba(60,120,200,0.7)";
  ctx.font = "9px 'Share Tech Mono','Courier New',monospace";
  ctx.textAlign = "left";
  ctx.fillText("\u2299  B = " + B.toFixed(2) + " T  (out of page)", GUN_X + 12, FIELD_TOP + 16);

  /* ── Acceleration gap (left of slit, above gun) ── */
  /* negative plate near nozzle (bottom of accel gap) */
  ctx.strokeStyle = "rgba(255,80,30,0.75)";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(GUN_X - 26, NOZZLE_Y + 8);
  ctx.lineTo(GUN_X + 26, NOZZLE_Y + 8);
  ctx.stroke();

  /* positive plate at slit (top of accel gap) */
  ctx.strokeStyle = "rgba(30,200,80,0.75)";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(GUN_X - 26, SLIT_Y + 12);
  ctx.lineTo(GUN_X + 26, SLIT_Y + 12);
  ctx.stroke();

  /* plate labels */
  ctx.font = "11px 'Share Tech Mono','Courier New',monospace";
  ctx.textAlign = "right";
  ctx.fillStyle = "rgba(255,80,30,0.8)";
  ctx.fillText("\u2212", GUN_X - 28, NOZZLE_Y + 12);
  ctx.fillStyle = "rgba(30,200,80,0.8)";
  ctx.fillText("+", GUN_X - 28, SLIT_Y + 16);
  ctx.textAlign = "left";

  /* voltage label */
  ctx.fillStyle = "rgba(200,175,50,0.55)";
  ctx.font = "8px 'Share Tech Mono','Courier New',monospace";
  ctx.textAlign = "center";
  ctx.fillText("V = " + V_kV.toFixed(0) + " kV", GUN_X, (NOZZLE_Y + SLIT_Y) / 2 + 4);
  ctx.textAlign = "left";

  /* upward E-field arrows (from − plate up to + plate) */
  ctx.strokeStyle = "rgba(200,175,50,0.26)";
  ctx.lineWidth = 1;
  var ay;
  for (ay = NOZZLE_Y - 4; ay > SLIT_Y + 22; ay -= 22) {
    var ax = GUN_X + 20;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax, ay - 13); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax, ay - 13); ctx.lineTo(ax - 4, ay - 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax, ay - 13); ctx.lineTo(ax + 4, ay - 7); ctx.stroke();
  }

  /* ── Slit line ── */
  ctx.strokeStyle = "rgba(0,212,255,0.6)";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(4, SLIT_Y);
  ctx.lineTo(GUN_X - 11, SLIT_Y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(GUN_X + 11, SLIT_Y);
  ctx.lineTo(CW - 12, SLIT_Y);
  ctx.stroke();

  /* slit gap dashes */
  ctx.setLineDash([2, 3]);
  ctx.strokeStyle = "rgba(255,255,60,0.6)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(GUN_X - 11, SLIT_Y);
  ctx.lineTo(GUN_X + 11, SLIT_Y);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = "rgba(0,212,255,0.55)";
  ctx.font = "8px 'Share Tech Mono','Courier New',monospace";
  ctx.fillText("SLIT", GUN_X + 14, SLIT_Y - 5);

  /* detector label */
  ctx.fillStyle = "rgba(0,212,255,0.38)";
  ctx.textAlign = "right";
  ctx.fillText("DETECTOR PLATE", CW - 14, SLIT_Y - 5);
  ctx.textAlign = "left";

  /* ── Ion gun body ── */
  var bx = GUN_X;
  var by = GUN_BOTTOM;
  var bw = 44, bh = 66;

  ctx.fillStyle = "rgba(0,55,120,0.72)";
  roundRect(bx - bw / 2, by - bh, bw, bh, 6);
  ctx.fill();

  ctx.strokeStyle = "rgba(0,175,255,0.65)";
  ctx.lineWidth = 1.5;
  roundRect(bx - bw / 2, by - bh, bw, bh, 6);
  ctx.stroke();

  /* barrel walls */
  ctx.strokeStyle = "rgba(0,212,255,0.85)";
  ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.moveTo(bx - 9, by - bh); ctx.lineTo(bx - 9, by - bh - 13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 9, by - bh); ctx.lineTo(bx + 9, by - bh - 13); ctx.stroke();

  /* barrel tip */
  ctx.strokeStyle = "rgba(0,255,200,0.8)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(bx - 10, by - bh - 13); ctx.lineTo(bx + 10, by - bh - 13); ctx.stroke();

  /* gun label */
  ctx.fillStyle = "rgba(0,212,255,0.75)";
  ctx.font = "bold 8px 'Share Tech Mono','Courier New',monospace";
  ctx.textAlign = "center";
  ctx.fillText("ION", bx, by - bh + 20);
  ctx.fillText("GUN", bx, by - bh + 32);
  ctx.textAlign = "left";
}

/* ─────────────────────────────────────────
   Gun glow (animated)
───────────────────────────────────────── */
function drawGunGlow() {
  pulseT += 0.06;
  var p = 0.5 + 0.5 * Math.sin(pulseT);

  /* plasma inside gun */
  var g1 = ctx.createRadialGradient(GUN_X, GUN_BOTTOM - 36, 2, GUN_X, GUN_BOTTOM - 36, 22);
  g1.addColorStop(0, "rgba(255,200,100," + (0.22 + p * 0.18) + ")");
  g1.addColorStop(1, "rgba(255,100,0,0)");
  ctx.fillStyle = g1;
  ctx.beginPath(); ctx.arc(GUN_X, GUN_BOTTOM - 36, 22, 0, 6.283); ctx.fill();

  /* nozzle tip glow */
  var g2 = ctx.createRadialGradient(GUN_X, NOZZLE_Y, 0, GUN_X, NOZZLE_Y, 13);
  g2.addColorStop(0, "rgba(0,255,200," + (0.38 + p * 0.28) + ")");
  g2.addColorStop(1, "rgba(0,200,255,0)");
  ctx.fillStyle = g2;
  ctx.beginPath(); ctx.arc(GUN_X, NOZZLE_Y, 13, 0, 6.283); ctx.fill();

  /* sparks inside gun body */
  for (var k = 0; k < 3; k++) {
    var px = GUN_X - 14 + Math.random() * 28;
    var py = GUN_BOTTOM - 60 + Math.random() * 44;
    ctx.beginPath(); ctx.arc(px, py, 1, 0, 6.283);
    ctx.fillStyle = "rgba(255,215,80," + (Math.random() * 0.5) + ")";
    ctx.fill();
  }
}

/* ─────────────────────────────────────────
   Draw glowing particle
───────────────────────────────────────── */
function drawParticle(x, y, color) {
  var g = ctx.createRadialGradient(x, y, 0, x, y, 11);
  g.addColorStop(0,   color + "bb");
  g.addColorStop(0.4, color + "44");
  g.addColorStop(1,   color + "00");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, 11, 0, 6.283); ctx.fill();

  ctx.shadowBlur  = 10;
  ctx.shadowColor = color;
  ctx.fillStyle   = "#ffffff";
  ctx.beginPath(); ctx.arc(x, y, 3, 0, 6.283); ctx.fill();
  ctx.shadowBlur  = 0;

  ctx.strokeStyle = color;
  ctx.lineWidth   = 1.5;
  ctx.beginPath(); ctx.arc(x, y, 5, 0, 6.283); ctx.stroke();
}

/* ─────────────────────────────────────────
   Draw fading trail
───────────────────────────────────────── */
function drawTrail(trail, color) {
  if (trail.length < 2) return;
  var start = trail.length > 52 ? trail.length - 52 : 0;
  for (var i = start + 1; i < trail.length; i++) {
    var frac  = (i - start) / (trail.length - start);
    var alpha = Math.round(frac * 200);
    var hex   = alpha < 16 ? "0" + alpha.toString(16) : alpha.toString(16);
    ctx.beginPath();
    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
    ctx.lineTo(trail[i].x,     trail[i].y);
    ctx.strokeStyle = color + hex;
    ctx.lineWidth   = 1 + frac * 3;
    ctx.shadowBlur  = frac * 7;
    ctx.shadowColor = color;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

/* ─────────────────────────────────────────
   Draw faint ghost arc (full semicircle path)
───────────────────────────────────────── */
function drawGhostArc(beam) {
  var cx = beam.entryX + beam.rPx;
  ctx.beginPath();
  ctx.arc(cx, SLIT_Y, beam.rPx, Math.PI, 0, false);
  ctx.strokeStyle = beam.col + "20";
  ctx.lineWidth   = 1.5;
  ctx.stroke();
}

/* ─────────────────────────────────────────
   Draw landing dot + label
───────────────────────────────────────── */
function drawLanding(beam) {
  var lx = beam.entryX + beam.rPx * 2;
  if (lx > CW - 14) lx = CW - 14;

  ctx.fillStyle   = beam.col;
  ctx.shadowBlur  = 16;
  ctx.shadowColor = beam.col;
  ctx.beginPath(); ctx.arc(lx, SLIT_Y, 6, 0, 6.283); ctx.fill();
  ctx.shadowBlur  = 0;

  ctx.fillStyle = beam.col;
  ctx.font      = "bold 10px 'Share Tech Mono','Courier New',monospace";
  ctx.textAlign = "center";
  ctx.fillText(beam.sym, lx, SLIT_Y - 13);
  ctx.font      = "8px 'Share Tech Mono','Courier New',monospace";
  ctx.fillStyle = beam.col + "99";
  ctx.fillText("2r=" + Math.round(beam.rPx * 2) + "px", lx, SLIT_Y - 25);
  ctx.textAlign = "left";

  /* dashed diameter line */
  ctx.setLineDash([3, 4]);
  ctx.strokeStyle = beam.col + "2a";
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(beam.entryX, SLIT_Y);
  ctx.lineTo(lx, SLIT_Y);
  ctx.stroke();
  ctx.setLineDash([]);
}

/* ─────────────────────────────────────────
   Arc parametric position
   alpha 0 -> PI  (entry upward, exit rightward landing)

   x = entryX + r*(1 - cos(alpha))
   y = SLIT_Y  - r*sin(alpha)

   alpha=0:    (entryX, SLIT_Y)        velocity = straight up
   alpha=PI/2: (entryX+r, SLIT_Y-r)   peak, velocity = rightward
   alpha=PI:   (entryX+2r, SLIT_Y)    landing
───────────────────────────────────────── */
function arcPoint(beam, alpha) {
  return {
    x: beam.entryX + beam.rPx * (1 - Math.cos(alpha)),
    y: SLIT_Y      - beam.rPx * Math.sin(alpha)
  };
}

/* ─────────────────────────────────────────
   Build beam objects from current settings
───────────────────────────────────────── */
function buildBeams() {
  var B    = parseFloat(slB.value);
  var V_kV = parseFloat(slV.value);
  var q    = parseFloat(slQ.value);

  var items = [];
  var i;
  for (i = 0; i < ISOTOPES.length; i++) {
    if (!selected[i]) continue;
    items.push({
      iso: ISOTOPES[i],
      rM:  calcRadius(ISOTOPES[i].mass, B, V_kV, q)
    });
  }

  if (items.length === 0) return;

  var maxR = 0;
  for (i = 0; i < items.length; i++) {
    if (items[i].rM > maxR) maxR = items[i].rM;
  }

  var availW = CW - GUN_X - 20;
  var availH = SLIT_Y - FIELD_TOP - 10;  /* field is above slit: FIELD_TOP < SLIT_Y */
  var scale  = Math.min(availW / (maxR * 2), availH / maxR);

  beams = [];
  for (i = 0; i < items.length; i++) {
    var rPx = items[i].rM * scale;
    beams.push({
      iso:    items[i].iso,
      sym:    items[i].iso.sym,
      col:    items[i].iso.col,
      rPx:    rPx,
      entryX: GUN_X,
      /* animation */
      phase:  "accel",
      accelY: NOZZLE_Y,
      alpha:  0,
      trail:  [],
      delay:  i * 22
    });
  }

  /* draw heaviest (widest arc) first so lighter ones render on top */
  beams.sort(function(a, b) { return b.iso.mass - a.iso.mass; });
}

/* ─────────────────────────────────────────
   Build info cards below canvas
───────────────────────────────────────── */
function buildCards() {
  cardsEl.innerHTML = "";
  var B    = parseFloat(slB.value);
  var V_kV = parseFloat(slV.value);
  var q    = parseFloat(slQ.value);

  for (var i = 0; i < beams.length; i++) {
    var beam = beams[i];
    var iso  = beam.iso;
    var m    = iso.mass * AMU;
    var qc   = q * ECHARGE;
    var v    = Math.sqrt(2 * qc * V_kV * 1000 / m);
    var rM   = calcRadius(iso.mass, B, V_kV, q);

    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      "<div class='card-title' style='color:" + iso.col + "'>" + iso.sym + " \u2014 " + iso.name + "</div>" +
      "<div class='card-row'><span>Mass</span><span>" + iso.mass + " u</span></div>" +
      "<div class='card-row'><span>Speed</span><span>" + (v / 1e6).toFixed(2) + " Mm/s</span></div>" +
      "<div class='card-row'><span>Radius r</span><span>" + (rM * 100).toFixed(2) + " cm</span></div>" +
      "<div class='card-row'><span>Diameter 2r</span><span>" + (rM * 200).toFixed(2) + " cm</span></div>";
    cardsEl.appendChild(card);
  }
}

/* ─────────────────────────────────────────
   Main animation loop
───────────────────────────────────────── */
function frame(ts) {
  if (!lastTS) lastTS = ts;
  var dt = (ts - lastTS) / 1000;
  if (dt > 0.05) dt = 0.05;
  lastTS = ts;

  var speed      = parseInt(slSpeed.value, 10);
  var angSpeed   = Math.PI / (3.2 / speed);
  var accelSpeed = (NOZZLE_Y - SLIT_Y) / (1.4 / speed);  /* distance upward (positive) */

  /* draw background scene and animated gun glow */
  drawScene();
  drawGunGlow();

  /* ghost arcs behind particles */
  for (var g = 0; g < beams.length; g++) {
    drawGhostArc(beams[g]);
  }

  var allDone = true;
  var i, b, pt;

  for (i = 0; i < beams.length; i++) {
    b = beams[i];

    if (b.phase === "done") {
      drawTrail(b.trail, b.col);
      drawLanding(b);
      continue;
    }

    allDone = false;

    /* stagger delay */
    if (b.delay > 0) {
      b.delay -= speed;
      continue;
    }

    if (b.phase === "accel") {
      b.accelY -= accelSpeed * dt;
      b.trail.push({ x: GUN_X, y: b.accelY });
      if (b.trail.length > 60) b.trail.shift();

      drawTrail(b.trail, b.col);
      drawParticle(GUN_X, b.accelY, b.col);

      if (b.accelY <= SLIT_Y) {
        b.phase  = "arc";
        b.alpha  = 0;
        b.trail  = [{ x: GUN_X, y: SLIT_Y }];
      }

    } else if (b.phase === "arc") {
      b.alpha += angSpeed * dt;
      if (b.alpha >= Math.PI) {
        b.alpha = Math.PI;
        b.phase = "done";
      }

      pt = arcPoint(b, b.alpha);
      b.trail.push(pt);
      if (b.trail.length > 90) b.trail.shift();

      drawTrail(b.trail, b.col);

      if (b.phase === "done") {
        drawLanding(b);
      } else {
        drawParticle(pt.x, pt.y, b.col);
      }
    }
  }

  if (allDone && beams.length > 0) {
    animId = null;
    btnFire.disabled = false;
    return;
  }

  animId = requestAnimationFrame(frame);
}

/* ─────────────────────────────────────────
   Button handlers
───────────────────────────────────────── */
btnFire.onclick = function() {
  var any = false;
  for (var i = 0; i < selected.length; i++) { if (selected[i]) { any = true; break; } }
  if (!any) return;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  lastTS = null;
  buildBeams();
  buildCards();
  btnFire.disabled = true;
  animId = requestAnimationFrame(frame);
};

btnReset.onclick = function() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  beams = [];
  cardsEl.innerHTML = "";
  lastTS = null;
  drawScene();
  btnFire.disabled = false;
};

/* ─────────────────────────────────────────
   Init — wait for full layout via window.onload
───────────────────────────────────────── */
window.addEventListener("resize", function() {
  resize();
  if (!animId) drawScene();
});

window.onload = function() {
  resize();
  buildIsoList();
  drawScene();
  setTimeout(function() { btnFire.click(); }, 350);
};
</script>
</body>
</html>
