
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body-wrap { display: block; }
.wrap { background: #1a1a2e; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; font-family: Arial, sans-serif; }
canvas { background: #16213e; border-radius: 10px; border: 1px solid #0f3460; display: block; }
.controls { background: #16213e; border: 1px solid #0f3460; padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 16px; width: 700px; }
.control-group { display: flex; align-items: center; gap: 15px; }
.control-group label { min-width: 160px; font-weight: bold; color: #a78bfa; font-size: 14px; }
.control-group input[type=range] { flex: 1; height: 6px; border-radius: 3px; background: #0f3460; outline: none; cursor: pointer; -webkit-appearance: none; }
.control-group input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #a78bfa; cursor: pointer; }
.control-group input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #a78bfa; cursor: pointer; border: none; }
.control-group .value { min-width: 80px; text-align: right; font-weight: bold; color: #c4b5fd; font-size: 14px; }
.btns { display: flex; gap: 10px; justify-content: center; }
button { padding: 10px 28px; font-size: 15px; border: none; border-radius: 6px; background: #a78bfa; color: #1a1a2e; cursor: pointer; font-weight: bold; transition: background 0.2s, transform 0.1s; }
button:hover { background: #c4b5fd; transform: translateY(-1px); }
button:active { transform: translateY(0); }
.info { background: #16213e; border: 1px solid #0f3460; padding: 14px 24px; border-radius: 10px; display: flex; gap: 28px; font-size: 15px; }
.info div { color: #a0a8c0; }
.info strong { color: #a78bfa; }
.info span { color: #c4b5fd; font-weight: bold; }
</style>
<div class="wrap">
  <canvas id="canvas" width="700" height="450"></canvas>
  <div class="controls">
    <div class="control-group">
      <label for="lengthSlider">Ramp Length (cm):</label>
      <input type="range" id="lengthSlider" min="50" max="200" value="150" step="5">
      <span class="value" id="lengthValue">150 cm</span>
    </div>
    <div class="control-group">
      <label for="angleSlider">Angle (degrees):</label>
      <input type="range" id="angleSlider" min="10" max="60" value="30" step="1">
      <span class="value" id="angleValue">30°</span>
    </div>
    <div class="btns">
      <button id="startBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
  <div class="info">
    <div><strong>Ramp Length:</strong> <span id="length">150</span> cm</div>
    <div><strong>Angle:</strong> <span id="angle">30.00</span>°</div>
    <div><strong>Time Elapsed:</strong> <span id="time">0.00</span> s</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const lengthSlider = document.getElementById('lengthSlider');
const angleSlider = document.getElementById('angleSlider');
const lengthValue = document.getElementById('lengthValue');
const angleValue = document.getElementById('angleValue');
const lengthDisplay = document.getElementById('length');
const angleDisplay = document.getElementById('angle');
const timeDisplay = document.getElementById('time');
const SCALE = 2.8;
let rampLengthCm = 150, rampAngleDeg = 30;
let startTime = null, elapsedTime = 0;
let ball = { x:0, y:0, radius:14, velocity:0, angle:0, isRolling:false };
const gravity = 0.3, friction = 0.99;

function calcRamp() {
  const rad = rampAngleDeg * Math.PI / 180;
  const px = rampLengthCm * SCALE;
  const sx = 120, sy = 130;
  return { startX:sx, startY:sy, endX:sx+px*Math.cos(rad), endY:sy+px*Math.sin(rad), lengthPx:px, angleRad:rad };
}

function drawRamp(r) {
  ctx.save();
  ctx.translate(r.startX, r.startY);
  ctx.rotate(r.angleRad);
  ctx.fillStyle = '#2d4a7a';
  ctx.fillRect(0, -10, r.lengthPx, 20);
  ctx.strokeStyle = '#4a6fa5';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, -10, r.lengthPx, 20);
  ctx.strokeStyle = '#3a5a8a';
  ctx.lineWidth = 1;
  for (let i = 0; i < r.lengthPx; i += 20) {
    ctx.beginPath(); ctx.moveTo(i,-10); ctx.lineTo(i,10); ctx.stroke();
  }
  ctx.restore();
  ctx.strokeStyle = '#4a6fa5'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(r.startX,r.startY); ctx.lineTo(r.startX,canvas.height-40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r.endX,r.endY); ctx.lineTo(r.endX,canvas.height-40); ctx.stroke();
  ctx.strokeStyle = '#2d4a7a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0,canvas.height-40); ctx.lineTo(canvas.width,canvas.height-40); ctx.stroke();
}

function drawBall() {
  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.fillStyle = 'rgba(167,139,250,0.15)';
  ctx.beginPath(); ctx.ellipse(4,4,ball.radius,ball.radius*0.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#a78bfa';
  ctx.beginPath(); ctx.arc(0,0,ball.radius,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 2; ctx.stroke();
  ctx.rotate(ball.angle);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ball.radius-4,0); ctx.stroke();
  ctx.restore();
}

function updateBall(r) {
  if (!ball.isRolling) return;
  if (startTime===null) startTime = Date.now();
  elapsedTime = (Date.now()-startTime)/1000;
  timeDisplay.textContent = elapsedTime.toFixed(2);
  const dist = Math.sqrt(Math.pow(ball.x-r.startX,2)+Math.pow(ball.y-r.startY,2));
  if (dist < r.lengthPx - ball.radius) {
    ball.velocity += gravity*Math.sin(r.angleRad);
    ball.velocity *= friction;
    ball.x += ball.velocity*Math.cos(r.angleRad);
    ball.y += ball.velocity*Math.sin(r.angleRad);
    ball.angle += ball.velocity/ball.radius;
  } else {
    ball.isRolling = false;
    ball.x = r.endX - ball.radius*Math.cos(r.angleRad);
    ball.y = r.endY - ball.radius*Math.sin(r.angleRad);
    startTime = null;
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const r = calcRamp();
  drawRamp(r); drawBall(); updateBall(r);
  requestAnimationFrame(draw);
}

function reset() {
  const r = calcRamp();
  ball.x = r.startX+25; ball.y = r.startY-18;
  ball.velocity = 0; ball.angle = 0; ball.isRolling = false;
  startTime = null; elapsedTime = 0; timeDisplay.textContent = '0.00';
}

function updateDisplays() {
  lengthValue.textContent = rampLengthCm+' cm'; angleValue.textContent = rampAngleDeg+'°';
  lengthDisplay.textContent = rampLengthCm; angleDisplay.textContent = rampAngleDeg.toFixed(2);
  reset();
}

lengthSlider.addEventListener('input', e => { rampLengthCm = parseInt(e.target.value); updateDisplays(); });
angleSlider.addEventListener('input', e => { rampAngleDeg = parseInt(e.target.value); updateDisplays(); });
startBtn.addEventListener('click', () => { ball.isRolling = true; });
resetBtn.addEventListener('click', reset);
updateDisplays(); draw();
</script>
