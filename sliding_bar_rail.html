
<style>
  *{box-sizing:border-box;}
  @keyframes xpulse{0%,100%{opacity:0.3}50%{opacity:0.85}}
  .xd{animation:xpulse 2.2s ease-in-out infinite;}
  @keyframes curr{stroke-dashoffset:0 to -24}
  .ci{animation:curr-anim 1.2s linear infinite;}
  @keyframes curr-anim{to{stroke-dashoffset:-24}}
  .wrap{background:#0d1117;border-radius:14px;padding:14px;font-family:sans-serif;color:#e6edf3;}
  .row4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px;}
  .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:9px;}
  .clabel{font-size:11px;color:#8b949e;margin-bottom:2px;}
  .cval{font-size:17px;font-weight:600;}
  .slrow{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px;}
  .sllabel{font-size:11px;color:#8b949e;display:flex;justify-content:space-between;margin-bottom:3px;}
  .slval{font-weight:600;color:#e6edf3;}
  input[type=range]{width:100%;accent-color:#58a6ff;}
  .grids{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,0.85fr);gap:10px;align-items:start;}
</style>

<div class="wrap">

<div class="row4">
  <div class="card">
    <div class="clabel">EMF  ε = BLv</div>
    <div id="d-emf" class="cval" style="color:#ffa657;">0.00 V</div>
  </div>
  <div class="card">
    <div class="clabel">Current  I = ε/R</div>
    <div id="d-cur" class="cval" style="color:#58a6ff;">0.00 A</div>
  </div>
  <div class="card">
    <div class="clabel">Force on bar  F = BIL</div>
    <div id="d-frc" class="cval" style="color:#f85149;">0.00 N</div>
  </div>
  <div class="card">
    <div class="clabel">Area swept  A = Lx</div>
    <div id="d-area" class="cval" style="color:#3fb950;">0.00 m²</div>
  </div>
</div>

<div class="slrow">
  <div>
    <div class="sllabel">Speed v (m/s)<span id="v-v" class="slval">2.0</span></div>
    <input type="range" min="0.5" max="10" step="0.5" value="2" id="sl-v">
  </div>
  <div>
    <div class="sllabel">Separation L (m)<span id="v-L" class="slval">1.0</span></div>
    <input type="range" min="0.2" max="2" step="0.1" value="1" id="sl-L">
  </div>
  <div>
    <div class="sllabel">Resistance R (Ω)<span id="v-R" class="slval">5.0</span></div>
    <input type="range" min="1" max="20" step="1" value="5" id="sl-R">
  </div>
</div>

<div class="grids">

      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ahw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g id="field-dots"></g>

  <line id="top-wire"    x1="50" y1="120" x2="330" y2="120" stroke="#484f58" stroke-width="3" stroke-linecap="round"/>
  <line id="bot-wire"    x1="50" y1="280" x2="330" y2="280" stroke="#484f58" stroke-width="3" stroke-linecap="round"/>

  <g id="curr-bot-g">
    <line id="curr-bot" x1="50" y1="282" x2="50" y2="282" stroke="#ffa657" stroke-width="2.5" stroke-dasharray="8 6" stroke-linecap="round"/>
  </g>

  <line id="curr-bar"  x1="200" y1="120" x2="200" y2="280" stroke="#ffa657" stroke-width="2.5" stroke-dasharray="8 6" stroke-linecap="round" opacity="0"/>

  <line id="slide-bar" x1="200" y1="108" x2="200" y2="292" stroke="#58a6ff" stroke-width="5" stroke-linecap="round"/>

  <text id="vel-lbl" x="244" y="205" font-size="11" font-weight="600" fill="#3fb950">v</text>

  <line id="force-arr" x1="200" y1="200" x2="160" y2="200" stroke="#f85149" stroke-width="2.5" marker-end="url(#ah)" opacity="0"/>

  <text x="30" y="128" font-size="10" fill="#8b949e" text-anchor="middle">+</text>

  <text x="190" y="320" font-size="10" fill="#8b949e" text-anchor="middle">+x direction →</text>

  <text x="340" y="128" font-size="10" fill="#8b949e">rail</text>
  <text x="340" y="288" font-size="10" fill="#8b949e">rail</text>

  <text id="lbl-L" x="36" y="202" font-size="12" font-weight="600" fill="#d2a8ff" text-anchor="middle">L</text>
  <line x1="42" y1="120" x2="42" y2="280" stroke="#d2a8ff" stroke-width="0.8" stroke-dasharray="3 3"/>

  <text x="190" y="380" font-size="10" fill="#8b949e" text-anchor="middle">B = 10 T into page (×)</text>

  <rect x="4" y="330" width="150" height="78" rx="7" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="10" y="346" font-size="9" fill="#8b949e">ε = BLv</text>
  <text id="eq1" x="10" y="360" font-size="10" fill="#ffa657"></text>
  <text x="10" y="374" font-size="9" fill="#8b949e">I = ε/R</text>
  <text id="eq2" x="10" y="388" font-size="10" fill="#58a6ff"></text>
  <text x="10" y="400" font-size="9" fill="#8b949e">F = BIL (opposing)</text>
</svg>

<svg width="100%" viewBox="0 0 260 420" id="graph" style="background:#0d1117;border-radius:10px;">
  <defs>
    <marker id="ah3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="130" y="16" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="middle">quantities vs position x</text>

  <line x1="30" y1="28" x2="30" y2="200" stroke="#484f58" stroke-width="0.8" marker-end="url(#ah3)"/>
  <line x1="30" y1="200" x2="248" y2="200" stroke="#484f58" stroke-width="0.8" marker-end="url(#ah3)"/>
  <text x="130" y="215" font-size="9" fill="#8b949e" text-anchor="middle">x (position of bar) →</text>
  <text x="20" y="114" font-size="9" fill="#8b949e" text-anchor="middle" transform="rotate(-90,20,114)">EMF / Force</text>

  <line x1="30" y1="50" x2="248" y2="50" stroke="#21262d" stroke-width="0.5"/>
  <line x1="30" y1="80" x2="248" y2="80" stroke="#21262d" stroke-width="0.5"/>
  <line x1="30" y1="110" x2="248" y2="110" stroke="#21262d" stroke-width="0.5"/>

  <line id="emf-line"  x1="30" y1="110" x2="248" y2="110" stroke="#ffa657" stroke-width="2" stroke-linecap="round"/>
  <line id="frc-line"  x1="30" y1="140" x2="248" y2="140" stroke="#f85149" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 3"/>
  <line id="area-curve" x1="30" y1="200" x2="248" y2="200" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round"/>

  <text x="252" y="114" font-size="9" fill="#ffa657">ε</text>
  <text x="252" y="144" font-size="9" fill="#f85149">F</text>
  <text x="252" y="195" font-size="9" fill="#3fb950">A</text>

  <rect x="30" y="220" width="8" height="3" rx="1" fill="#ffa657"/>
  <text x="42" y="226" font-size="9" fill="#8b949e">EMF (const)</text>
  <line x1="100" y1="222" x2="112" y2="222" stroke="#f85149" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="117" y="226" font-size="9" fill="#8b949e">Force (const)</text>
  <rect x="30" y="234" width="8" height="3" rx="1" fill="#3fb950"/>
  <text x="42" y="240" font-size="9" fill="#8b949e">Area (linear ↑)</text>

  <line id="bar-pos-line" x1="30" y1="28" x2="30" y2="200" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="130" y="265" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="middle">key insight</text>

  <rect x="10" y="272" width="240" height="140" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="20" y="290" font-size="9" fill="#ffa657">ε = BLv = constant</text>
  <text x="20" y="305" font-size="9" fill="#8b949e">Since B, L, v are all constant,</text>
  <text x="20" y="318" font-size="9" fill="#8b949e">the EMF never changes.</text>
  <text x="20" y="336" font-size="9" fill="#f85149">F_brake = B²L²v/R = constant</text>
  <text x="20" y="350" font-size="9" fill="#8b949e">Opposing bar motion (Lenz's law)</text>
  <text x="20" y="368" font-size="9" fill="#3fb950">Φ = B·A = B·L·x  (grows linearly)</text>
  <text x="20" y="382" font-size="9" fill="#8b949e">Flux increases as bar moves right</text>
  <text x="20" y="400" font-size="9" fill="#d2a8ff">Current direction: counterclockwise</text>
</svg>

</div>
</div>

<script>
let spd=2, Lm=1.0, Rm=5.0;
const Bf=10;
const RAIL_X0=50, RAIL_X1=320, RAIL_Y_TOP=120, RAIL_Y_BOT=280;
const RAIL_W=RAIL_X1-RAIL_X0;
const GRAPH_X0=30, GRAPH_X1=246, GRAPH_Y0=200, GRAPH_Y_TOP=32;
const GW=GRAPH_X1-GRAPH_X0, GH=GRAPH_Y0-GRAPH_Y_TOP;

let barX=RAIL_X0+10, lastTs=null, frameN=0;
let currDash=0;

function drawFieldDots(){
  const g=document.getElementById('field-dots'); g.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<9;c++){
    const cx=30+c*38, cy=30+r*46, d=(r*0.2+c*0.12).toFixed(2);
    g.innerHTML+=`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#388bfd" class="xd" style="animation-delay:${d}s">×</text>`;
  }
}

function sa(id,a){const e=document.getElementById(id);if(e)for(const k in a)e.setAttribute(k,a[k]);}
function st(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function sop(id,v){const e=document.getElementById(id);if(e)e.setAttribute('opacity',v);}

function tick(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.04); lastTs=ts; frameN++;

  const pixPerSec=spd*28;
  barX+=pixPerSec*dt;
  if(barX>RAIL_X1-8) barX=RAIL_X0+10;

  const xPos=(barX-RAIL_X0)/28;
  const emf=Bf*Lm*spd;
  const cur=emf/Rm;
  const frc=Bf*cur*Lm;
  const area=Lm*xPos;

  st('d-emf',emf.toFixed(2)+' V');
  st('d-cur',cur.toFixed(2)+' A');
  st('d-frc',frc.toFixed(2)+' N');
  st('d-area',area.toFixed(2)+' m²');
  st('eq1','  = 10 × '+Lm.toFixed(1)+' × '+spd.toFixed(1)+' = '+emf.toFixed(1)+' V');
  st('eq2','  = '+emf.toFixed(1)+'/'+Rm.toFixed(0)+' = '+cur.toFixed(2)+' A');

  sa('slide-bar',{x1:barX,y1:RAIL_Y_TOP-12,x2:barX,y2:RAIL_Y_BOT+12});
  sa('bar-top',{cx:barX,cy:RAIL_Y_TOP});
  sa('bar-bot',{cx:barX,cy:RAIL_Y_BOT});

  sa('swept-rect',{x:RAIL_X0,y:RAIL_Y_TOP,width:barX-RAIL_X0,height:RAIL_Y_BOT-RAIL_Y_TOP});

  sa('vel-arr',{x1:barX,y1:(RAIL_Y_TOP+RAIL_Y_BOT)/2,x2:barX+38,y2:(RAIL_Y_TOP+RAIL_Y_BOT)/2});
  sa('vel-lbl',{x:barX+42,y:(RAIL_Y_TOP+RAIL_Y_BOT)/2+4});
  st('vel-lbl','v='+spd.toFixed(1)+'m/s');

  sa('force-arr',{x1:barX,y1:(RAIL_Y_TOP+RAIL_Y_BOT)/2,x2:barX-38,y2:(RAIL_Y_TOP+RAIL_Y_BOT)/2,opacity:1});
  sa('force-lbl',{x:barX-90,y:(RAIL_Y_TOP+RAIL_Y_BOT)/2+4,opacity:1});
  st('force-lbl','F='+frc.toFixed(1)+'N');

  sa('x-lbl',{x:barX,y:RAIL_Y_TOP-12});
  st('x-lbl','x='+xPos.toFixed(1)+'m');

  currDash+=dt*60;
  const dashOff=(-currDash)%24;
  sa('curr-top',{x1:RAIL_X0,y1:RAIL_Y_TOP-2,x2:barX,y2:RAIL_Y_TOP-2,'stroke-dashoffset':dashOff,opacity:1});
  sa('curr-bot',{x1:barX,y1:RAIL_Y_BOT+2,x2:RAIL_X0,y2:RAIL_Y_BOT+2,'stroke-dashoffset':dashOff,opacity:1});
  sa('curr-left',{x1:RAIL_X0,y1:RAIL_Y_TOP,x2:RAIL_X0,y2:RAIL_Y_BOT,'stroke-dashoffset':dashOff+4,opacity:1});
  sa('curr-bar',{x1:barX,y1:RAIL_Y_BOT,x2:barX,y2:RAIL_Y_TOP,'stroke-dashoffset':dashOff,opacity:1});

  const maxEmf=Bf*2.0*10;
  const maxArea=2.0*((RAIL_W)/28);
  const xFrac=(barX-RAIL_X0)/RAIL_W;
  const gx=GRAPH_X0+GW*xFrac;
  sa('bar-pos-line',{x1:gx,y1:GRAPH_Y_TOP,x2:gx,y2:GRAPH_Y0});

  const emfFrac=Math.min(1,emf/maxEmf);
  const frcFrac=Math.min(1,frc/maxEmf);
  const areaFrac=Math.min(1,xPos*Lm/maxArea);
  const emfY=GRAPH_Y0-GH*(0.3+emfFrac*0.55);
  const frcY=GRAPH_Y0-GH*(0.15+frcFrac*0.45);
  const areaY=GRAPH_Y0-GH*(areaFrac*0.85);
  sa('emf-line',{x1:GRAPH_X0,y1:emfY,x2:GRAPH_X1,y2:emfY});
  sa('frc-line',{x1:GRAPH_X0,y1:frcY,x2:GRAPH_X1,y2:frcY});

  const areaPts=[];
  for(let i=0;i<=30;i++){
    const t=i/30;
    const ax=GRAPH_X0+GW*t;
    const ay=GRAPH_Y0-GH*(t*xFrac*0.85);
    areaPts.push(ax.toFixed(1)+','+ay.toFixed(1));
  }
  document.getElementById('area-curve').setAttribute('points',areaPts.join(' '));

  requestAnimationFrame(tick);
}

function updParams(){
  spd=+document.getElementById('sl-v').value;
  Lm=+document.getElementById('sl-L').value;
  Rm=+document.getElementById('sl-R').value;
  st('v-v',spd.toFixed(1)); st('v-L',Lm.toFixed(1)); st('v-R',Rm.toFixed(1));
  barX=RAIL_X0+10;
}
['sl-v','sl-L','sl-R'].forEach(id=>document.getElementById(id).addEventListener('input',updParams));
drawFieldDots(); updParams(); requestAnimationFrame(tick);
</script>
