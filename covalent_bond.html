<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Covalent Bonding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --crystal: #b8f0ff;
    --bond: #60d8f8;
    --glow: #00eeff;
    --deep: #020b14;
    --accent: #e8f8ff;
  }

  body {
    background: var(--deep);
    font-family: 'Courier Prime', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(0,100,180,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(0,180,220,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(0,40,80,0.6) 0%, transparent 80%);
    pointer-events: none;
  }

  .title-block {
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 10;
  }

  .title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(20px, 3.5vw, 32px);
    letter-spacing: 0.25em;
    color: var(--crystal);
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(184,240,255,0.7), 0 0 50px rgba(0,238,255,0.3);
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(184,240,255,0.4);
    text-transform: uppercase;
    margin-top: 4px;
  }

  canvas {
    border: 1px solid rgba(184,240,255,0.12);
    border-radius: 2px;
    box-shadow:
      0 0 60px rgba(0,180,220,0.12),
      0 0 120px rgba(0,100,180,0.08);
    position: relative;
    z-index: 5;
    display: block;
  }

  .legend {
    display: flex;
    gap: 28px;
    margin-top: 14px;
    position: relative;
    z-index: 10;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(184,240,255,0.5);
    text-transform: uppercase;
  }

  .l-carbon {
    width: 13px; height: 13px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e8f8ff, #60d0f0, #004466);
    box-shadow: 0 0 8px rgba(96,208,240,0.8);
  }

  .l-bond {
    width: 26px; height: 2px;
    background: linear-gradient(90deg, transparent, #60d8f8, transparent);
    box-shadow: 0 0 6px #60d8f8;
  }

  .l-shared {
    width: 8px; height: 8px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #ffe080, #ffaa00);
    box-shadow: 0 0 6px #ffcc00;
  }

  .controls {
    display: flex;
    justify-content: center;
    margin-top: 12px;
    position: relative;
    z-index: 10;
  }

  #pauseBtn {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--crystal);
    background: transparent;
    border: 1px solid rgba(184,240,255,0.3);
    padding: 7px 22px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    box-shadow: 0 0 12px rgba(0,238,255,0.1);
  }

  #pauseBtn:hover {
    background: rgba(184,240,255,0.08);
    border-color: rgba(184,240,255,0.7);
    box-shadow: 0 0 20px rgba(0,238,255,0.3);
    color: #fff;
  }

  #pauseBtn.paused {
    color: #ffe080;
    border-color: rgba(255,220,80,0.5);
    box-shadow: 0 0 16px rgba(255,200,0,0.2);
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="title-block">
  <div class="title">Diamond — Covalent Bonding</div>
  <div class="subtitle">sp³ tetrahedral network · each carbon shares 4 bonds</div>
</div>
<canvas id="c"></canvas>
<div class="legend">
  <div class="legend-item"><div class="l-carbon"></div> Carbon atom</div>
  <div class="legend-item"><div class="l-bond"></div> Covalent bond</div>
  <div class="legend-item"><div class="l-shared"></div> Shared electron pair</div>
</div>
<div class="controls">
  <button id="pauseBtn">⏸ Pause Rotation</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = Math.min(window.innerWidth - 40, 780);
const H = Math.min(window.innerHeight - 170, 490);
canvas.width = W;
canvas.height = H;

// ── Diamond cubic lattice projected to 2D with perspective ──
// Diamond unit cell: FCC + tetrahedral basis
// We'll build a 3D lattice and rotate it

const a = 90; // lattice constant px

// Diamond cubic atom positions (fractional), 2 unit cells
const basis = [
  [0,0,0],[0.5,0.5,0],[0.5,0,0.5],[0,0.5,0.5],
  [0.25,0.25,0.25],[0.75,0.75,0.25],[0.75,0.25,0.75],[0.25,0.75,0.75]
];

const CELLS = 2; // repeat in x,y,z
let atoms3d = [];
for (let ix = 0; ix < CELLS; ix++)
for (let iy = 0; iy < CELLS; iy++)
for (let iz = 0; iz < CELLS; iz++) {
  basis.forEach(b => {
    atoms3d.push([(b[0]+ix)*a, (b[1]+iy)*a, (b[2]+iz)*a]);
  });
}

// Deduplicate close atoms
function dedup(arr) {
  const out = [];
  arr.forEach(p => {
    const dup = out.some(q => Math.abs(q[0]-p[0])<0.1 && Math.abs(q[1]-p[1])<0.1 && Math.abs(q[2]-p[2])<0.1);
    if (!dup) out.push(p);
  });
  return out;
}
atoms3d = dedup(atoms3d);

// Centre
const cx3 = (CELLS*a)/2, cy3 = (CELLS*a)/2, cz3 = (CELLS*a)/2;
atoms3d = atoms3d.map(p => [p[0]-cx3, p[1]-cy3, p[2]-cz3]);

// Bonds: connect atoms within bond length ~0.44*a (nearest neighbor in diamond = a*sqrt(3)/4 ≈ 0.433a)
const BOND_LEN = a * 0.46;
const bonds = [];
for (let i = 0; i < atoms3d.length; i++) {
  for (let j = i+1; j < atoms3d.length; j++) {
    const dx = atoms3d[i][0]-atoms3d[j][0];
    const dy = atoms3d[i][1]-atoms3d[j][1];
    const dz = atoms3d[i][2]-atoms3d[j][2];
    const d = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if (d < BOND_LEN) bonds.push([i, j, d]);
  }
}

// Shared electron pairs — one per bond, animated
const ePairs = bonds.map((b, i) => ({
  bi: b[0], bj: b[1],
  t: Math.random(), // phase 0..1 along bond
  speed: 0.003 + Math.random() * 0.003,
  dir: Math.random() > 0.5 ? 1 : -1,
  glowT: Math.random() * Math.PI * 2,
}));

// 3D rotation
function rotateY(p, a) {
  return [p[0]*Math.cos(a)+p[2]*Math.sin(a), p[1], -p[0]*Math.sin(a)+p[2]*Math.cos(a)];
}
function rotateX(p, a) {
  return [p[0], p[1]*Math.cos(a)-p[2]*Math.sin(a), p[1]*Math.sin(a)+p[2]*Math.cos(a)];
}

// Perspective projection
function project(p, fov, cx, cy) {
  const z = p[2] + fov;
  const scale = fov / z;
  return [p[0]*scale + cx, p[1]*scale + cy, scale];
}

const FOV = 520;
let angleY = 0.3, angleX = 0.25;
let paused = false;

const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ Resume Rotation' : '⏸ Pause Rotation';
  pauseBtn.classList.toggle('paused', paused);
});

function draw(ts) {
  ctx.clearRect(0, 0, W, H);

  // BG
  ctx.fillStyle = '#020b14';
  ctx.fillRect(0, 0, W, H);

  // Subtle radial bg glow
  const bg = ctx.createRadialGradient(W/2, H/2, 10, W/2, H/2, W*0.6);
  bg.addColorStop(0, 'rgba(0,60,100,0.25)');
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Slow rotation
  if (!paused) {
    angleY += 0.004;
    angleX = 0.22 + Math.sin(ts * 0.0003) * 0.06;
  }

  // Transform all atoms
  const tAtoms = atoms3d.map(p => {
    let q = rotateX(p, angleX);
    q = rotateY(q, angleY);
    return q;
  });

  // Project
  const pAtoms = tAtoms.map(p => project(p, FOV, W/2, H/2));

  // Sort bonds by depth (back to front)
  const sortedBonds = bonds.map((b,i) => {
    const zAvg = (tAtoms[b[0]][2] + tAtoms[b[1]][2]) / 2;
    return { b, i, zAvg };
  }).sort((a,b) => a.zAvg - b.zAvg);

  // Draw bonds
  sortedBonds.forEach(({ b, i }) => {
    const pa = pAtoms[b[0]];
    const pb = pAtoms[b[1]];
    const zAvg = (tAtoms[b[0]][2] + tAtoms[b[1]][2]) / 2;
    const depthAlpha = 0.25 + 0.75 * ((zAvg + CELLS*a) / (CELLS*a*2));
    const scaleAvg = (pa[2] + pb[2]) / 2;

    // Bond glow
    const grad = ctx.createLinearGradient(pa[0], pa[1], pb[0], pb[1]);
    grad.addColorStop(0, `rgba(96,216,248,${depthAlpha * 0.3})`);
    grad.addColorStop(0.5, `rgba(96,216,248,${depthAlpha * 0.7})`);
    grad.addColorStop(1, `rgba(96,216,248,${depthAlpha * 0.3})`);

    ctx.beginPath();
    ctx.moveTo(pa[0], pa[1]);
    ctx.lineTo(pb[0], pb[1]);
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(0.8, scaleAvg * 2.5);
    ctx.stroke();

    // Bond inner bright line
    ctx.beginPath();
    ctx.moveTo(pa[0], pa[1]);
    ctx.lineTo(pb[0], pb[1]);
    ctx.strokeStyle = `rgba(200,245,255,${depthAlpha * 0.25})`;
    ctx.lineWidth = Math.max(0.4, scaleAvg * 0.8);
    ctx.stroke();
  });

  // Update & draw shared electron pairs
  ePairs.forEach(ep => {
    ep.t += ep.speed * ep.dir;
    if (ep.t > 1) { ep.t = 1; ep.dir = -1; }
    if (ep.t < 0) { ep.t = 0; ep.dir = 1; }
    ep.glowT += 0.06;

    const ai = tAtoms[ep.bi], aj = tAtoms[ep.bj];
    const pi2 = pAtoms[ep.bi], pj2 = pAtoms[ep.bj];

    const ex = pi2[0] + (pj2[0]-pi2[0]) * ep.t;
    const ey = pi2[1] + (pj2[1]-pi2[1]) * ep.t;
    const ez = ai[2] + (aj[2]-ai[2]) * ep.t;

    const depthA = 0.3 + 0.7 * ((ez + CELLS*a) / (CELLS*a*2));
    const sc = (pi2[2] + (pj2[2]-pi2[2]) * ep.t);
    const r = Math.max(2.5, sc * 5);

    const pulse = 0.7 + 0.3 * Math.sin(ep.glowT);
    const alpha = depthA * pulse;

    // Glow halo
    const glowG = ctx.createRadialGradient(ex, ey, 0, ex, ey, r*3.5);
    glowG.addColorStop(0, `rgba(255,220,60,${alpha*0.5})`);
    glowG.addColorStop(1, 'rgba(255,180,0,0)');
    ctx.beginPath();
    ctx.arc(ex, ey, r*3.5, 0, Math.PI*2);
    ctx.fillStyle = glowG;
    ctx.fill();

    // Electron pair dot
    const eg = ctx.createRadialGradient(ex-r*0.3, ey-r*0.3, 0, ex, ey, r);
    eg.addColorStop(0, `rgba(255,255,220,${alpha})`);
    eg.addColorStop(0.4, `rgba(255,210,40,${alpha})`);
    eg.addColorStop(1, `rgba(200,100,0,0)`);
    ctx.beginPath();
    ctx.arc(ex, ey, r, 0, Math.PI*2);
    ctx.fillStyle = eg;
    ctx.fill();
  });

  // Sort atoms by depth
  const sortedAtomIdx = [...Array(tAtoms.length).keys()].sort((a,b) => tAtoms[a][2]-tAtoms[b][2]);

  // Draw atoms
  sortedAtomIdx.forEach(i => {
    const p = pAtoms[i];
    const tz = tAtoms[i][2];
    const depthA = 0.35 + 0.65 * ((tz + CELLS*a) / (CELLS*a*2));
    const sc = p[2];
    const r = Math.max(5, sc * 14);

    // Outer glow
    const outerG = ctx.createRadialGradient(p[0], p[1], 0, p[0], p[1], r*2.8);
    outerG.addColorStop(0, `rgba(0,200,240,${depthA*0.2})`);
    outerG.addColorStop(1, 'rgba(0,100,180,0)');
    ctx.beginPath();
    ctx.arc(p[0], p[1], r*2.8, 0, Math.PI*2);
    ctx.fillStyle = outerG;
    ctx.fill();

    // Atom body
    const ag = ctx.createRadialGradient(p[0]-r*0.35, p[1]-r*0.35, r*0.05, p[0], p[1], r);
    ag.addColorStop(0, `rgba(232,248,255,${depthA})`);
    ag.addColorStop(0.3, `rgba(100,210,240,${depthA})`);
    ag.addColorStop(0.7, `rgba(0,100,160,${depthA})`);
    ag.addColorStop(1, `rgba(0,30,60,${depthA*0.5})`);
    ctx.beginPath();
    ctx.arc(p[0], p[1], r, 0, Math.PI*2);
    ctx.fillStyle = ag;
    ctx.fill();

    // Rim
    ctx.beginPath();
    ctx.arc(p[0], p[1], r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(160,230,255,${depthA*0.5})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Label C
    if (r > 8) {
      ctx.fillStyle = `rgba(200,240,255,${depthA*0.9})`;
      ctx.font = `bold ${Math.round(r*0.75)}px 'Courier Prime', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('C', p[0], p[1]);
    }
  });

  // Scanlines
  for (let sy = 0; sy < H; sy += 5) {
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.fillRect(0, sy, W, 2);
  }

  // Dr. S Karna watermark
  ctx.save();
  ctx.font = 'bold 13px "Courier Prime", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(184, 240, 255, 0.7)';
  ctx.shadowColor = 'rgba(0, 238, 255, 0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText('Dr. S Karna', W - 12, 12);
  ctx.restore();

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
