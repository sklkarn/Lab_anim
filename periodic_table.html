<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Periodic Table of Elements</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2a 50%, #0a0a1a 100%);
    min-height: 100vh;
    padding: 20px 10px;
    font-family: 'Courier New', monospace;
    color: #e0e0ff;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 8px;
    color: #e0e0ff;
    text-transform: uppercase;
    text-shadow: 0 0 30px #6060ff88;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: #7777bb;
    font-size: 11px;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }
  #info-panel {
    max-width: 400px;
    margin: 0 auto 16px;
    background: #ffffff08;
    border: 1px solid #ffffff18;
    border-radius: 12px;
    padding: 12px 20px;
    min-height: 80px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: all 0.2s;
  }
  .placeholder { color: #444; font-size: 13px; text-align: center; width: 100%; }
  #info-symbol { font-size: 52px; font-weight: 900; line-height: 1; min-width: 70px; text-align: center; }
  #info-name { font-size: 20px; font-weight: 700; color: #e0e0ff; line-height: 1.2; }
  #info-number, #info-weight { font-size: 12px; color: #aaa; margin-top: 2px; }
  #info-number span, #info-weight span { color: #e0e0ff; }
  #info-cat { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-top: 4px; }
  #info-period-group { font-size: 11px; color: #666; margin-left: 8px; }
  #legend { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 16px; }
  .legend-btn {
    border-radius: 20px; padding: 3px 10px; font-size: 10px;
    cursor: pointer; transition: all 0.15s; border: 1px solid;
    font-family: 'Courier New', monospace; background: transparent;
  }
  #table-wrapper { overflow-x: auto; padding-bottom: 8px; }
  .grid-row {
    display: grid;
    grid-template-columns: repeat(18, 54px);
    gap: 3px; margin-bottom: 3px;
  }
  .group-num { text-align: center; font-size: 9px; color: #666; font-weight: 700; }
  .spacer-row { height: 10px; }
  .series-label {
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 6px; font-size: 9px; letter-spacing: 1px;
  }
  .placeholder-cell {
    background: #111125; border: 1px dashed #333; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: #444; min-height: 52px;
  }
  .empty-cell { min-height: 52px; }
  .el-cell {
    background: #1a1a2e; border: 1px solid transparent; border-radius: 6px;
    padding: 4px 2px; cursor: pointer; transition: all 0.18s ease;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-width: 52px; min-height: 52px; position: relative;
  }
  .el-cell:hover { transform: scale(1.13); z-index: 10; }
  .el-cell.active { transform: scale(1.13); z-index: 10; }
  .el-cell.dimmed { opacity: 0.2; background: #1e1e2e !important; }
  .el-num  { font-size: 9px; color: #bbb; line-height: 1; }
  .el-sym  { font-size: 16px; font-weight: 800; line-height: 1.1; }
  .el-name { font-size: 7px; color: #aaa; line-height: 1.2; text-align: center; max-width: 50px; }
  .el-wt   { font-size: 7px; color: #888; }
  .footer  { text-align: center; margin-top: 12px; color: #666; font-size: 10px; }
</style>
</head>

  "transition-metal":"Transition Metal","post-transition":"Post-Transition Metal",
  "metalloid":"Metalloid","nonmetal":"Nonmetal","halogen":"Halogen",
  "noble-gas":"Noble Gas","lanthanide":"Lanthanide","actinide":"Actinide",
};

let selectedEl = null;
let activeFilter = null;

function getEl(period, group) {
  return elements.find(e => e.period === period && e.group === group) || null;
}

function makeCell(el) {
  if (!el) { const d = document.createElement('div'); d.className='empty-cell'; return d; }
  const c = colors[el.cat];
  const div = document.createElement('div');
  div.className = 'el-cell';
  div.dataset.num = el.n;
  div.style.borderColor = c.bg + '55';
  div.innerHTML = `
    <div class="el-num">${el.n}</div>
    <div class="el-sym" style="color:${c.bg}">${el.sym}</div>
    <div class="el-name">${el.name}</div>
    <div class="el-wt">${el.wt}</div>`;
  div.addEventListener('mouseenter', () => showInfo(el));
  div.addEventListener('mouseleave', () => showInfo(selectedEl));
  div.addEventListener('click', () => {
    if (selectedEl === el) { selectedEl = null; clearActive(); showInfo(null); }
    else { selectedEl = el; setActive(el); showInfo(el); }
  });
  return div;
}

function setActive(el) {
  clearActive();
  const c = colors[el.cat];
  document.querySelectorAll(`.el-cell[data-num="${el.n}"]`).forEach(cell => {
    cell.classList.add('active');
    cell.style.background = c.bg;
    cell.style.borderColor = c.bg;
    cell.style.boxShadow = `0 0 14px ${c.bg}88`;
    cell.querySelector('.el-num').style.color = c.text;
    cell.querySelector('.el-sym').style.color = c.text;
    cell.querySelector('.el-name').style.color = c.text;
    cell.querySelector('.el-wt').style.color = c.text + 'cc';
  });
}

function clearActive() {
  document.querySelectorAll('.el-cell').forEach(cell => {
    cell.classList.remove('active');
    const e = elements.find(x => x.n == cell.dataset.num);
    if (!e) return;
    const c = colors[e.cat];
    cell.style.background = '#1a1a2e';
    cell.style.borderColor = c.bg + '55';
    cell.style.boxShadow = 'none';
    cell.querySelector('.el-num').style.color = '#bbb';
    cell.querySelector('.el-sym').style.color = c.bg;
    cell.querySelector('.el-name').style.color = '#aaa';
    cell.querySelector('.el-wt').style.color = '#888';
  });
}

function showInfo(el) {
  const panel = document.getElementById('info-panel');
  if (!el) {
    panel.style.background = '#ffffff08';
    panel.style.borderColor = '#ffffff18';
    panel.innerHTML = '<div class="placeholder">&#8592; Hover or click any element to see details</div>';
    return;
  }
  const c = colors[el.cat];
  panel.style.background = c.bg + '22';
  panel.style.borderColor = c.bg + '66';
  panel.innerHTML = `
    <div id="info-symbol" style="color:${c.bg};text-shadow:0 0 20px ${c.bg}88">${el.sym}</div>
    <div>
      <div id="info-name">${el.name}</div>
      <div id="info-number">Atomic Number: <span>${el.n}</span></div>
      <div id="info-weight">Atomic Weight: <span>${el.wt}</span></div>
      <div style="margin-top:4px">
        <span id="info-cat" style="background:${c.bg}44;color:${c.bg};border:1px solid ${c.bg}66">${catLabels[el.cat]}</span>
        <span id="info-period-group">Period ${el.period > 7 ? el.period-1 : el.period} &middot; Group ${el.group} (${abLabels[el.group]})</span>
      </div>
    </div>`;
}

function applyFilter(cat) {
  document.querySelectorAll('.el-cell').forEach(cell => {
    const e = elements.find(x => x.n == cell.dataset.num);
    if (!e) return;
    if (cat && e.cat !== cat) cell.classList.add('dimmed');
    else cell.classList.remove('dimmed');
  });
}

// Build legend
const legend = document.getElementById('legend');
const catKeys = Object.keys(catLabels);
catKeys.forEach((cat, i) => {
  const c = colors[cat];
  const btn = document.createElement('button');
  btn.className = 'legend-btn';
  btn.textContent = catLabels[cat];
  btn.style.borderColor = c.bg + '66';
  btn.style.color = c.bg;
  btn.addEventListener('click', () => {
    if (activeFilter === cat) {
      activeFilter = null;
      catKeys.forEach((k, j) => {
        const b = legend.children[j];
        b.style.background = 'transparent';
        b.style.color = colors[k].bg;
      });
    } else {
      activeFilter = cat;
      catKeys.forEach((k, j) => {
        const b = legend.children[j];
        if (k === cat) { b.style.background = colors[k].bg; b.style.color = colors[k].text; }
        else { b.style.background = 'transparent'; b.style.color = colors[k].bg; }
      });
    }
    applyFilter(activeFilter);
  });
  legend.appendChild(btn);
});

// Build table
const tableInner = document.getElementById('table-inner');

// A-B group designations (traditional American system)
const abLabels = {
  1:'1A', 2:'2A', 3:'3B', 4:'4B', 5:'5B', 6:'6B', 7:'7B',
  8:'8B', 9:'8B', 10:'8B', 11:'1B', 12:'2B',
  13:'3A', 14:'4A', 15:'5A', 16:'6A', 17:'7A', 18:'8A'
};

// A-B label row
const abRow = document.createElement('div');
abRow.className = 'grid-row';
for (let i = 1; i <= 18; i++) {
  const d = document.createElement('div');
  d.className = 'group-num';
  d.style.cssText = 'font-size:8px;color:#6868aa;letter-spacing:0;';
  d.textContent = abLabels[i];
  abRow.appendChild(d);
}
tableInner.appendChild(abRow);

// Group number row (IUPAC)
const gnRow = document.createElement('div');
gnRow.className = 'grid-row';
for (let i = 1; i <= 18; i++) {
  const d = document.createElement('div');
  d.className = 'group-num';
  d.textContent = i;
  gnRow.appendChild(d);
}
tableInner.appendChild(gnRow);

// Periods 1–7
for (let period = 1; period <= 7; period++) {
  const row = document.createElement('div');
  row.className = 'grid-row';
  for (let group = 1; group <= 18; group++) {
    const el = getEl(period, group);
    if (!el && period === 6 && group === 3) {
      const ph = document.createElement('div');
      ph.className = 'placeholder-cell'; ph.textContent = '57–71';
      row.appendChild(ph);
    } else if (!el && period === 7 && group === 3) {
      const ph = document.createElement('div');
      ph.className = 'placeholder-cell'; ph.textContent = '89–103';
      row.appendChild(ph);
    } else {
      row.appendChild(makeCell(el));
    }
  }
  tableInner.appendChild(row);
}

tableInner.appendChild(Object.assign(document.createElement('div'), {className:'spacer-row'}));

// Lanthanides
const lantRow = document.createElement('div');
lantRow.className = 'grid-row';
const lantLbl = document.createElement('div');
lantLbl.className = 'series-label';
lantLbl.style.cssText = `grid-column:span 2;color:${colors.lanthanide.bg}`;
lantLbl.textContent = 'LANTHANIDES';
lantRow.appendChild(lantLbl);
[57,58,59,60,61,62,63,64,65,66,67,68,69,70,71].forEach(num =>
  lantRow.appendChild(makeCell(elements.find(e => e.n === num))));
lantRow.appendChild(Object.assign(document.createElement('div'), {className:'empty-cell'}));
tableInner.appendChild(lantRow);

// Actinides
const actRow = document.createElement('div');
actRow.className = 'grid-row';
const actLbl = document.createElement('div');
actLbl.className = 'series-label';
actLbl.style.cssText = `grid-column:span 2;color:${colors.actinide.bg}`;
actLbl.textContent = 'ACTINIDES';
actRow.appendChild(actLbl);
[89,90,91,92,93,94,95,96,97,98,99,100,101,102,103].forEach(num =>
  actRow.appendChild(makeCell(elements.find(e => e.n === num))));
actRow.appendChild(Object.assign(document.createElement('div'), {className:'empty-cell'}));
tableInner.appendChild(actRow);
</script>
</body>
