
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Globe — Dr. S Karna</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;600;700&family=Rajdhani:wght@300;400;500&display=swap');

  :root {
    --ocean-light: #1a6090;
    --ocean-dark:  #082040;
    --land:        #2d8a45;
    --land-lite:   #3da055;
    --ice:         #c8dff0;
    --gold:        #ffd080;
    --cyan:        #64c8ff;
    --night:       #000816;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: radial-gradient(ellipse at 40% 40%, #050d1f 0%, #000308 70%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Stars */
  #stars { position:fixed; inset:0; pointer-events:none; z-index:0; }

  /* Top-right corner label */
  .top-right {
    position: fixed;
    top: 22px;
    right: 28px;
    text-align: right;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .instructor-name {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--cyan), #fff, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 8px rgba(100,200,255,0.5));
  }
  .instructor-role {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 4px;
    color: rgba(100,200,255,0.55);
    text-transform: uppercase;
  }


  /* Scene */
  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 1;
  }

  .sublabel {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    color: rgba(100,200,255,0.45);
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  /* Tilt 23.5° */
  .tilt {
    transform: rotate(-23.5deg);
    position: relative;
    filter:
      drop-shadow(0 0 60px rgba(255,180,50,0.25))
      drop-shadow(0 0 30px rgba(30,100,255,0.3));
  }
  /* Axis line */
  .tilt::before, .tilt::after {
    content:'';
    position:absolute;
    left:50%; width:1.5px;
    background: linear-gradient(to bottom, transparent, rgba(100,200,255,0.55), transparent);
    transform:translateX(-50%);
    z-index:10; pointer-events:none;
  }
  .tilt::before { top:-70px; height:70px; }
  .tilt::after  { bottom:-70px; height:70px; }

  .pole { position:absolute; left:50%; width:7px; height:7px; border-radius:50%;
    transform:translateX(-50%); z-index:11;
    background:rgba(150,220,255,0.9);
    box-shadow:0 0 8px rgba(100,200,255,1); }
  .pole-n { top:-74px; }
  .pole-s { bottom:-74px; }

  .globe-wrapper {
    width:340px; height:340px;
    border-radius:50%;
    position:relative; overflow:hidden;
    box-shadow:
      0 0 100px rgba(255,180,50,0.28),
      0 0 180px rgba(20,80,255,0.12);
  }

  /* Specular */
  .globe-wrapper::before {
    content:''; position:absolute; inset:0; border-radius:50%;
    background: radial-gradient(circle at 30% 26%,
      rgba(255,255,220,0.24) 0%,
      rgba(255,255,200,0.09) 20%,
      transparent 48%);
    z-index:7; pointer-events:none;
  }
  /* Atmosphere rim */
  .globe-wrapper::after {
    content:''; position:absolute; inset:-12px; border-radius:50%;
    background: radial-gradient(circle at 30% 30%,
      rgba(180,220,255,0.06) 40%,
      rgba(80,160,255,0.2) 65%,
      rgba(30,80,220,0.28) 78%,
      rgba(10,30,150,0.1) 88%,
      transparent 100%);
    pointer-events:none; z-index:5;
  }

  .map-strip {
    position:absolute; top:0; left:0;
    width:200%; height:100%;
    animation: spin 16s linear infinite;
  }
  @keyframes spin {
    from { transform:translateX(0); }
    to   { transform:translateX(-50%); }
  }
  #mapCanvas { display:block; height:340px; width:1020px; }

  #termCanvas {
    position:absolute; inset:0;
    border-radius:50%; z-index:4; pointer-events:none;
  }
</style>

(function(){
  const s = document.getElementById('stars');
  s.width  = window.innerWidth;
  s.height = window.innerHeight;
  const sc = s.getContext('2d');
  for(let i=0;i<280;i++){

    sc.beginPath(); sc.arc(x,y,r,0,Math.PI*2);

/* ════════════════════════════════════════════════
   MAP CANVAS RENDERING
════════════════════════════════════════════════ */
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');
canvas.height = GH;
canvas.width  = GW * 3;

function drawHalf(ox) {
  ctx.save();
  ctx.beginPath(); ctx.rect(ox, 0, GW, GH); ctx.clip();

  // Ocean gradient
  const og = ctx.createLinearGradient(ox, 0, ox+GW, GH);
  og.addColorStop(0,   '#1a6090');
  og.addColorStop(0.45,'#1565a0');
  og.addColorStop(1,   '#082040');
  ctx.fillStyle = og;
  ctx.fillRect(ox, 0, GW, GH);

  // Ocean shimmer lines
  ctx.strokeStyle = 'rgba(100,180,255,0.07)';
  ctx.lineWidth = 0.5;
  for(let i=0.05; i<1; i+=0.08){
    ctx.beginPath();
    ctx.moveTo(ox, i*GH);
    ctx.lineTo(ox+GW, (i+0.03)*GH);
    ctx.stroke();
  }

  // Continents
  for(const cont of continents){
    ctx.beginPath();
    const first = cont.pts[0];
    ctx.moveTo(ox + first[0]*GW, first[1]*GH);
    for(let i=1;i<cont.pts.length;i++){
      ctx.lineTo(ox + cont.pts[i][0]*GW, cont.pts[i][1]*GH);
    }
    ctx.closePath();

    // Fill with subtle gradient
    const lg = ctx.createLinearGradient(ox, 0, ox+GW, GH);
    lg.addColorStop(0, lighten(cont.color, 20));
    lg.addColorStop(1, darken(cont.color, 20));
    ctx.fillStyle = lg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,30,0,0.4)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(150,210,255,0.10)';
  ctx.lineWidth = 0.5;
  for(let lat=0.1; lat<1; lat+=0.1){
    ctx.beginPath(); ctx.moveTo(ox, lat*GH); ctx.lineTo(ox+GW, lat*GH); ctx.stroke();
  }
  for(let lon=0.1; lon<1; lon+=0.1){
    ctx.beginPath(); ctx.moveTo(ox+lon*GW, 0); ctx.lineTo(ox+lon*GW, GH); ctx.stroke();
  }
  // Equator
  ctx.strokeStyle = 'rgba(100,210,255,0.30)';
  ctx.lineWidth = 1.0;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(ox, GH*0.5); ctx.lineTo(ox+GW, GH*0.5); ctx.stroke();
  // Tropics
  ctx.strokeStyle = 'rgba(255,200,100,0.18)';
  ctx.lineWidth = 0.7;
  ctx.setLineDash([2,6]);
  const tropicN = (90-23.5)/180;
  const tropicS = (90+23.5)/180;
  ctx.beginPath(); ctx.moveTo(ox, tropicN*GH); ctx.lineTo(ox+GW, tropicN*GH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, tropicS*GH); ctx.lineTo(ox+GW, tropicS*GH); ctx.stroke();
  ctx.setLineDash([]);

  // Continent labels
  ctx.font = 'bold 9px Orbitron, monospace';
  ctx.textAlign = 'center';
  for(const lb of contLabels){
    const [lx,ly] = ll(lb.lon, lb.lat);
    const px = ox + lx*GW;
    const py = ly*GH;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(lb.name, px+1, py+1);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(lb.name, px, py);
  }

  ctx.restore();
}

function lighten(hex, amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,((n>>16)&0xff)+amt);
  const g=Math.min(255,((n>>8)&0xff)+amt);
  const b=Math.min(255,(n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,((n>>16)&0xff)-amt);
  const g=Math.max(0,((n>>8)&0xff)-amt);
  const b=Math.max(0,(n&0xff)-amt);
  return `rgb(${r},${g},${b})`;
}

drawHalf(0); drawHalf(GW); drawHalf(GW*2);

/* ════════════════════════════════════════════════
   TERMINATOR OVERLAY
════════════════════════════════════════════════ */
const tC = document.getElementById('termCanvas');
const tX = tC.getContext('2d');
const R  = 170;

(function drawTerminator(){
  tX.clearRect(0,0,340,340);
  tX.save();
  tX.beginPath(); tX.arc(R,R,R,0,Math.PI*2); tX.clip();

  // Dayside warm glow (left)
  const dg = tX.createRadialGradient(100,140,0, 100,140,300);
  dg.addColorStop(0.00,'rgba(255,240,180,0.30)');
  dg.addColorStop(0.25,'rgba(255,220,150,0.18)');
  dg.addColorStop(0.55,'rgba(180,200,255,0.06)');
  dg.addColorStop(1.00,'rgba(0,0,0,0)');
  tX.fillStyle = dg; tX.fillRect(0,0,340,340);

  // Nightside dark (right)
  const ng = tX.createRadialGradient(240,170,20, 230,170,210);
  ng.addColorStop(0.00,'rgba(0,0,12,0.88)');
  ng.addColorStop(0.30,'rgba(0,0,16,0.80)');
  ng.addColorStop(0.60,'rgba(0,0,20,0.45)');
  ng.addColorStop(0.85,'rgba(0,0,10,0.10)');
  ng.addColorStop(1.00,'rgba(0,0,0,0)');
  tX.fillStyle = ng; tX.fillRect(0,0,340,340);

  // Terminator glow
  const tg = tX.createLinearGradient(155,0,195,0);
  tg.addColorStop(0,  'rgba(255,160,60,0.00)');
  tg.addColorStop(0.4,'rgba(255,150,50,0.20)');
  tg.addColorStop(0.6,'rgba(255,130,30,0.14)');
  tg.addColorStop(1,  'rgba(255,100,20,0.00)');
  tX.fillStyle = tg; tX.fillRect(148,0,55,340);

  // City lights
  const lights = [
    [235,108],[245,113],[228,120],[238,126],[250,120],
    [242,130],[232,135],[255,130],[262,124],[268,132],
    [222,145],[232,148],[244,152],[256,144],[234,158],
    [244,162],[252,156],[224,170],[235,174],[225,185],
    [228,118],[218,112],[260,140],[265,136]
  ];
  for(const [cx,cy] of lights){
    const dist = Math.hypot(cx-230, cy-170);
    const a = Math.min(0.65, dist/130) * 0.75;
    tX.beginPath(); tX.arc(cx,cy,1.3,0,Math.PI*2);
    tX.fillStyle=`rgba(255,230,140,${a})`; tX.fill();
  }

  tX.restore();
})();

/* ════════════════════════════════════════════════
   DOWNLOAD
════════════════════════════════════════════════ */
function downloadGlobe(){
  // Render composite to an offscreen canvas
  const out = document.createElement('canvas');
  out.width = 800; out.height = 600;
  const oc = out.getContext('2d');

  // Dark background
  const bg = oc.createRadialGradient(300,250,0, 400,300,600);
  bg.addColorStop(0,'#050d1f'); bg.addColorStop(1,'#000308');
  oc.fillStyle = bg; oc.fillRect(0,0,800,600);

  // Stars
  for(let i=0;i<220;i++){
    oc.beginPath();
    oc.arc(Math.random()*800, Math.random()*600, Math.random()*1.1+0.2, 0, Math.PI*2);
    oc.fillStyle=`rgba(255,255,255,${Math.random()*0.8+0.15})`; oc.fill();
  }

  // Title
  oc.font = 'bold 16px Orbitron, monospace';
  oc.textAlign = 'right';
  oc.fillStyle = '#fff';
  oc.fillText('Dr. S Karna', 780, 36);
  oc.font = '11px Rajdhani, sans-serif';
  oc.fillStyle = 'rgba(100,200,255,0.6)';
  oc.letterSpacing = '4px';
  oc.fillText('INSTRUCTOR', 780, 54);

  oc.font = '10px Orbitron, monospace';
  oc.textAlign = 'center';
  oc.fillStyle = 'rgba(100,200,255,0.45)';
  oc.fillText('EARTH — 23.5° AXIAL TILT', 400, 30);

  // Globe (grab the wrapper element)
  const wrapper = document.getElementById('globeWrapper');
  // Use html2canvas polyfill-free approach: draw map + terminator canvases
  const px = (800 - 340)/2, py = (600 - 340)/2;

  // Clip to circle
  oc.save();
  oc.beginPath(); oc.arc(px+170, py+170, 170, 0, Math.PI*2); oc.clip();

  // Get current scroll position of map strip
  const strip = document.querySelector('.map-strip');
  const style = window.getComputedStyle(strip);
  const matrix = new DOMMatrix(style.transform);
  const offsetX = matrix.m41; // translateX value

  // Draw map
  oc.drawImage(canvas, -offsetX, 0, GW*3, GH, px, py, 340, 340);
  // Draw terminator
  oc.drawImage(tC, 0,0,340,340, px,py,340,340);
  oc.restore();

  // Atmosphere rim
  const rim = oc.createRadialGradient(px+110,py+110, 60, px+170,py+170, 185);
  rim.addColorStop(0.6,'rgba(80,160,255,0.0)');
  rim.addColorStop(0.78,'rgba(60,130,230,0.22)');
  rim.addColorStop(0.9,'rgba(20,60,180,0.18)');
  rim.addColorStop(1,'rgba(0,0,0,0)');
  oc.beginPath(); oc.arc(px+170,py+170,190,0,Math.PI*2);
  oc.fillStyle=rim; oc.fill();

  // Specular
  const spec = oc.createRadialGradient(px+105,py+95, 0, px+105,py+95, 100);
  spec.addColorStop(0,'rgba(255,255,220,0.2)');
  spec.addColorStop(1,'rgba(255,255,200,0)');
  oc.save(); oc.beginPath(); oc.arc(px+170,py+170,170,0,Math.PI*2); oc.clip();
  oc.fillStyle=spec; oc.fillRect(px,py,340,340); oc.restore();
}
</script>
