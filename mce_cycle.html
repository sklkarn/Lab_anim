
<!DOCTYPE html>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;font-family:sans-serif;color:#e8e6de}
.wrap{width:100%;max-width:760px;margin:0 auto;padding:12px 8px 20px}
.stage-bar{display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.stage-pill{padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid #2a2d38;color:#888;cursor:pointer;transition:all .3s;background:#161a22}
.stage-pill.active{color:#0f1117;font-weight:600}
.stage-pill[data-s="0"].active{background:#378ADD;border-color:#378ADD}
.stage-pill[data-s="1"].active{background:#EF9F27;border-color:#EF9F27}
.stage-pill[data-s="2"].active{background:#D85A30;border-color:#D85A30}
.stage-pill[data-s="3"].active{background:#5DCAA5;border-color:#5DCAA5}
.desc-box{background:#161a22;border:1px solid #2a2d38;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;line-height:1.6;min-height:56px}
.desc-box .eq{font-family:monospace;color:#EF9F27;font-size:12px}
.controls{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.btn{padding:6px 18px;border-radius:8px;border:1px solid #2a2d38;background:#1e2230;color:#e8e6de;cursor:pointer;font-size:13px;transition:all .2s}
.btn:hover{background:#2a2d40;border-color:#555}
.btn.play-btn{background:#185FA5;border-color:#378ADD;color:#fff}
.btn.play-btn:hover{background:#2271c4}
.speed-label{font-size:12px;color:#888}
</style>

<div class="wrap">
  <div style="text-align:center;font-size:14px;font-weight:500;color:#e8e6de;margin-bottom:10px;letter-spacing:.3px">Magnetocaloric cycle</div>

  <div class="stage-bar">
    <div class="stage-pill active" data-s="0" onclick="goTo(0)">① Isothermal magnetisation</div>
    <div class="stage-pill" data-s="1" onclick="goTo(1)">② Thermal isolation</div>
    <div class="stage-pill" data-s="2" onclick="goTo(2)">③ Adiabatic demagnetisation</div>
    <div class="stage-pill" data-s="3" onclick="goTo(3)">④ Heat absorption</div>
  </div>

  <div class="desc-box" id="desc"></div>

  <svg width="100%" viewBox="0 0 680 320" id="main-svg" style="display:block">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- LEFT PANEL: Spin lattice -->
    <rect x="16" y="10" width="300" height="300" rx="12" fill="#0a1320" stroke="#1e2d42" stroke-width="1"/>
    <text font-family="sans-serif" font-size="12" fill="#5fa8e8" x="166" y="30" text-anchor="middle">Spin system</text>

    <!-- SPIN ARROWS group -->
    <g id="spins"></g>

    <!-- Entropy bar bg -->
    <rect x="36" y="276" width="260" height="10" rx="4" fill="#0c1e30" stroke="#1e3a58" stroke-width="0.5"/>
    <rect id="entropy-bar" x="36" y="276" width="260" height="10" rx="4" fill="#378ADD"/>
    <text font-family="sans-serif" font-size="10" fill="#5fa8e8" x="166" y="270" text-anchor="middle" id="entropy-label">S_spin: HIGH</text>

    <!-- RIGHT PANEL: Lattice -->
    <rect x="368" y="10" width="300" height="300" rx="12" fill="#0a1a10" stroke="#0f2a1c" stroke-width="1"/>
    <text font-family="sans-serif" font-size="12" fill="#5DCAA5" x="518" y="30" text-anchor="middle">Lattice vibrations</text>

    <!-- ATOMS group -->
    <g id="atoms"></g>

    <!-- Temp bar bg -->
    <rect x="388" y="276" width="260" height="10" rx="4" fill="#0a1a10" stroke="#0f2a1c" stroke-width="0.5"/>
    <rect id="temp-bar" x="388" y="276" width="130" height="10" rx="4" fill="#0F6E56"/>
    <text font-family="sans-serif" font-size="10" fill="#5DCAA5" x="518" y="270" text-anchor="middle" id="temp-label">T: normal</text>

    <!-- FIELD arrow overlay -->
    <g id="field-group" opacity="0">
      <line x1="166" y1="48" x2="166" y2="244" stroke="#EF9F27" stroke-width="1" stroke-dasharray="5 4" opacity="0.5"/>
      <text font-family="sans-serif" font-size="11" fill="#EF9F27" x="188" y="148" transform="rotate(-90,188,148)">H field →</text>
    </g>

    <!-- HEAT arrows (right panel) -->
    <g id="heat-out" opacity="0">
      <line x1="502" y1="80" x2="502" y2="52" stroke="#D85A30" stroke-width="2" marker-end="url(#arr)"/>
      <line x1="518" y1="80" x2="518" y2="52" stroke="#D85A30" stroke-width="2" marker-end="url(#arr)"/>
      <line x1="534" y1="80" x2="534" y2="52" stroke="#D85A30" stroke-width="2" marker-end="url(#arr)"/>
      <text font-family="sans-serif" font-size="10" fill="#D85A30" x="518" y="48" text-anchor="middle">heat out</text>
    </g>
    <g id="heat-in" opacity="0">
      <line x1="502" y1="52" x2="502" y2="80" stroke="#5DCAA5" stroke-width="2" marker-end="url(#arr)"/>
      <line x1="518" y1="52" x2="518" y2="80" stroke="#5DCAA5" stroke-width="2" marker-end="url(#arr)"/>
      <line x1="534" y1="52" x2="534" y2="80" stroke="#5DCAA5" stroke-width="2" marker-end="url(#arr)"/>
      <text font-family="sans-serif" font-size="10" fill="#5DCAA5" x="518" y="48" text-anchor="middle">heat in</text>
    </g>

    <!-- ISOLATION shield -->
    <g id="isolation-shield" opacity="0">
      <rect x="362" y="5" width="312" height="312" rx="14" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="8 5"/>
      <text font-family="sans-serif" font-size="11" fill="#888" x="518" y="328" text-anchor="middle">thermally isolated</text>
    </g>
  </svg>

  <div class="controls">
    <button class="btn play-btn" id="play-btn" onclick="togglePlay()">&#9654; Auto-play</button>
    <button class="btn" onclick="prevStage()">&#8592; Prev</button>
    <button class="btn" onclick="nextStage()">Next &#8594;</button>
    <span class="speed-label">Speed</span>
    <input type="range" min="1" max="5" value="2" id="speed-slider" style="width:80px">
  </div>
</div>

<script>
const COLS = 5, ROWS = 5;
const SX0 = 42, SY0 = 50, SGAP = 52;
const AX0 = 394, AY0 = 50, AGAP = 52;

const STAGES = [
  {
    title: "① Isothermal magnetisation — Apply H, connected to heat bath",
    eq: "S_spin ↓,  Q released to bath,  T = const",
    spinOrder: 0,     // 0=random, 1=aligning, 2=aligned
    heat: "out",
    isolation: false,
    field: true,
    entropyW: 260,
    entropyColor: "#378ADD",
    tempW: 130,
    tempColor: "#0F6E56",
    tempText: "T: normal",
    entropyText: "S_spin: HIGH → LOW",
    atomAmp: 1.0
  },
  {
    title: "② Thermal isolation — Disconnect heat switch",
    eq: "dS_total = 0,  system sealed",
    spinOrder: 2,
    heat: "none",
    isolation: true,
    field: true,
    entropyW: 60,
    entropyColor: "#EF9F27",
    tempW: 130,
    tempColor: "#0F6E56",
    tempText: "T: normal",
    entropyText: "S_spin: LOW",
    atomAmp: 1.0
  },
  {
    title: "③ Adiabatic demagnetisation — Remove H slowly",
    eq: "S_spin ↑,  S_lat ↑,  T falls sharply  →  T − ΔT",
    spinOrder: 3,     // re-disordering
    heat: "none",
    isolation: true,
    field: false,
    entropyW: 200,
    entropyColor: "#5fa8e8",
    tempW: 48,
    tempColor: "#185FA5",
    tempText: "T − ΔT: COLD",
    entropyText: "S_spin: rising",
    atomAmp: 0.3
  },
  {
    title: "④ Heat absorption — Material cools load",
    eq: "S_lat ↑,  heat absorbed from cold reservoir",
    spinOrder: 0,
    heat: "in",
    isolation: false,
    field: false,
    entropyW: 260,
    entropyColor: "#378ADD",
    tempW: 210,
    tempColor: "#D85A30",
    tempText: "T: warming",
    entropyText: "S_spin: HIGH",
    atomAmp: 0.5
  }
];

let currentStage = 0;
let animFrame = null;
let playing = false;
let playTimer = null;
let spinAngles = [];
let targetAngles = [];
let atomPhases = [];
let atomAmps = [];
let targetAmps = [];
let tick = 0;

// Build spin arrows
const spinsG = document.getElementById('spins');
const atomsG = document.getElementById('atoms');

for (let i = 0; i < COLS; i++) {
  for (let j = 0; j < ROWS; j++) {
    // Spin arrow
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("stroke","#5fa8e8");
    line.setAttribute("stroke-width","2");
    line.setAttribute("stroke-linecap","round");
    line.setAttribute("marker-end","url(#arr)");
    line.setAttribute("id",`spin-${i}-${j}`);
    spinsG.appendChild(line);

    const idx = i * ROWS + j;
    spinAngles[idx] = Math.random() * Math.PI * 2;
    targetAngles[idx] = spinAngles[idx];

    // Atom
    const g = document.createElementNS("http://www.w3.org/2000/svg","g");
    const cx = AX0 + i * AGAP;
    const cy = AY0 + j * AGAP;

    const circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
    circle.setAttribute("cx", cx);
    circle.setAttribute("cy", cy);
    circle.setAttribute("r","9");
    circle.setAttribute("fill","#085041");
    circle.setAttribute("stroke","#5DCAA5");
    circle.setAttribute("stroke-width","1");
    circle.setAttribute("id",`atom-c-${i}-${j}`);

    const wave = document.createElementNS("http://www.w3.org/2000/svg","path");
    wave.setAttribute("fill","none");
    wave.setAttribute("stroke","#5DCAA5");
    wave.setAttribute("stroke-width","1.2");
    wave.setAttribute("id",`atom-w-${i}-${j}`);

    g.appendChild(circle);
    g.appendChild(wave);
    atomsG.appendChild(g);

    atomPhases[idx] = Math.random() * Math.PI * 2;
    atomAmps[idx] = 12;
    targetAmps[idx] = 12;
  }
}

const descs = [
  `<b style="color:#378ADD">Step 1 — Isothermal magnetisation</b><br>Field H is applied while the material stays connected to a heat bath. Magnetic spins align, <span class="eq">S_spin ↓</span>. The entropy decrease releases heat to the bath at constant temperature <span class="eq">T</span>.`,
  `<b style="color:#EF9F27">Step 2 — Thermal isolation</b><br>The heat switch is opened. The system is now sealed — no heat can enter or leave. Spins remain aligned, <span class="eq">S_total = const</span>.`,
  `<b style="color:#D85A30">Step 3 — Adiabatic demagnetisation</b><br>Field H is slowly removed. Spins disorder again <span class="eq">S_spin ↑</span>. Since total entropy is fixed, lattice entropy cannot rise — phonon energy is <i>taken</i> from the lattice, so <span class="eq">T drops → T − ΔT</span>.`,
  `<b style="color:#5DCAA5">Step 4 — Heat absorption</b><br>The cold material absorbs heat from the load being refrigerated. Lattice vibrations grow, <span class="eq">S_lat ↑</span>. The cycle then repeats — back to step 1.`
];

function setSpinTargets(order) {
  for (let i = 0; i < COLS*ROWS; i++) {
    if (order === 2) targetAngles[i] = -Math.PI/2; // all up
    else if (order === 1) targetAngles[i] = -Math.PI/2 + (spinAngles[i] + Math.PI/2) * 0.4;
    else targetAngles[i] = Math.random() * Math.PI * 2;
  }
}

function goTo(s) {
  currentStage = s;
  const st = STAGES[s];

  // Update pills
  document.querySelectorAll('.stage-pill').forEach(p => p.classList.toggle('active', +p.dataset.s === s));

  // Description
  document.getElementById('desc').innerHTML = descs[s];

  // Entropy bar
  const eb = document.getElementById('entropy-bar');
  eb.style.transition = 'width 0.7s';
  eb.setAttribute('width', st.entropyW);
  eb.setAttribute('fill', st.entropyColor);
  document.getElementById('entropy-label').textContent = st.entropyText;

  // Temp bar
  const tb = document.getElementById('temp-bar');
  tb.style.transition = 'width 0.7s';
  tb.setAttribute('width', st.tempW);
  tb.setAttribute('fill', st.tempColor);
  document.getElementById('temp-label').textContent = st.tempText;

  // Field
  document.getElementById('field-group').setAttribute('opacity', st.field ? '1' : '0');

  // Heat arrows
  document.getElementById('heat-out').setAttribute('opacity', st.heat === 'out' ? '1' : '0');
  document.getElementById('heat-in').setAttribute('opacity', st.heat === 'in' ? '1' : '0');

  // Isolation
  document.getElementById('isolation-shield').setAttribute('opacity', st.isolation ? '1' : '0');

  // Spin targets
  setSpinTargets(st.spinOrder);

  // Atom amplitude targets
  for (let i = 0; i < COLS*ROWS; i++) {
    targetAmps[i] = st.atomAmp * (8 + Math.random() * 8);
  }

  // Atom colors
  const hot = s === 2 ? false : s === 1 ? false : s === 3 ? true : false;
  const cold = s === 2;
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      const c = document.getElementById(`atom-c-${i}-${j}`);
      if (cold) { c.setAttribute('fill','#041a30'); c.setAttribute('stroke','#185FA5'); }
      else if (hot) { c.setAttribute('fill','#2a0c04'); c.setAttribute('stroke','#D85A30'); }
      else { c.setAttribute('fill','#085041'); c.setAttribute('stroke','#5DCAA5'); }
    }
  }
}

function drawFrame() {
  tick++;
  const t = tick * 0.04;

  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      const idx = i * ROWS + j;
      const cx = SX0 + i * SGAP;
      const cy = SY0 + j * SGAP;
      const line = document.getElementById(`spin-${i}-${j}`);

      // Lerp angle
      let diff = targetAngles[idx] - spinAngles[idx];
      while (diff > Math.PI) diff -= Math.PI*2;
      while (diff < -Math.PI) diff += Math.PI*2;
      spinAngles[idx] += diff * 0.04;

      const ang = spinAngles[idx];
      const len = 16;
      line.setAttribute("x1", cx - Math.cos(ang)*len*0.3);
      line.setAttribute("y1", cy - Math.sin(ang)*len*0.3);
      line.setAttribute("x2", cx + Math.cos(ang)*len*0.7);
      line.setAttribute("y2", cy + Math.sin(ang)*len*0.7);

      // Atom oscillation
      atomAmps[idx] += (targetAmps[idx] - atomAmps[idx]) * 0.03;
      const amp = atomAmps[idx];
      const px = atomPhases[idx];
      const wx = AX0 + i * AGAP;
      const wy = AY0 + j * AGAP;

      // Wavy line around atom
      const npts = 6;
      let d = `M ${wx - amp},${wy}`;
      for (let k = 1; k <= npts; k++) {
        const xk = wx - amp + (2*amp/npts)*k;
        const yk = wy + (k%2===0?-1:1) * amp * 0.55 * Math.sin(t*1.8 + px + k);
        d += ` L ${xk},${yk}`;
      }
      document.getElementById(`atom-w-${i}-${j}`).setAttribute('d', d);
    }
  }

  animFrame = requestAnimationFrame(drawFrame);
}

function nextStage() { goTo((currentStage+1)%4); }
function prevStage() { goTo((currentStage+3)%4); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('play-btn');
  if (playing) {
    btn.textContent = '⏸ Pause';
    btn.style.background = '#444';
    btn.style.borderColor = '#666';
    scheduleNext();
  } else {
    btn.innerHTML = '&#9654; Auto-play';
    btn.style.background = '#185FA5';
    btn.style.borderColor = '#378ADD';
    clearTimeout(playTimer);
  }
}

function scheduleNext() {
  if (!playing) return;
  const speed = +document.getElementById('speed-slider').value;
  const delay = [3000, 2200, 1600, 1100, 700][speed-1];
  playTimer = setTimeout(() => { nextStage(); scheduleNext(); }, delay);
}

goTo(0);
drawFrame();
</script>
