<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metallic Bonding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(18px, 3vw, 28px);
    letter-spacing: 0.3em;
    color: #00cfff;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 30px rgba(0,207,255,0.6), 0 0 60px rgba(0,207,255,0.3);
    position: relative;
    z-index: 10;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(0,207,255,0.5);
    margin-bottom: 20px;
    text-transform: uppercase;
    position: relative;
    z-index: 10;
  }

  canvas {
    border: 1px solid rgba(0,207,255,0.15);
    border-radius: 4px;
    box-shadow:
      0 0 40px rgba(0,150,255,0.1),
      inset 0 0 60px rgba(0,0,0,0.5);
    position: relative;
    z-index: 5;
  }

  .legend {
    display: flex;
    gap: 30px;
    margin-top: 16px;
    position: relative;
    z-index: 10;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(200,220,255,0.6);
    text-transform: uppercase;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-ion { background: radial-gradient(circle at 35% 35%, #fff8e0, #e8a020, #8b5a00); box-shadow: 0 0 8px #e8a020; }
  .legend-electron { background: radial-gradient(circle at 35% 35%, #a0e8ff, #0090e0, #003060); box-shadow: 0 0 6px #00b4ff; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="title">Metallic Bonding</div>
<div class="subtitle">Delocalized electron sea model</div>
<canvas id="canvas"></canvas>
<div class="legend">
  <div class="legend-item">
    <div class="legend-dot legend-ion"></div>
    Metal cation (lattice)
  </div>
  <div class="legend-item">
    <div class="legend-dot legend-electron"></div>
    Free electron (delocalized)
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = Math.min(window.innerWidth - 40, 760);
const H = Math.min(window.innerHeight - 180, 480);
canvas.width = W;
canvas.height = H;

const COLS = 7, ROWS = 5;
const padX = 70, padY = 60;
const spacingX = (W - padX * 2) / (COLS - 1);
const spacingY = (H - padY * 2) / (ROWS - 1);
const ION_R = 22;

const ions = [];
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    ions.push({
      baseX: padX + c * spacingX,
      baseY: padY + r * spacingY,
      x: 0, y: 0,
      phase: Math.random() * Math.PI * 2,
      freq: 0.6 + Math.random() * 0.4,
      amp: 1.5 + Math.random() * 1.5,
    });
  }
}

const NUM_ELECTRONS = 38;
const electrons = [];
for (let i = 0; i < NUM_ELECTRONS; i++) {
  electrons.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 2.8,
    vy: (Math.random() - 0.5) * 2.8,
    r: 3.5 + Math.random() * 2,
    trail: [],
    glowPhase: Math.random() * Math.PI * 2,
  });
}

function makeIonGrad(x, y, r) {
  const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.05, x, y, r);
  g.addColorStop(0, '#fff8e8');
  g.addColorStop(0.25, '#f0c060');
  g.addColorStop(0.6, '#c07010');
  g.addColorStop(1, 'rgba(60,20,0,0)');
  return g;
}

function makeElectronGrad(x, y, r) {
  const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.05, x, y, r);
  g.addColorStop(0, '#e0f8ff');
  g.addColorStop(0.3, '#40c8ff');
  g.addColorStop(0.7, '#0070c0');
  g.addColorStop(1, 'rgba(0,20,60,0)');
  return g;
}

let t = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  bg.addColorStop(0, '#07101e');
  bg.addColorStop(1, '#020508');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ions.forEach(ion => {
    ion.x = ion.baseX + Math.sin(t * ion.freq + ion.phase) * ion.amp;
    ion.y = ion.baseY + Math.cos(t * ion.freq * 0.8 + ion.phase + 1) * ion.amp;
  });

  ctx.save();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const ion = ions[idx];
      if (c < COLS - 1) {
        const neighbor = ions[idx + 1];
        const grd = ctx.createLinearGradient(ion.x, ion.y, neighbor.x, neighbor.y);
        grd.addColorStop(0, 'rgba(200,130,0,0.18)');
        grd.addColorStop(0.5, 'rgba(220,160,20,0.32)');
        grd.addColorStop(1, 'rgba(200,130,0,0.18)');
        ctx.strokeStyle = grd;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(ion.x, ion.y);
        ctx.lineTo(neighbor.x, neighbor.y);
        ctx.stroke();
      }
      if (r < ROWS - 1) {
        const neighbor = ions[idx + COLS];
        const grd = ctx.createLinearGradient(ion.x, ion.y, neighbor.x, neighbor.y);
        grd.addColorStop(0, 'rgba(200,130,0,0.18)');
        grd.addColorStop(0.5, 'rgba(220,160,20,0.32)');
        grd.addColorStop(1, 'rgba(200,130,0,0.18)');
        ctx.strokeStyle = grd;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(ion.x, ion.y);
        ctx.lineTo(neighbor.x, neighbor.y);
        ctx.stroke();
      }
    }
  }
  ctx.restore();

  electrons.forEach(e => {
    e.x += e.vx;
    e.y += e.vy;

    if (e.x < e.r) { e.x = e.r; e.vx = Math.abs(e.vx); }
    if (e.x > W - e.r) { e.x = W - e.r; e.vx = -Math.abs(e.vx); }
    if (e.y < e.r) { e.y = e.r; e.vy = Math.abs(e.vy); }
    if (e.y > H - e.r) { e.y = H - e.r; e.vy = -Math.abs(e.vy); }

    ions.forEach(ion => {
      const dx = ion.x - e.x;
      const dy = ion.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < ION_R + 2 && dist > 0) {
        e.vx -= (dx / dist) * 0.4;
        e.vy -= (dy / dist) * 0.4;
        const spd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
        if (spd > 3.2) { e.vx *= 3.2/spd; e.vy *= 3.2/spd; }
      }
    });

    e.trail.push({ x: e.x, y: e.y });
    if (e.trail.length > 18) e.trail.shift();

    if (e.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(e.trail[0].x, e.trail[0].y);
      for (let i = 1; i < e.trail.length; i++) {
        ctx.lineTo(e.trail[i].x, e.trail[i].y);
      }
      ctx.strokeStyle = `rgba(0, 180, 255, 0.18)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    e.glowPhase += 0.04;
    const gAlpha = 0.12 + 0.06 * Math.sin(e.glowPhase);
    const glowR = e.r * 4;
    const glowG = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, glowR);
    glowG.addColorStop(0, `rgba(0,200,255,${gAlpha})`);
    glowG.addColorStop(1, 'rgba(0,100,200,0)');
    ctx.beginPath();
    ctx.arc(e.x, e.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = glowG;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fillStyle = makeElectronGrad(e.x, e.y, e.r);
    ctx.fill();
  });

  ions.forEach(ion => {
    const glow = ctx.createRadialGradient(ion.x, ion.y, ION_R * 0.5, ion.x, ion.y, ION_R * 2.2);
    glow.addColorStop(0, 'rgba(220, 150, 0, 0.18)');
    glow.addColorStop(1, 'rgba(220, 150, 0, 0)');
    ctx.beginPath();
    ctx.arc(ion.x, ion.y, ION_R * 2.2, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(ion.x, ion.y, ION_R, 0, Math.PI * 2);
    ctx.fillStyle = makeIonGrad(ion.x, ion.y, ION_R);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(ion.x, ion.y, ION_R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(240,180,40,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,230,150,0.75)';
    ctx.font = 'bold 9px "Share Tech Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('M⁺', ion.x, ion.y);
  });

  ctx.save();
  for (let sy = 0; sy < H; sy += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0, sy, W, 2);
  }
  ctx.restore();

  // Dr. S Karna watermark
  ctx.save();
  ctx.font = 'bold 13px "Share Tech Mono", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(0, 207, 255, 0.7)';
  ctx.shadowColor = 'rgba(0, 207, 255, 0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText('Dr. S Karna', W - 12, 12);
  ctx.restore();

  t += 0.018;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
