<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Height Lab — Dr. S Karna</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Nunito:wght@400;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #04080f;
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

canvas {
  display: block;
  width: 100%;
  flex: 1;
  min-height: 0;
}

/* ── Bottom bar ───────────────────────────────────────── */
.bar {
  flex-shrink: 0;
  width: 100%;
  background: #060d18;
  border-top: 1px solid #1a2a40;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
}

/* Timer */
.timer-wrap { display: flex; flex-direction: column; align-items: center; }
.lcd {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 2.2rem;
  font-weight: 600;
  letter-spacing: 3px;
  color: #1a4a2a;
  line-height: 1;
  transition: color .2s, text-shadow .2s;
}
.lcd.run  { color: #00ff66; text-shadow: 0 0 16px #00ff6677; }
.lcd.done { color: #ffcc00; text-shadow: 0 0 16px #ffcc0077; }
.lcd-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .6rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: #1a4a2a;
  margin-top: 2px;
}
.lcd-status.run  { color: #00ff66; }
.lcd-status.done { color: #ffcc00; }

/* Slider */
.slider-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.slider-label { font-size: .62rem; color: #3a6a8a; text-transform: uppercase; letter-spacing: .1em; font-family: 'IBM Plex Mono', monospace; }
input[type=range] {
  -webkit-appearance: none;
  width: 150px; height: 6px;
  background: linear-gradient(90deg,#102a18,#00ff66);
  border-radius: 3px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 17px; height: 17px; border-radius: 50%;
  background: #ffcc00; box-shadow: 0 0 7px #ffcc0077;
  border: 2px solid rgba(255,255,255,.2);
}
.slider-val { font-family: 'IBM Plex Mono', monospace; font-size: .72rem; color: #ffcc00; }

/* Buttons */
.btn-throw {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: .1em;
  padding: 10px 36px; border-radius: 9px; border: none; cursor: pointer;
  background: linear-gradient(135deg,#ff3a1a,#cc2200);
  color: #fff;
  box-shadow: 0 4px 0 #7a0000, 0 0 18px #ff440022;
  transition: all .1s;
}
.btn-throw:hover  { background: linear-gradient(135deg,#ff5533,#dd3311); }
.btn-throw:active { transform: translateY(3px); box-shadow: 0 1px 0 #7a0000; }
.btn-throw:disabled { background: #1a1a1a; color: #444; box-shadow: none; transform: none; cursor: not-allowed; }

.btn-reset {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .88rem;
  padding: 10px 18px; border-radius: 8px;
  border: 1px solid #1a3a28; cursor: pointer;
  background: rgba(8,20,12,.9); color: #2a7a4a;
  transition: all .15s;
}
.btn-reset:hover { border-color: #00ff66; color: #00ff66; }

/* Readouts */
.readouts { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px; }
.ro { display: flex; flex-direction: column; }
.ro-lbl { font-size: .55rem; color: #2a5a7a; text-transform: uppercase; letter-spacing: .1em; font-family: 'IBM Plex Mono', monospace; }
.ro-val { font-family: 'IBM Plex Mono', monospace; font-size: .82rem; color: #70b8f0; font-weight: 600; }

/* Result box */
.result {
  background: rgba(0,18,8,.8);
  border: 1px solid #00ff6622;
  border-radius: 8px;
  padding: 7px 13px; min-width: 175px;
  display: none;
}
.result.show { display: block; }
.result-title { font-size: .58rem; color: #2a8a5a; text-transform: uppercase; letter-spacing: .1em; font-family: 'IBM Plex Mono', monospace; margin-bottom: 3px; }
.result-eq { font-family: 'IBM Plex Mono', monospace; font-size: .76rem; color: #70ffaa; line-height: 1.85; }
.result-eq b { color: #ffee80; }

/* Trials */
.trials { display: flex; flex-direction: column; gap: 2px; max-height: 75px; overflow-y: auto; min-width: 140px; }
.t-lbl { font-size: .58rem; color: #2a5a7a; text-transform: uppercase; letter-spacing: .1em; font-family: 'IBM Plex Mono', monospace; margin-bottom: 3px; }
.t-row { font-family: 'IBM Plex Mono', monospace; font-size: .73rem; color: #4a8aaa; }
.t-row b { color: #70ffaa; }
.t-avg { font-family: 'IBM Plex Mono', monospace; font-size: .73rem; color: #00ff66; margin-top: 3px; border-top: 1px solid #00ff6618; padding-top: 3px; }

@media (max-width: 680px) {
  .result, .trials { display: none !important; }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="bar">
  <div class="timer-wrap">
    <div class="lcd" id="lcd">0.000</div>
    <div class="lcd-status" id="lcdStatus">READY</div>
  </div>

  <div class="slider-wrap">
    <div class="slider-label">Launch Power (%)</div>
    <input type="range" id="power" min="10" max="100" value="60" step="1">
    <div class="slider-val" id="powerVal">60%</div>
  </div>

  <button class="btn-throw" id="throwBtn" onclick="throwBall()">🔴 THROW</button>
  <button class="btn-reset" onclick="resetSim()">↺ Reset</button>

  <div class="readouts">
    <div class="ro"><span class="ro-lbl">Height</span><span class="ro-val" id="roH">0.00 m</span></div>
    <div class="ro"><span class="ro-lbl">Velocity</span><span class="ro-val" id="roV">0.00 m/s</span></div>
    <div class="ro"><span class="ro-lbl">Peak</span><span class="ro-val" id="roPeak">— m</span></div>
    <div class="ro"><span class="ro-lbl">Air Time</span><span class="ro-val" id="roTime">— s</span></div>
  </div>

  <div class="result" id="result">
    <div class="result-title">📐 Kinematics Result</div>
    <div class="result-eq" id="resultEq"></div>
  </div>

  <div class="trials">
    <div class="t-lbl">📋 Trials</div>
    <div id="trialsList"><span style="color:#1a4a2a;font-family:'IBM Plex Mono';font-size:.72rem">No throws yet</span></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const G         = 9.81;  // gravity m/s²
const BALL_R    = 10;    // ball radius px
const GND_PAD   = 55;    // ground from canvas bottom px
const SCALE     = 40;    // px per metre — 1 m = 40 px

// ═══════════════════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

let W = 0, H = 0;   // logical (CSS) dimensions
let groundY  = 0;   // y of ground line  (logical px)
let treeX    = 0;   // x centre of tree  (logical px)
let treeTopY = 0;   // y of tree tip     (logical px)
let treeH_px = 0;   // tree height       (logical px)
let treeH_m  = 0;   // tree height       (metres)

function setupCanvas() {
  const rect = canvas.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  groundY  = H - GND_PAD;
  treeX    = W * 0.50;
  // Tree occupies 72 % of available vertical space above ground
  treeH_px = (groundY - 40) * 0.72;
  treeH_m  = treeH_px / SCALE;
  treeTopY = groundY - treeH_px;
}

// ═══════════════════════════════════════════════════════════════════
//  SIMULATION STATE  (physics in SI: metres, m/s, seconds)
// ═══════════════════════════════════════════════════════════════════
let phase      = 'idle';   // idle | rising | falling | landed
let ball_h     = 0;        // height above ground [m]
let ball_vy    = 0;        // velocity upward     [m/s]
let ballX      = 0;        // fixed x             [px]

let timerStart   = 0;
let elapsed      = 0;
let timerRunning = false;

let peakH   = 0;   // peak height [m]
let peakYpx = 0;   // peak y canvas coord [px]

let trail  = [];
let trials = [];
let lastTS = null;

// ── place ball on ground ────────────────────────────────────────
function placeBallOnGround() {
  ball_h  = 0;
  ball_vy = 0;
  // Position ball to the left of the tree base
  ballX   = treeX - 100;
}

// ── ball canvas Y from its height in metres ─────────────────────
// canvas Y = groundY  when ball_h = 0
// canvas Y = treeTopY when ball_h = treeH_m  ✓
function ballCanvasY() {
  return groundY - ball_h * SCALE;
}

// ═══════════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════════
function getPower() {
  return parseInt(document.getElementById('power').value) / 100; // 0–1
}

function throwBall() {
  if (phase === 'rising' || phase === 'falling') return;

  // v₀ at 100 % power reaches exactly the treetop:
  //   h_max = v₀² / (2g)  →  v₀_max = √(2·g·treeH_m)
  // At power p: v₀ = p·v₀_max  →  h_max = p²·treeH_m
  const v0_max = Math.sqrt(2 * G * treeH_m);
  const v0     = getPower() * v0_max;

  ball_h  = 0;
  ball_vy = v0;
  ballX   = treeX - 100;
  trail   = [];
  peakH   = 0;
  phase   = 'rising';

  timerStart   = performance.now();
  timerRunning = true;
  elapsed      = 0;
  lastTS       = null;

  document.getElementById('throwBtn').disabled = true;
  document.getElementById('result').classList.remove('show');
}

function resetSim() {
  phase        = 'idle';
  timerRunning = false;
  elapsed      = 0;
  trail        = [];
  peakH        = 0;
  placeBallOnGround();

  setLCD('0.000', '', 'READY');
  document.getElementById('throwBtn').disabled = false;
  document.getElementById('result').classList.remove('show');
  document.getElementById('roH').textContent    = '0.00 m';
  document.getElementById('roV').textContent    = '0.00 m/s';
  document.getElementById('roPeak').textContent = '— m';
  document.getElementById('roTime').textContent = '— s';
}

// ═══════════════════════════════════════════════════════════════════
//  PHYSICS  (Euler integration, SI throughout)
// ═══════════════════════════════════════════════════════════════════
function physicsStep(dt) {
  if (phase !== 'rising' && phase !== 'falling') return;

  ball_vy -= G * dt;          // gravity reduces upward velocity
  ball_h  += ball_vy * dt;    // update height

  // Detect peak (velocity crosses zero)
  if (phase === 'rising' && ball_vy <= 0) phase = 'falling';

  // Track highest point
  if (ball_h > peakH) {
    peakH   = ball_h;
    peakYpx = ballCanvasY();
  }

  // Record trail
  trail.push({ x: ballX, y: ballCanvasY() });
  if (trail.length > 80) trail.shift();

  // Landing: ball returns to ground (h ≤ 0) while falling
  if (phase === 'falling' && ball_h <= 0) {
    ball_h  = 0;
    ball_vy = 0;
    phase   = 'landed';
    timerRunning = false;
    setLCD(elapsed.toFixed(3), 'done', '● STOPPED');
    onLanded();
  }
}

function onLanded() {
  document.getElementById('throwBtn').disabled = false;

  const t    = elapsed;
  const hCalc = G * t * t / 8;   // h = g·t²/8  (from full flight time)
  const v0    = G * t / 2;        // v₀ = g·t/2

  trials.push({ t: t.toFixed(3), h: hCalc.toFixed(2) });
  renderTrials();

  document.getElementById('roPeak').textContent = peakH.toFixed(2) + ' m';
  document.getElementById('roTime').textContent = t.toFixed(3) + ' s';

  document.getElementById('result').classList.add('show');
  document.getElementById('resultEq').innerHTML =
    `t_flight = <b>${t.toFixed(3)} s</b><br>` +
    `v₀ = g·t/2 = <b>${v0.toFixed(2)} m/s</b><br>` +
    `h = g·t²/8 = <b>${hCalc.toFixed(2)} m</b>`;
}

function renderTrials() {
  const el = document.getElementById('trialsList');
  if (!trials.length) {
    el.innerHTML = `<span style="color:#1a4a2a;font-family:'IBM Plex Mono';font-size:.72rem">No throws yet</span>`;
    return;
  }
  const avg = (trials.reduce((s, r) => s + parseFloat(r.h), 0) / trials.length).toFixed(2);
  el.innerHTML =
    trials.map((r, i) =>
      `<div class="t-row">#${i + 1}  ${r.t}s → <b>${r.h} m</b></div>`
    ).join('') +
    (trials.length > 1 ? `<div class="t-avg">avg h̄ = ${avg} m</div>` : '');
}

// ═══════════════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════════════
function setLCD(val, cls, status) {
  const lcd = document.getElementById('lcd');
  const st  = document.getElementById('lcdStatus');
  lcd.textContent = val;
  lcd.className   = 'lcd ' + cls;
  st.textContent  = status;
  st.className    = 'lcd-status ' + cls;
}

function updateTimerDisplay(ts) {
  if (!timerRunning) return;
  elapsed = (ts - timerStart) / 1000;
  setLCD(elapsed.toFixed(3), 'run', phase === 'rising' ? '▲ RISING' : '▼ FALLING');
}

function updateReadouts() {
  document.getElementById('roH').textContent =
    Math.max(0, ball_h).toFixed(2) + ' m';
  document.getElementById('roV').textContent =
    (phase === 'idle' ? '0.00' : ball_vy.toFixed(2)) + ' m/s';
}

// ═══════════════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════════════
function drawFrame(ts) {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawGround();
  drawRuler();
  drawInstructorTag();
  drawTree();
  drawHeightLabel();
  drawTrail();
  if ((phase === 'falling' || phase === 'landed') && peakH > 0.05) drawPeakLine();
  drawBall(ballX, ballCanvasY());
  updateTimerDisplay(ts);
  updateReadouts();
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, groundY);
  g.addColorStop(0,   '#03060f');
  g.addColorStop(0.6, '#081530');
  g.addColorStop(1,   '#0e2540');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, groundY);

  // Stars (deterministic)
  for (let i = 0; i < 70; i++) {
    const sx = ((i * 137.508) % 1) * W;
    const sy = ((i * 0.618033) % 1) * groundY * 0.85;
    const sr = 0.5 + (i % 3) * 0.35;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.25 + (i % 5) * 0.1})`;
    ctx.fill();
  }

  // Moon
  ctx.save();
  ctx.shadowColor = '#ffe89030';
  ctx.shadowBlur  = 22;
  ctx.beginPath();
  ctx.arc(W * 0.84, H * 0.10, 20, 0, Math.PI * 2);
  ctx.fillStyle = '#ffe090';
  ctx.fill();
  ctx.restore();
  // crescent shadow
  ctx.beginPath();
  ctx.arc(W * 0.84 + 8, H * 0.10 - 4, 17, 0, Math.PI * 2);
  ctx.fillStyle = '#03060f';
  ctx.fill();
}

function drawGround() {
  const g = ctx.createLinearGradient(0, groundY, 0, H);
  g.addColorStop(0,   '#3d6b28');
  g.addColorStop(0.3, '#2a4a18');
  g.addColorStop(1,   '#182e0e');
  ctx.fillStyle = g;
  ctx.fillRect(0, groundY, W, H - groundY);

  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.strokeStyle = '#58a830';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Grass tufts
  ctx.lineWidth = 1;
  for (let gx = 6; gx < W; gx += 14) {
    const gh = 4 + Math.abs(Math.sin(gx * 0.4)) * 5;
    ctx.beginPath();
    ctx.moveTo(gx, groundY);
    ctx.quadraticCurveTo(gx + 3, groundY - gh, gx + 6, groundY);
    ctx.strokeStyle = `rgba(65,150,35,${0.4 + Math.abs(Math.sin(gx)) * 0.25})`;
    ctx.stroke();
  }
}

function drawRuler() {
  const rx   = 30;
  const maxM = Math.floor((groundY - 30) / SCALE);

  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(rx, groundY);
  ctx.lineTo(rx, groundY - maxM * SCALE);
  ctx.strokeStyle = 'rgba(70,130,255,0.2)';
  ctx.stroke();

  for (let m = 0; m <= maxM; m++) {
    const py  = groundY - m * SCALE;
    if (py < 25) break;
    const big = m % 5 === 0;
    ctx.beginPath();
    ctx.moveTo(rx - (big ? 8 : 4), py);
    ctx.lineTo(rx + (big ? 8 : 4), py);
    ctx.strokeStyle = big ? 'rgba(70,130,255,0.45)' : 'rgba(70,130,255,0.18)';
    ctx.lineWidth   = big ? 1.5 : 1;
    ctx.stroke();
    if (big && m > 0) {
      ctx.font      = "9px 'IBM Plex Mono'";
      ctx.fillStyle = 'rgba(70,130,255,0.5)';
      ctx.textAlign = 'right';
      ctx.fillText(m + 'm', rx - 11, py + 3);
    }
  }
}

function drawInstructorTag() {
  ctx.save();
  ctx.textAlign = 'right';
  ctx.font      = "bold 13px 'IBM Plex Mono'";
  ctx.fillStyle = 'rgba(150,195,255,0.65)';
  ctx.fillText('Instructor: Dr. S Karna', W - 16, 22);
  ctx.font      = "11px 'IBM Plex Mono'";
  ctx.fillStyle = 'rgba(100,150,210,0.35)';
  ctx.fillText('1D Kinematics Lab · Free Throw', W - 16, 38);
  ctx.restore();
}

function drawTree() {
  const tx    = treeX;
  const tH    = treeH_px;
  const baseY = groundY;
  const trunkH = tH * 0.30;
  const trunkW = Math.max(10, tH * 0.07);

  // Trunk
  const tg = ctx.createLinearGradient(tx - trunkW, 0, tx + trunkW, 0);
  tg.addColorStop(0,   '#2e1608');
  tg.addColorStop(0.4, '#6b4226');
  tg.addColorStop(1,   '#2e1608');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.roundRect(tx - trunkW / 2, baseY - trunkH, trunkW, trunkH, [3, 3, 0, 0]);
  ctx.fill();

  // Root flares
  ctx.fillStyle = '#3d2210';
  for (const sign of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(tx + sign * (trunkW / 2 + 9), baseY);
    ctx.quadraticCurveTo(
      tx + sign * trunkW / 2, baseY - trunkH * 0.15,
      tx + sign * trunkW / 2, baseY - trunkH * 0.35
    );
    ctx.lineTo(tx + sign * trunkW / 2, baseY);
    ctx.closePath();
    ctx.fill();
  }

  // Foliage layers
  const foliageBase = baseY - trunkH;
  const foliageH    = tH - trunkH;
  const layers = [
    { fy: 0.00, rx: 0.44, ry: 0.21, col: '#1b4f16' },
    { fy: 0.17, rx: 0.37, ry: 0.19, col: '#246020' },
    { fy: 0.33, rx: 0.30, ry: 0.17, col: '#2b7428' },
    { fy: 0.49, rx: 0.22, ry: 0.15, col: '#348830' },
    { fy: 0.63, rx: 0.15, ry: 0.13, col: '#3c9c38' },
    { fy: 0.76, rx: 0.09, ry: 0.10, col: '#46b040' },
  ];
  layers.forEach(l => {
    const cy = foliageBase - l.fy * foliageH;
    const rx = l.rx * tH;
    const ry = l.ry * tH;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.ellipse(tx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = l.col;
    ctx.fill();
    ctx.restore();
  });

  // Crown tip dot
  ctx.beginPath();
  ctx.arc(tx, treeTopY, 4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,240,100,0.8)';
  ctx.fill();
}

function drawHeightLabel() {
  // Show dashed height line to the right of the tree crown
  const lx = treeX + treeH_px * 0.46 + 18;

  ctx.save();
  ctx.setLineDash([6, 5]);
  ctx.strokeStyle = 'rgba(255,200,50,0.35)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(lx, treeTopY);
  ctx.lineTo(lx, groundY);
  ctx.stroke();
  ctx.setLineDash([]);

  arrowTip(lx, treeTopY, -1);   // tip pointing up
  arrowTip(lx, groundY,   1);   // tip pointing down

  ctx.font      = "bold 12px 'IBM Plex Mono'";
  ctx.fillStyle = 'rgba(255,220,70,0.9)';
  ctx.textAlign = 'left';
  ctx.fillText(`h = ${treeH_m.toFixed(1)} m`, lx + 10, (treeTopY + groundY) / 2 + 5);
  ctx.restore();
}

function arrowTip(x, y, dir) {
  // dir: -1 = arrowhead pointing up, +1 = pointing down
  ctx.beginPath();
  ctx.moveTo(x - 5, y + dir * 9);
  ctx.lineTo(x,     y + dir * 2);
  ctx.lineTo(x + 5, y + dir * 9);
  ctx.strokeStyle = 'rgba(255,200,50,0.55)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();
}

function drawTrail() {
  trail.forEach((pt, i) => {
    const frac  = i / trail.length;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, frac * 6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,110,70,${frac * 0.5})`;
    ctx.fill();
  });
}

function drawPeakLine() {
  ctx.save();
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = 'rgba(255,220,0,0.3)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(55, peakYpx);
  ctx.lineTo(W * 0.62, peakYpx);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.font      = "11px 'IBM Plex Mono'";
  ctx.fillStyle = 'rgba(255,220,0,0.7)';
  ctx.textAlign = 'left';
  ctx.fillText(`↑ peak: ${peakH.toFixed(2)} m`, W * 0.62 + 6, peakYpx + 4);
  ctx.restore();
}

function drawBall(x, y) {
  // Glow
  const glow = ctx.createRadialGradient(x, y, 0, x, y, 22);
  glow.addColorStop(0, 'rgba(255,80,60,0.4)');
  glow.addColorStop(1, 'rgba(255,40,20,0)');
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Body
  const body = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, BALL_R);
  body.addColorStop(0,   '#ff9090');
  body.addColorStop(0.5, '#ff2222');
  body.addColorStop(1,   '#880000');
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = body;
  ctx.fill();

  // Shine
  ctx.beginPath();
  ctx.arc(x - 3, y - 3, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();

  // Ground shadow (fades as ball rises)
  const shade = Math.max(0, 0.28 * (1 - (groundY - y) / (H * 1.2)));
  if (shade > 0.01) {
    ctx.beginPath();
    ctx.ellipse(x, groundY - 1, BALL_R + 3, 3.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,0,0,${shade})`;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = lastTS ? Math.min((ts - lastTS) / 1000, 0.05) : 0;
  lastTS   = ts;
  physicsStep(dt);
  drawFrame(ts);
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
document.getElementById('power').addEventListener('input', function () {
  document.getElementById('powerVal').textContent = this.value + '%';
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space')     { e.preventDefault(); throwBall(); }
  if (e.code === 'KeyR')      resetSim();
  if (e.code === 'ArrowUp')   {
    const s = document.getElementById('power');
    s.value = Math.min(100, +s.value + 5);
    document.getElementById('powerVal').textContent = s.value + '%';
  }
  if (e.code === 'ArrowDown') {
    const s = document.getElementById('power');
    s.value = Math.max(10, +s.value - 5);
    document.getElementById('powerVal').textContent = s.value + '%';
  }
});

window.addEventListener('resize', () => {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  setupCanvas();
  if (phase === 'idle') placeBallOnGround();
});

setupCanvas();
placeBallOnGround();
requestAnimationFrame(loop);
</script>
</body>
