<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H₂O Hydrogen Bonding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;600;800&family=Fira+Code:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #04080f;
    --o-core: #ff5e5e;
    --o-mid:  #cc2020;
    --h-core: #ffe9a0;
    --h-mid:  #ffb830;
    --hbond:  #66d9ff;
    --dipole-neg: #ff6eb0;
    --dipole-pos: #66ffe0;
    --text:   #cce8ff;
  }

  body {
    background: var(--bg);
    font-family: 'Fira Code', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg-field {
    position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(0,140,255,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 60%, rgba(255,94,94,0.05) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(0,20,50,0.7)    0%, transparent 80%);
  }

  header {
    text-align: center;
    margin-bottom: 10px;
    position: relative; z-index: 10;
  }

  .title {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 800;
    font-size: clamp(16px, 2.8vw, 26px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: linear-gradient(100deg, #66ffe0, #66d9ff, #a0b8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(102,217,255,0.4));
  }

  .subtitle {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(204,232,255,0.3);
    text-transform: uppercase;
    margin-top: 4px;
  }

  canvas {
    border: 1px solid rgba(102,217,255,0.1);
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(0,140,255,0.08), 0 0 120px rgba(255,94,94,0.04);
    display: block; position: relative; z-index: 5;
  }

  .phase-bar {
    display: flex; gap: 0;
    margin-top: 10px;
    border: 1px solid rgba(204,232,255,0.1);
    border-radius: 3px; overflow: hidden;
    position: relative; z-index: 10;
  }

  .phase-step {
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 5px 14px;
    color: rgba(204,232,255,0.3);
    border-right: 1px solid rgba(204,232,255,0.08);
    transition: all 0.4s;
    white-space: nowrap;
  }
  .phase-step:last-child { border-right: none; }
  .phase-step.active {
    background: rgba(102,217,255,0.1);
    color: #66d9ff;
    box-shadow: inset 0 0 12px rgba(102,217,255,0.1);
  }

  .legend {
    display: flex; gap: 20px;
    margin-top: 8px;
    position: relative; z-index: 10;
  }

  .leg { display: flex; align-items: center; gap: 6px;
    font-size: 9px; letter-spacing: 0.15em;
    color: rgba(204,232,255,0.4); text-transform: uppercase; }

  .leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .ld-o { background: radial-gradient(circle at 35% 35%, #ff9090, #cc2020, #4a0000); box-shadow: 0 0 7px rgba(255,94,94,0.8); }
  .ld-h { background: radial-gradient(circle at 35% 35%, #fff5c0, #ffb830, #5a3000); box-shadow: 0 0 7px rgba(255,184,48,0.7); }

  .leg-dash { width: 22px; height: 2px;
    background: repeating-linear-gradient(90deg, #66d9ff 0 4px, transparent 4px 8px);
    box-shadow: 0 0 5px #66d9ff; }

  .controls {
    display: flex; gap: 8px;
    margin-top: 8px;
    position: relative; z-index: 10;
  }

  .ctrl-btn {
    font-family: 'Fira Code', monospace;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text); background: transparent;
    border: 1px solid rgba(204,232,255,0.18);
    padding: 5px 16px; cursor: pointer; border-radius: 2px;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(204,232,255,0.06); border-color: rgba(204,232,255,0.5); }
  .ctrl-btn.paused { color: #ffe566; border-color: rgba(255,229,102,0.4); box-shadow: 0 0 10px rgba(255,229,102,0.12); }
</style>
</head>
<body>
<div class="bg-field"></div>

<header>
  <div class="title">H₂O · Hydrogen Bonding via Polarity</div>
  <div class="subtitle">δ− oxygen attracts δ+ hydrogen of neighbouring molecule</div>
</header>

<canvas id="c"></canvas>

<div class="phase-bar">
  <div class="phase-step" id="ps0">① Isolated polar molecules</div>
  <div class="phase-step" id="ps1">② Dipoles align</div>
  <div class="phase-step" id="ps2">③ Approach &amp; attract</div>
  <div class="phase-step" id="ps3">④ H-bonds form</div>
  <div class="phase-step" id="ps4">⑤ Stable network</div>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot ld-o"></div> Oxygen (δ−)</div>
  <div class="leg"><div class="leg-dot ld-h"></div> Hydrogen (δ+)</div>
  <div class="leg"><div class="leg-dash"></div> Hydrogen bond</div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
  <button class="ctrl-btn" onclick="restart()">↺ Restart</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = Math.min(window.innerWidth  - 40, 820);
const H = Math.min(window.innerHeight - 230, 400);
canvas.width = W; canvas.height = H;

let paused = false;
let globalT = 0; // ever-increasing tick

// ── Animation has 5 phases, each ~200 ticks ──────────────────────────────
const PHASE_LEN  = 200;
const NUM_PHASES = 5;
const TOTAL      = PHASE_LEN * NUM_PHASES;

function eio(x) { return x < 0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2; }
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp01(x){ return Math.max(0,Math.min(1,x)); }

// ── Three H2O molecules ───────────────────────────────────────────────────
// Each molecule: centre (cx,cy), angle (rotation)
// Structure: O at centre, H1/H2 at ±52° from bottom, bond length 55px
//
// Final "stable network" positions (phase 4-5):
//   mol0 = top-centre,  mol1 = bottom-left, mol2 = bottom-right
// Start positions (phase 0): spread far apart

const BOND_L = 52;   // O-H bond px
const H_ANGLE = 52 * Math.PI / 180; // half angle from bond axis

// Molecule descriptor – positions & angles are animated
const molecules = [
  // index 0 – top
  { startX: W*0.5,  startY: H*0.18, startA: 0,
    endX:   W*0.5,  endY:   H*0.30, endA:   0 },
  // index 1 – bottom-left
  { startX: W*0.22, startY: H*0.82, startA: Math.PI * 0.55,
    endX:   W*0.33, endY:   H*0.67, endA:   Math.PI * 0.55 },
  // index 2 – bottom-right
  { startX: W*0.78, startY: H*0.82, startA: -Math.PI * 0.55,
    endX:   W*0.67, endY:   H*0.67, endA:  -Math.PI * 0.55 },
];

// Compute H positions relative to centre given angle
function hPositions(cx, cy, angle) {
  // O is centre; H1 and H2 below-left and below-right relative to molecule angle
  const base = angle + Math.PI/2;  // "down" axis
  return [
    { x: cx + BOND_L * Math.cos(base - H_ANGLE),
      y: cy + BOND_L * Math.sin(base - H_ANGLE) },
    { x: cx + BOND_L * Math.cos(base + H_ANGLE),
      y: cy + BOND_L * Math.sin(base + H_ANGLE) },
  ];
}

// H-bond pairs: [donorMol, donorH, acceptorMol]  — H of donor … O of acceptor
const hBondPairs = [
  [0, 0, 1],  // mol0's H1 → mol1's O
  [0, 1, 2],  // mol0's H2 → mol2's O
];

// Floating electron density particles on covalent bonds
const covalentParticles = [];
for (let m = 0; m < 3; m++) {
  for (let h = 0; h < 2; h++) {
    for (let p = 0; p < 6; p++) {
      covalentParticles.push({ m, h, t: Math.random(), speed: 0.007+Math.random()*0.005, dir: Math.random()>0.5?1:-1, gT: Math.random()*Math.PI*2 });
    }
  }
}

// Dipole field line particles
const dipoleParticles = [];
for (let m = 0; m < 3; m++) {
  for (let p = 0; p < 8; p++) {
    dipoleParticles.push({ m, t: Math.random(), speed: 0.004+Math.random()*0.004, gT: Math.random()*Math.PI*2, lane: (Math.random()-0.5)*18 });
  }
}

function getPhase(tick) {
  const loopT = tick % TOTAL;
  const phase = Math.floor(loopT / PHASE_LEN);
  const pT    = clamp01((loopT % PHASE_LEN) / PHASE_LEN);
  return { phase, pT };
}

function getMolState(mi, phase, pT) {
  const mol = molecules[mi];
  // Phase 0: isolated – start positions
  // Phase 1-2: approach (eio)
  // Phase 3-4: stable end positions

  let progress = 0;
  if (phase === 0) progress = 0;
  else if (phase === 1) progress = eio(pT) * 0.5;
  else if (phase === 2) progress = 0.5 + eio(pT) * 0.5;
  else progress = 1;

  return {
    cx: lerp(mol.startX, mol.endX, progress),
    cy: lerp(mol.startY, mol.endY, progress),
    angle: lerp(mol.startA, mol.endA, progress),
  };
}

// ── Draw helpers ──────────────────────────────────────────────────────────

function drawOAtom(px, py, r) {
  const ag = ctx.createRadialGradient(px-r*0.35, py-r*0.35, r*0.05, px, py, r);
  ag.addColorStop(0, '#ffaaaa');
  ag.addColorStop(0.4, '#ff5e5e');
  ag.addColorStop(1,   '#3a0000');
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
  ctx.fillStyle = ag; ctx.fill();
  // specular
  const sp = ctx.createRadialGradient(px-r*0.38, py-r*0.4, 0, px-r*0.25, py-r*0.28, r*0.55);
  sp.addColorStop(0, 'rgba(255,255,255,0.5)'); sp.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
  ctx.fillStyle = sp; ctx.fill();
  // glow
  const glow = ctx.createRadialGradient(px, py, r*0.5, px, py, r*2.2);
  glow.addColorStop(0, 'rgba(255,94,94,0.18)'); glow.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(px, py, r*2.2, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();
  // label
  ctx.font = 'bold 12px "Fira Code",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText('O', px, py);
}

function drawHAtom(px, py, r) {
  const ag = ctx.createRadialGradient(px-r*0.35, py-r*0.35, r*0.05, px, py, r);
  ag.addColorStop(0, '#fff8cc');
  ag.addColorStop(0.4, '#ffcc50');
  ag.addColorStop(1,   '#3a1a00');
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
  ctx.fillStyle = ag; ctx.fill();
  const sp = ctx.createRadialGradient(px-r*0.38, py-r*0.4, 0, px-r*0.25, py-r*0.28, r*0.55);
  sp.addColorStop(0, 'rgba(255,255,255,0.5)'); sp.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
  ctx.fillStyle = sp; ctx.fill();
  // glow
  const glow = ctx.createRadialGradient(px, py, r*0.5, px, py, r*2);
  glow.addColorStop(0, 'rgba(255,200,60,0.22)'); glow.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(px, py, r*2, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();
  ctx.font = 'bold 10px "Fira Code",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText('H', px, py);
}

function drawCovalentBond(x1,y1, x2,y2) {
  const g = ctx.createLinearGradient(x1,y1, x2,y2);
  g.addColorStop(0,   'rgba(255,200,80,0.25)');
  g.addColorStop(0.5, 'rgba(255,220,100,0.6)');
  g.addColorStop(1,   'rgba(255,200,80,0.25)');
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = g; ctx.lineWidth = 3.5; ctx.stroke();
}

function drawDeltaLabels(ocx, ocy, hps, alpha) {
  ctx.globalAlpha = alpha;
  ctx.font = '10px "Fira Code",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // δ− on O
  ctx.fillStyle = '#ff6eb0';
  ctx.fillText('δ−', ocx - 30, ocy - 14);
  // δ+ on each H
  ctx.fillStyle = '#66ffe0';
  hps.forEach(h => ctx.fillText('δ+', h.x + 18, h.y - 10));
  ctx.globalAlpha = 1;
}

function drawLonePairs(ocx, ocy, angle, alpha) {
  // Two lone pairs on O — symmetric above
  const base = angle - Math.PI/2; // "up" axis
  const r = 28;
  [base - 0.35, base + 0.35].forEach(a => {
    const lx = ocx + r * Math.cos(a);
    const ly = ocy + r * Math.sin(a);
    for (let d = -1; d <= 1; d += 2) {
      const ex = lx + d * 5 * Math.cos(a + Math.PI/2);
      const ey = ly + d * 5 * Math.sin(a + Math.PI/2);
      const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, 5);
      eg.addColorStop(0, `rgba(255,255,160,${alpha * 0.9})`);
      eg.addColorStop(0.5, `rgba(255,220,50,${alpha * 0.5})`);
      eg.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.arc(ex, ey, 5, 0, Math.PI*2);
      ctx.fillStyle = eg; ctx.fill();
    }
  });
}

function drawHBond(x1,y1, x2,y2, alpha, pulse) {
  ctx.save();
  ctx.globalAlpha = alpha * (0.6 + 0.4 * pulse);
  // Dashed line
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = '#66d9ff';
  ctx.lineWidth = 2;
  ctx.setLineDash([5,5]);
  ctx.stroke();
  ctx.setLineDash([]);
  // Glow along bond
  const mid = { x:(x1+x2)/2, y:(y1+y2)/2 };
  const g = ctx.createRadialGradient(mid.x, mid.y, 0, mid.x, mid.y, 30);
  g.addColorStop(0, `rgba(102,217,255,${alpha*0.25*pulse})`);
  g.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(mid.x, mid.y, 30, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
}

function drawFieldLines(ocx, ocy, hps, alpha) {
  // Field lines from H (δ+) curving toward O (δ−) of same molecule
  if (alpha < 0.02) return;
  hps.forEach(hp => {
    const dx = ocx - hp.x, dy = ocy - hp.y;
    const g = ctx.createLinearGradient(hp.x, hp.y, ocx, ocy);
    g.addColorStop(0,   `rgba(102,255,224,${alpha*0.12})`);
    g.addColorStop(0.5, `rgba(102,217,255,${alpha*0.22})`);
    g.addColorStop(1,   `rgba(255,110,176,${alpha*0.12})`);
    ctx.beginPath();
    ctx.moveTo(hp.x, hp.y);
    const cpx = hp.x + dx*0.5 + (Math.random()-0.5)*10;
    const cpy = hp.y + dy*0.5 + (Math.random()-0.5)*10;
    ctx.quadraticCurveTo(cpx, cpy, ocx, ocy);
    ctx.strokeStyle = g;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });
}

function drawElectronParticles(mStates, phase, pT) {
  covalentParticles.forEach(ep => {
    if (!paused) {
      ep.t += ep.speed * ep.dir;
      if (ep.t > 1) { ep.t = 1; ep.dir = -1; }
      if (ep.t < 0) { ep.t = 0; ep.dir = 1; }
      ep.gT += 0.05;
    }
    const ms = mStates[ep.m];
    const hps = hPositions(ms.cx, ms.cy, ms.angle);
    const hp = hps[ep.h];
    const ex = lerp(ms.cx, hp.x, ep.t);
    const ey = lerp(ms.cy, hp.y, ep.t);
    const pulse = 0.7 + 0.3 * Math.sin(ep.gT);
    const er = 3.5 * pulse;
    const eg = ctx.createRadialGradient(ex,ey,0, ex,ey,er*3.5);
    eg.addColorStop(0, 'rgba(255,240,140,0.8)');
    eg.addColorStop(0.5,'rgba(255,200,50,0.4)');
    eg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(ex,ey,er*3.5,0,Math.PI*2);
    ctx.fillStyle=eg; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,250,200,0.9)`; ctx.fill();
  });
}

// ── Main draw loop ────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#04080f'; ctx.fillRect(0, 0, W, H);

  // Subtle bg gradient
  const bgR = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.6);
  bgR.addColorStop(0, 'rgba(0,20,50,0.4)'); bgR.addColorStop(1, 'transparent');
  ctx.fillStyle = bgR; ctx.fillRect(0, 0, W, H);

  const { phase, pT } = getPhase(globalT);

  // Update phase bar
  for (let i = 0; i < 5; i++) {
    document.getElementById('ps'+i).classList.toggle('active', i === phase);
  }

  // Molecule states
  const mStates = molecules.map((_, mi) => getMolState(mi, phase, pT));

  // H-bond alpha: starts forming in phase 2, full in phase 3+
  const hBondAlpha = phase < 2 ? 0 :
                     phase === 2 ? eio(pT) :
                     1;

  // Delta label alpha: visible from phase 1 onward
  const deltaAlpha = phase < 1 ? 0 : phase === 1 ? eio(pT) : 1;

  // Attraction glow between molecules (phase 2)
  if (phase >= 2) {
    const ag = eio(clamp01((phase === 2 ? pT : 1)));
    mStates.forEach((ms, mi) => {
      mStates.forEach((ms2, mj) => {
        if (mj <= mi) return;
        const mx = (ms.cx+ms2.cx)/2, my = (ms.cy+ms2.cy)/2;
        const d = Math.hypot(ms.cx-ms2.cx, ms.cy-ms2.cy);
        const g = ctx.createRadialGradient(mx,my,0, mx,my, d*0.55);
        g.addColorStop(0, `rgba(102,217,255,${ag*0.07})`);
        g.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(mx,my,d*0.55,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
      });
    });
  }

  // Draw H-bonds
  const pulse = 0.7 + 0.3 * Math.sin(globalT * 0.05);
  hBondPairs.forEach(([dm, dh, am]) => {
    const donor    = mStates[dm];
    const acceptor = mStates[am];
    const hps = hPositions(donor.cx, donor.cy, donor.angle);
    const hp  = hps[dh];
    drawHBond(hp.x, hp.y, acceptor.cx, acceptor.cy, hBondAlpha, pulse);
    // H-bond label
    if (hBondAlpha > 0.5) {
      const lx = (hp.x + acceptor.cx) / 2;
      const ly = (hp.y + acceptor.cy) / 2;
      ctx.save();
      ctx.globalAlpha = (hBondAlpha - 0.5) * 2;
      ctx.font = '9px "Fira Code",monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#66d9ff';
      ctx.fillText('H-bond', lx, ly - 14);
      ctx.restore();
    }
  });

  // Draw each molecule
  mStates.forEach((ms, mi) => {
    const hps = hPositions(ms.cx, ms.cy, ms.angle);

    // Covalent bonds
    hps.forEach(hp => drawCovalentBond(ms.cx, ms.cy, hp.x, hp.y));

    // Lone pairs
    drawLonePairs(ms.cx, ms.cy, ms.angle, 0.85);

    // Delta labels
    drawDeltaLabels(ms.cx, ms.cy, hps, deltaAlpha);

    // Atoms (H behind O)
    hps.forEach(hp => drawHAtom(hp.x, hp.y, 14));
    drawOAtom(ms.cx, ms.cy, 22);
  });

  // Electron particles on covalent bonds
  drawElectronParticles(mStates, phase, pT);

  // Phase 4 stable annotation
  if (phase === 4) {
    ctx.save();
    ctx.globalAlpha = eio(pT) * 0.75;
    ctx.font = '11px "Fira Code",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#66d9ff';
    ctx.fillText('Stable hydrogen-bonded cluster', W/2, H - 16);
    ctx.restore();
  }

  // Scanlines
  for (let sy = 0; sy < H; sy += 5) {
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    ctx.fillRect(0, sy, W, 2);
  }

  // Watermark
  ctx.save();
  ctx.font = 'bold 12px "Fira Code",monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(102,217,255,0.6)';
  ctx.shadowColor = 'rgba(102,217,255,0.4)'; ctx.shadowBlur = 8;
  ctx.fillText('Dr. S Karna', W - 12, 12);
  ctx.restore();

  if (!paused) globalT++;
  requestAnimationFrame(draw);
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
  btn.classList.toggle('paused', paused);
}

function restart() { globalT = 0; }

draw();
</script>
</body>
</html>
