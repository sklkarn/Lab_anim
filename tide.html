<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidal Bulge Simulation</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0b0d17;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        .container {
            position: relative;
            width: 500px;
            height: 500px;
        }

        /* The Moon Orbiting */
        #orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            margin-top: -200px;
            margin-left: -200px;
            border: 1px dashed #444;
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        #moon {
            position: absolute;
            top: -15px;
            left: 50%;
            width: 30px;
            height: 30px;
            background: #ddd;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff;
            margin-left: -15px;
        }

        /* The Earth and Water */
        #earth-system {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .water {
            fill: rgba(0, 150, 255, 0.6);
            /* This will be rotated by JS to follow the moon */
        }

        .earth {
            fill: #2b5dcf;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .label {
            margin-top: 20px;
            text-align: center;
            max-width: 400px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h2>Moon Rotation & Tidal Bulge</h2>

    <div class="container">
        <div id="orbit">
            <div id="moon"></div>
        </div>

        <div id="earth-system">
            <svg width="200" height="200" viewBox="0 0 200 200">
                <ellipse id="bulge" cx="100" cy="100" rx="85" ry="60" class="water" />
                <circle cx="100" cy="100" r="55" class="earth" />
                <path d="M80 70 Q 100 50 120 70 T 120 130" fill="#4caf50" opacity="0.7"/>
            </svg>
        </div>
    </div>

    <div class="label">
        The water "bulges" towards the Moon due to gravity and away from the Moon due to inertia/centrifugal effects. As the Moon rotates, the high-tide bulges follow it.
    </div>

    <script>
        const bulge = document.getElementById('bulge');
        let angle = 0;

        function animate() {
            // Match the rotation speed of the orbit (20s = 18deg per second)
            angle += 0.3; // Incremental rotation for smooth movement
            bulge.setAttribute('transform', `rotate(${angle-90}, 100, 100)`);
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
