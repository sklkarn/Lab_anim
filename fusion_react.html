<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Fusion: Hydrogen → Helium</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000a14;
    color: #e0f4ff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--d, 3s) infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }

  header { position: relative; z-index: 10; text-align: center; padding: 2rem 1rem 1rem; }
  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.8rem);
    font-weight: 900; letter-spacing: 0.12em;
    background: linear-gradient(135deg, #00d4ff, #fff 50%, #ff9500);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { margin-top: 0.5rem; font-size: 0.85rem; color: #7acfff; letter-spacing: 0.08em; }

  .step-bar {
    position: relative; z-index: 10;
    display: flex; gap: 0.5rem; margin: 1rem auto;
    padding: 0 1rem; flex-wrap: wrap; justify-content: center;
  }
  .step-btn {
    padding: 0.35rem 1rem; border: 1px solid #00d4ff44; background: transparent;
    color: #7acfff; font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.05em; cursor: pointer;
    transition: all 0.3s; border-radius: 2px;
  }
  .step-btn.active { background: #00d4ff22; border-color: #00d4ff; color: #00d4ff; }
  .step-btn:hover  { background: #00d4ff11; }

  .scene-wrapper {
    position: relative; z-index: 10;
    width: min(720px, 96vw); height: min(420px, 56vw); margin: 0 auto;
  }
  canvas#fusion {
    width: 100%; height: 100%;
    border: 1px solid #00d4ff22; border-radius: 4px;
    background: transparent; display: block;
  }

  .info-panel {
    position: relative; z-index: 10;
    width: min(720px, 96vw); margin: 1rem auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
  }
  .info-box { background: #00152a; border: 1px solid #00d4ff22; border-radius: 4px; padding: 1rem; }
  .info-box h3 {
    font-family: 'Orbitron', monospace; font-size: 0.65rem;
    letter-spacing: 0.15em; color: #00d4ff; margin-bottom: 0.6rem; text-transform: uppercase;
  }
  .info-box p { font-size: 0.78rem; line-height: 1.6; color: #a8d8f0; }
  .energy-val { font-size: 1.3rem; font-family: 'Orbitron', monospace; color: #ff9500; display: block; margin-top: 0.3rem; }

  .equation-bar {
    position: relative; z-index: 10;
    width: min(720px, 96vw); margin: 0 auto 1rem;
    background: #00152a; border: 1px solid #00d4ff22; border-radius: 4px;
    padding: 0.8rem 1.2rem; text-align: center;
    font-size: clamp(0.8rem, 2.5vw, 1rem); color: #e0f4ff; letter-spacing: 0.05em;
  }
  .eq-h  { color: #4da6ff; font-weight: bold; }
  .eq-he { color: #ff6b6b; font-weight: bold; }
  .eq-n  { color: #aaffaa; font-weight: bold; }
  .eq-e  { color: #ffcc00; font-weight: bold; }
  .eq-nu { color: #ff9500; font-weight: bold; }

  .controls {
    position: relative; z-index: 10;
    display: flex; gap: 1rem; margin-bottom: 2rem;
    flex-wrap: wrap; justify-content: center;
  }
  .ctrl-btn {
    padding: 0.55rem 1.6rem; border: 1px solid #00d4ff88;
    background: #00d4ff15; color: #00d4ff;
    font-family: 'Orbitron', monospace; font-size: 0.75rem;
    letter-spacing: 0.1em; cursor: pointer; border-radius: 2px;
    transition: all 0.25s; text-transform: uppercase;
  }
  .ctrl-btn:hover { background: #00d4ff30; border-color: #00d4ff; }
  .ctrl-btn.primary { border-color: #ff9500aa; background: #ff950015; color: #ff9500; }
  .ctrl-btn.primary:hover { background: #ff950030; }

  @media (max-width: 500px) {
    .info-panel { grid-template-columns: 1fr; }
    .scene-wrapper { height: 62vw; }
  }
</style>
</head>
<body>

<div class="starfield" id="stars"></div>

<header>
  <h1>Nuclear Fusion</h1>
  <p>Proton–Proton Chain · How Stars Generate Energy</p>
</header>

<div class="step-bar" id="stepBar"></div>

<div class="scene-wrapper">
  <canvas id="fusion"></canvas>
</div>

<div class="equation-bar">
  <span class="eq-h">4 ¹H</span> &nbsp;→&nbsp;
  <span class="eq-he">⁴He</span> &nbsp;+&nbsp;
  <span class="eq-n">2 n⁰</span> &nbsp;+&nbsp;
  <span class="eq-e">2 e⁺</span> &nbsp;+&nbsp;
  <span class="eq-nu">2 ν<sub>e</sub></span> &nbsp;+&nbsp;
  <span style="color:#ffdd55">26.7 MeV ⚡</span>
</div>

<div class="info-panel">
  <div class="info-box">
    <h3>Current Step</h3>
    <p id="stepDesc">Press Play to begin the proton–proton fusion chain reaction.</p>
  </div>
  <div class="info-box">
    <h3>Energy Released</h3>
    <p>Total per cycle: <span class="energy-val" id="energyDisplay">0 MeV</span></p>
    <p style="font-size:0.72rem;color:#7acfff;margin-top:0.4rem">E = Δmc² (mass defect)</p>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn primary" id="playBtn">▶ PLAY</button>
  <button class="ctrl-btn" id="resetBtn">↺ RESET</button>
  <button class="ctrl-btn" id="slowBtn">◐ SLOW</button>
</div>

<script>
// ── Starfield ─────────────────────────────────────────────────
(function(){
  const sf = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.2;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    sf.appendChild(s);
  }
})();

// ── Canvas ────────────────────────────────────────────────────
const canvas = document.getElementById('fusion');
const ctx    = canvas.getContext('2d');

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width  * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); render(stepT); });

const W = () => canvas.width  / devicePixelRatio;
const H = () => canvas.height / devicePixelRatio;

// ── Math helpers ──────────────────────────────────────────────
const lerp    = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - t, 3);

// ── Particle colors ───────────────────────────────────────────
const COL = {
  proton:   '#4da6ff',
  positron: '#ff6b6b',
  neutrino: '#ff9500',
  deuteron: '#7b9fff',
  he3:      '#c084fc',
  he4:      '#ff6b6b',
};

function hexRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16)
  ];
}

// ── Drawing primitives ────────────────────────────────────────
function drawGlow(x, y, r, hex, alpha) {
  const [r1,g1,b1] = hexRgb(hex);
  const grad = ctx.createRadialGradient(x,y,0, x,y,r*2.8);
  grad.addColorStop(0, `rgba(${r1},${g1},${b1},${alpha})`);
  grad.addColorStop(1, `rgba(${r1},${g1},${b1},0)`);
  ctx.beginPath(); ctx.arc(x,y,r*2.8,0,Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
}

function drawParticle(x, y, r, hex, label) {
  drawGlow(x, y, r, hex, 0.4);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  const g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
  g.addColorStop(0, '#ffffff88');
  g.addColorStop(0.4, hex);
  g.addColorStop(1, '#00000055');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = hex + 'cc'; ctx.lineWidth = 1; ctx.stroke();
  if (label) {
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(9, r*0.85)}px Share Tech Mono,monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  }
}

function drawNucleus(x, y, nucleons, hex, label) {
  const offsets = {
    1: [[0,0]],
    2: [[-5,0],[5,0]],
    3: [[-6,4],[6,4],[0,-5]],
    4: [[-6,-6],[6,-6],[-6,6],[6,6]],
  };
  const r   = 10;
  const arr = offsets[nucleons] || [[0,0]];
  drawGlow(x, y, r * nucleons * 0.7, hex, 0.3);
  arr.forEach(([dx,dy]) => drawParticle(x+dx, y+dy, r, hex, null));
  if (label) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Share Tech Mono,monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(label, x, y + r*1.9 + 4);
  }
}

function drawArrow(x1,y1,x2,y2,color) {
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const a = Math.atan2(y2-y1, x2-x1);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-10*Math.cos(a-0.4), y2-10*Math.sin(a-0.4));
  ctx.lineTo(x2-10*Math.cos(a+0.4), y2-10*Math.sin(a+0.4));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawPhoton(x, y, t) {
  ctx.save();
  ctx.strokeStyle = `rgba(255,220,50,${Math.min(1,t*3)})`;
  ctx.lineWidth = 2.5; ctx.shadowColor = '#ffdd55'; ctx.shadowBlur = 8;
  const len = 50 * t;
  ctx.beginPath();
  for (let i = 0; i <= len; i++) {
    const wx = x - len + i, wy = y + Math.sin(i * 0.5) * 8;
    i === 0 ? ctx.moveTo(wx,wy) : ctx.lineTo(wx,wy);
  }
  ctx.stroke(); ctx.restore();
  drawParticle(x, y, 7, '#ffdd55', 'γ');
}

function drawLabel(x, y, text, color) {
  ctx.fillStyle = color;
  ctx.font = '11px Share Tech Mono,monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(text, x, y);
}

// ── Steps ─────────────────────────────────────────────────────
const STEPS = [
  { label:'Step 1', short:'¹H + ¹H',       energy:0,    desc:'Two protons (hydrogen-1 nuclei) approach each other at extreme temperature (~15 million K inside a star).' },
  { label:'Step 2', short:'→ ²H + e⁺ + ν', energy:0.42, desc:'The protons fuse. One proton converts to a neutron via beta-plus decay, emitting a positron (e⁺) and a neutrino (ν). A deuteron (²H) is formed.' },
  { label:'Step 3', short:'²H + ¹H',        energy:0.42, desc:'The deuteron collides with another free proton.' },
  { label:'Step 4', short:'→ ³He + γ',      energy:5.93, desc:'Fusion produces Helium-3 (2p + 1n) and releases a high-energy gamma ray (γ), adding 5.49 MeV.' },
  { label:'Step 5', short:'³He + ³He',      energy:5.93, desc:'Two Helium-3 nuclei (each from steps 1–4) collide.' },
  { label:'Step 6', short:'→ ⁴He + 2¹H',   energy:26.7, desc:'Final fusion! Helium-4 is born, two protons are released, and 26.7 MeV total energy powers the star — and our Sun!' },
];

// ── App state ─────────────────────────────────────────────────
let stepIndex = 0;
let stepT     = 0;
let animState = 'idle';   // idle | running | paused | done
let slowMode  = false;
let rafId     = null;
let lastTs    = null;

const SPEED = 0.0008;

const stepDescEl   = document.getElementById('stepDesc');
const energyDispEl = document.getElementById('energyDisplay');

function setStep(i) {
  stepIndex = i;
  stepT = 0;
  stepDescEl.textContent   = STEPS[i].desc;
  energyDispEl.textContent = STEPS[i].energy.toFixed(2) + ' MeV';
  updateStepBtns();
}

// Build step buttons
const stepBar = document.getElementById('stepBar');
STEPS.forEach((s, i) => {
  const b = document.createElement('button');
  b.className   = 'step-btn';
  b.id          = 'sb' + i;
  b.textContent = s.label + ': ' + s.short;
  b.onclick     = () => { setStep(i); animState = 'running'; startLoop(); };
  stepBar.appendChild(b);
});

function updateStepBtns() {
  STEPS.forEach((_, i) =>
    document.getElementById('sb'+i).classList.toggle('active', i === stepIndex)
  );
}
updateStepBtns();

// ── Main render function ──────────────────────────────────────
function render(t) {
  const w = W(), h = H(), cx = w/2, cy = h/2;
  ctx.clearRect(0, 0, w, h);

  // faint grid
  ctx.strokeStyle = '#00d4ff08'; ctx.lineWidth = 1;
  for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y = 0; y < h; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

  // ── Scene per step ──────────────────────────────────────────
  if (stepIndex === 0) {
    const dist = lerp(280, 60, easeOut(t));
    const x1 = cx - dist/2, x2 = cx + dist/2;
    if (t < 0.85) {
      drawArrow(x1-40, cy, x1-8, cy, '#4da6ff88');
      drawArrow(x2+40, cy, x2+8, cy, '#4da6ff88');
    }
    if (t > 0.7) {
      const sw = (t-0.7)/0.3;
      ctx.beginPath(); ctx.arc(cx,cy,sw*60,0,Math.PI*2);
      ctx.strokeStyle = `rgba(77,166,255,${0.5*(1-sw)})`; ctx.lineWidth = 2; ctx.stroke();
    }
    drawParticle(x1, cy, 16, COL.proton, 'p⁺');
    drawParticle(x2, cy, 16, COL.proton, 'p⁺');
    drawLabel(x1, cy+30, 'Proton (¹H)', COL.proton);
    drawLabel(x2, cy+30, 'Proton (¹H)', COL.proton);

  } else if (stepIndex === 1) {
    if (t < 0.3) {
      const b = t/0.3;
      drawParticle(lerp(cx-60,cx-8,b), cy, 16, COL.proton, 'p⁺');
      drawParticle(lerp(cx+60,cx+8,b), cy, 16, COL.proton, 'p⁺');
    } else {
      const boom = Math.min(1, (t-0.3)/0.2);
      if (boom < 1) {
        ctx.beginPath(); ctx.arc(cx,cy,boom*90,0,Math.PI*2);
        ctx.strokeStyle = `rgba(255,165,0,${0.6*(1-boom)})`; ctx.lineWidth = 3; ctx.stroke();
      }
      drawNucleus(cx, cy, 2, COL.deuteron, '²H (Deuteron)');
      const pe = Math.min(1, (t-0.35)/0.65);
      drawParticle(cx+pe*140, cy-pe*70,  8, COL.positron, 'e⁺');
      drawLabel(cx+pe*140,  cy-pe*70+22, 'Positron', COL.positron);
      drawParticle(cx-pe*130, cy-pe*80,  6, COL.neutrino, 'ν');
      drawLabel(cx-pe*130,  cy-pe*80+20, 'Neutrino', COL.neutrino);
    }

  } else if (stepIndex === 2) {
    const dist = lerp(240, 55, easeOut(t));
    const x1 = cx-dist/2, x2 = cx+dist/2;
    if (t < 0.85) {
      drawArrow(x1-35, cy, x1-6, cy, '#7b9fff88');
      drawArrow(x2+35, cy, x2+6, cy, '#4da6ff88');
    }
    if (t > 0.7) {
      const sw = (t-0.7)/0.3;
      ctx.beginPath(); ctx.arc(cx,cy,sw*55,0,Math.PI*2);
      ctx.strokeStyle = `rgba(123,159,255,${0.5*(1-sw)})`; ctx.lineWidth = 2; ctx.stroke();
    }
    drawNucleus(x1, cy, 2, COL.deuteron);
    drawLabel(x1, cy+32, '²H', COL.deuteron);
    drawParticle(x2, cy, 16, COL.proton, 'p⁺');
    drawLabel(x2, cy+30, '¹H', COL.proton);

  } else if (stepIndex === 3) {
    if (t < 0.25) {
      const b = t/0.25;
      drawNucleus(lerp(cx-60,cx-10,b), cy, 2, COL.deuteron);
      drawParticle(lerp(cx+60,cx+10,b), cy, 16, COL.proton, 'p⁺');
    } else {
      const boom = Math.min(1, (t-0.25)/0.25);
      if (boom < 1) {
        ctx.beginPath(); ctx.arc(cx,cy,boom*100,0,Math.PI*2);
        ctx.strokeStyle = `rgba(192,132,252,${0.6*(1-boom)})`; ctx.lineWidth = 3; ctx.stroke();
      }
      drawNucleus(cx, cy, 3, COL.he3, '³He (Helium-3)');
      const gp = Math.min(1, (t-0.3)/0.7);
      drawPhoton(cx+gp*160, cy-gp*50, gp);
      drawLabel(cx+gp*160, cy-gp*50+22, 'γ ray', '#ffdd55');
    }

  } else if (stepIndex === 4) {
    const dist = lerp(280, 70, easeOut(t));
    const x1 = cx-dist/2, x2 = cx+dist/2;
    if (t < 0.85) {
      drawArrow(x1-45, cy, x1-5, cy, '#c084fc88');
      drawArrow(x2+45, cy, x2+5, cy, '#c084fc88');
    }
    if (t > 0.7) {
      const sw = (t-0.7)/0.3;
      ctx.beginPath(); ctx.arc(cx,cy,sw*70,0,Math.PI*2);
      ctx.strokeStyle = `rgba(192,132,252,${0.5*(1-sw)})`; ctx.lineWidth = 2; ctx.stroke();
    }
    drawNucleus(x1, cy, 3, COL.he3); drawLabel(x1, cy+35, '³He', COL.he3);
    drawNucleus(x2, cy, 3, COL.he3); drawLabel(x2, cy+35, '³He', COL.he3);

  } else if (stepIndex === 5) {
    if (t < 0.25) {
      const b = t/0.25;
      drawNucleus(lerp(cx-80,cx-12,b), cy, 3, COL.he3);
      drawNucleus(lerp(cx+80,cx+12,b), cy, 3, COL.he3);
    } else {
      const boom = Math.min(1, (t-0.25)/0.2);
      if (boom < 1) {
        ctx.beginPath(); ctx.arc(cx,cy,boom*130,0,Math.PI*2);
        ctx.strokeStyle = `rgba(255,100,100,${0.8*(1-boom)})`; ctx.lineWidth = 4; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy,boom*80,0,Math.PI*2);
        ctx.strokeStyle = `rgba(255,200,50,${0.6*(1-boom)})`; ctx.lineWidth = 2; ctx.stroke();
      }
      drawNucleus(cx, cy, 4, COL.he4, '⁴He (Helium-4)');
      const pe = Math.min(1, (t-0.3)/0.7);
      drawParticle(cx+pe*160, cy-pe*90, 14, COL.proton, 'p⁺');
      drawParticle(cx-pe*150, cy-pe*85, 14, COL.proton, 'p⁺');
      drawLabel(cx+pe*160, cy-pe*90+28, 'Proton', COL.proton);
      drawLabel(cx-pe*150, cy-pe*85+28, 'Proton', COL.proton);
      if (pe > 0.1) {
        ctx.font = 'bold 13px Orbitron,monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = `rgba(255,220,50,${Math.min(1,pe*3)*0.9})`;
        ctx.fillText('⚡ 26.7 MeV Released! ⚡', cx, cy+80);
      }
    }
  }

  // ── Instructor name — top-right corner ───────────────────────
  ctx.save();
  ctx.font          = 'bold 13px Share Tech Mono,monospace';
  ctx.textAlign     = 'right';
  ctx.textBaseline  = 'top';
  ctx.fillStyle     = '#00d4ffdd';
  ctx.fillText('Dr. S Karna', w - 12, 10);
  ctx.restore();
}

// ── Animation loop ────────────────────────────────────────────
function tick(ts) {
  if (animState !== 'running') { rafId = null; return; }
  if (lastTs === null) lastTs = ts;
  const dt = ts - lastTs;
  lastTs = ts;

  stepT = Math.min(1, stepT + dt * (slowMode ? SPEED * 0.35 : SPEED));
  render(stepT);

  if (stepT >= 1) {
    rafId = null;
    setTimeout(() => {
      if (stepIndex < STEPS.length - 1) {
        setStep(stepIndex + 1);
        if (animState === 'running') startLoop();
      } else {
        animState = 'done';
        document.getElementById('playBtn').textContent = '▶ PLAY';
      }
    }, 900);
    return;
  }
  rafId = requestAnimationFrame(tick);
}

function startLoop() {
  if (rafId) cancelAnimationFrame(rafId);
  lastTs = null;
  rafId  = requestAnimationFrame(tick);   // always via rAF — never call tick() directly
}

// ── Controls ──────────────────────────────────────────────────
const playBtn = document.getElementById('playBtn');

playBtn.onclick = () => {
  if (animState === 'running') {
    animState = 'paused';
    playBtn.textContent = '▶ PLAY';
  } else {
    if (animState === 'done') setStep(0);
    animState = 'running';
    playBtn.textContent = '⏸ PAUSE';
    startLoop();
  }
};

document.getElementById('resetBtn').onclick = () => {
  animState = 'idle';
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  setStep(0);
  render(0);
  playBtn.textContent = '▶ PLAY';
};

document.getElementById('slowBtn').onclick = function() {
  slowMode = !slowMode;
  this.textContent = slowMode ? '▶▶ NORMAL' : '◐ SLOW';
};

// ── Initial render ────────────────────────────────────────────
render(0);
</script>
</body>
</html>
