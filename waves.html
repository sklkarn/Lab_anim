<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  .container { background: #2d2d2d; padding: 30px; border-radius: 15px; margin-bottom: 20px; width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  svg { background: #000; border-radius: 8px; margin-top: 10px; }
  
  h3 { margin: 0 0 10px 0; color: #4fc3f7; }
  p { font-size: 0.9em; color: #bbb; }

  /* Transverse Animation */
  @keyframes transverseMove {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-40px); }
  }

  /* Longitudinal Animation */
  @keyframes longitudinalMove {
    0%, 100% { transform: translateX(0px); }
    50% { transform: translateX(30px); }
  }

  .particle-t { fill: #4fc3f7; animation: transverseMove 2s ease-in-out infinite; }
  .particle-l { fill: #ff5252; animation: longitudinalMove 1.5s ease-in-out infinite; }
</style>
</head>
<body>

  <div class="container">
    <h3>Transverse Wave</h3>
    <p>Particles move <b>up and down</b> (Perpendicular to wave direction)</p>
    <svg id="transverseSVG" width="560" height="120"></svg>
  </div>

  <div class="container">
    <h3>Longitudinal Wave</h3>
    <p>Particles move <b>left and right</b> (Parallel to wave direction)</p>
    <svg id="longitudinalSVG" width="560" height="120"></svg>
  </div>

<script>
  const tSvg = document.getElementById('transverseSVG');
  const lSvg = document.getElementById('longitudinalSVG');
  const particleCount = 50;

  for (let i = 0; i < particleCount; i++) {
    const xPos = 10 + (i * 11);
    
    // Create Transverse Particles (Dots)
    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("cx", xPos);
    dot.setAttribute("cy", 80);
    dot.setAttribute("r", 3);
    dot.setAttribute("class", "particle-t");
    // Stagger the delay: delay = index * 0.1s
    dot.style.animationDelay = (i * 0.1) + "s";
    tSvg.appendChild(dot);

    // Create Longitudinal Particles (Vertical Bars)
    const line = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    line.setAttribute("x", xPos);
    line.setAttribute("y", 30);
    line.setAttribute("width", 2);
    line.setAttribute("height", 60);
    line.setAttribute("class", "particle-l");
    // Stagger the delay
    line.style.animationDelay = (i * 0.08) + "s";
    lSvg.appendChild(line);
  }
</script>

</body>
</html>
