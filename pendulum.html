<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Pendulum Lab • Instructor Edition</title>
  <style>
    /* Dark Theme Base */
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      max-width: 900px; 
      margin: 30px auto; 
      padding: 20px; 
      background: #121212; /* Deep Dark Background */
      color: #e0e0e0; 
      line-height: 1.6; 
    }

    h1, h2 { text-align: center; color: #ffffff; margin-bottom: 5px; }

    #header-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-end; 
      border-bottom: 2px solid #37474f; 
      padding-bottom: 10px; 
      margin-bottom: 20px; 
    }

    .instructor-tag { text-align: right; font-style: italic; color: #b0bec5; font-size: 0.9rem; }

    /* Container adjustments */
    .container { 
      background: #1e1e1e; 
      padding: 25px; 
      border-radius: 10px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      border: 1px solid #333;
    }

    .pendulum-wrapper { 
      height: 350px; 
      position: relative; 
      margin: 20px auto; 
      width: 300px; 
      border-top: 4px solid #444; 
    }

    .pendulum {
      position: absolute; top: 0; left: 50%; width: 2px; height: 100%; 
      background: #888; /* Lighter string for visibility */
      transform-origin: top center; transform: translateX(-50%);
      animation: swing 2s infinite ease-in-out;
    }

    .bob {
      position: absolute; bottom: 0; left: 50%;
      width: 40px; height: 40px; margin-left: -20px; margin-bottom: -20px;
      background: radial-gradient(circle at 30% 30%, #ff5252, #b71c1c);
      border-radius: 50%; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.6);
      border: 1px solid #ff8a80;
      transition: width 0.3s, height 0.3s, margin 0.3s;
    }

    @keyframes swing {
      0%, 100% { transform: translateX(-50%) rotate(-15deg); }
      50% { transform: translateX(-50%) rotate(15deg); }
    }

    /* Form Controls */
    .controls-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
      margin: 20px 0; 
      padding: 15px; 
      background: #2c2c2c; 
      border-radius: 8px; 
    }

    .control-group { display: flex; flex-direction: column; align-items: center; }
    label { font-weight: bold; margin-bottom: 5px; color: #cfd8dc; }
    
    select, input[type="range"] { 
      width: 80%; 
      background: #3d3d3d; 
      color: white; 
      border: 1px solid #555; 
      padding: 5px;
      border-radius: 4px;
    }

    .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    button { padding: 12px 20px; font-size: 1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
    .start { background: #2e7d32; }
    .stop { background: #c62828; }
    .reset { background: #546e7a; }
    button:hover { filter: brightness(1.2); }

    /* Timer and Results */
    #timer-display { 
      font-size: 3rem; 
      font-weight: bold; 
      text-align: center; 
      margin: 20px 0; 
      font-family: monospace; 
      background: #000000; 
      color: #00e676; /* Matrix-style Green */
      padding: 15px; 
      border-radius: 8px; 
      border: 1px solid #00c853;
    }

    #result { 
      font-size: 1.2rem; 
      text-align: center; 
      padding: 15px; 
      border-radius: 8px; 
      margin-top: 20px; 
      min-height: 50px; 
      transition: 0.3s;
    }

    .theory { color: #81c784; font-weight: bold; }
  </style>
</head>
<body>

<div id="header-bar">
    <h1>Simple Pendulum Lab</h1>
    <div class="instructor-tag"><strong>Instructor:</strong> Prof. S Karna</div>
</div>

<div class="container">
  <div class="pendulum-wrapper">
    <div class="pendulum" id="pendulum">
      <div class="bob" id="bob"></div>
    </div>
  </div>

  <div class="controls-grid">
    <div class="control-group">
        <label>Length (L): <span id="lVal">0.80</span> m</label>
        <select id="length">
          <option value="0.40">40 cm</option>
          <option value="0.60">60 cm</option>
          <option value="0.80" selected>80 cm</option>
          <option value="1.00">100 cm</option>
        </select>
    </div>
    <div class="control-group">
        <label>Mass (m): <span id="mVal">200</span> g</label>
        <input type="range" id="massInput" min="50" max="500" value="200" step="10">
    </div>
  </div>

  <div class="btn-group">
    <button class="start" onclick="startTimer()">Start Timer</button>
    <button class="stop" onclick="stopTimer()">Stop Timer</button>
    <button class="reset" onclick="resetAll()">Reset</button>
  </div>

  <div id="timer-display">00:00.00</div>
  <div id="result"></div>
</div>

<script>
  let timerInterval = null;
  let startTime = 0;
  let elapsedTime = 0;
  let isRunning = false;

  const timerDisplay = document.getElementById('timer-display');
  const resultDiv = document.getElementById('result');
  const lengthSelect = document.getElementById('length');
  const massInput = document.getElementById('massInput');
  const pendulum = document.getElementById('pendulum');
  const bob = document.getElementById('bob');

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60).toString().padStart(2,'0');
    const sec = (totalSec % 60).toString().padStart(2,'0');
    const hun = Math.floor((ms % 1000) / 10).toString().padStart(2,'0');
    return `${min}:${sec}.${hun}`;
  }

  function updateTimer() {
    elapsedTime = Date.now() - startTime;
    timerDisplay.textContent = formatTime(elapsedTime);
  }

  function startTimer() {
    if (!isRunning) {
      startTime = Date.now() - elapsedTime;
      timerInterval = setInterval(updateTimer, 10);
      isRunning = true;
      pendulum.style.animationPlayState = 'running';
    }
  }

  function stopTimer() {
    if (isRunning) {
      clearInterval(timerInterval);
      isRunning = false;
      pendulum.style.animationPlayState = 'paused';
      showResult();
    }
  }

  function resetAll() {
    clearInterval(timerInterval);
    isRunning = false;
    elapsedTime = 0;
    timerDisplay.textContent = "00:00.00";
    resultDiv.innerHTML = "";
    resultDiv.style.background = "transparent";
    resultDiv.style.border = "none";
    pendulum.style.animation = 'none';
    pendulum.offsetHeight; 
    updatePhysics();
  }

  function showResult() {
    const L = parseFloat(lengthSelect.value);
    const t = elapsedTime / 1000;
    const n = 10; 
    const T_exp = t / n;
    const T_theory = 2 * Math.PI * Math.sqrt(L / 9.8);
    const diffPercent = Math.abs(T_exp - T_theory) / T_theory * 100;

    resultDiv.innerHTML = `
      Measured Period (T): <b style="color: #fff;">${T_exp.toFixed(3)} s</b> | 
      Theoretical: <span class="theory">${T_theory.toFixed(3)} s</span><br>
      <small style="color: #bbb;">Difference: ${diffPercent.toFixed(1)}% (Based on 10 oscillations)</small>
    `;
    
    // Adjusted result colors for dark mode
    resultDiv.style.background = diffPercent < 5 ? "#1b5e20" : "#4a3300";
    resultDiv.style.border = diffPercent < 5 ? "1px solid #2e7d32" : "1px solid #f9a825";
  }

  function updatePhysics() {
    const L = parseFloat(lengthSelect.value);
    const M = parseInt(massInput.value);
    
    document.getElementById('lVal').innerText = L.toFixed(2);
    document.getElementById('mVal').innerText = M;

    const size = 30 + (M / 10);
    bob.style.width = `${size}px`;
    bob.style.height = `${size}px`;
    bob.style.marginLeft = `-${size/2}px`;
    bob.style.marginBottom = `-${size/2}px`;

    const period = 2 * Math.PI * Math.sqrt(L / 9.8);
    pendulum.style.animation = `swing ${period}s infinite ease-in-out`;
    pendulum.style.animationPlayState = isRunning ? 'running' : 'paused';
  }

  lengthSelect.addEventListener('change', updatePhysics);
  massInput.addEventListener('input', updatePhysics);

  updatePhysics();
</script>
</body>
</html>
